    setIdx(0); setPicks([]); setLocked(false); setResults([]);
    setScreen("quiz");
  }

  function startPoolDrill(session){
    const ids=poolFor(session.id);
    const qs=ids.map(id=>findQuestion(session,id)).filter(Boolean);
    if(!qs.length) return;
    setActiveSession(session);
    setDeckMode("pool");
    setDeck(shuffle(qs).map(q=>({...prepare(q),__sessionId:session.id})));
    setIdx(0); setPicks([]); setLocked(false); setResults([]);
    setScreen("quiz");
  }

  function startCombinedPoolDrill(){
    let qs=[];
    sessions.forEach(s=>{
      poolFor(s.id).forEach(id=>{ const q=findQuestion(s,id); if(q) qs.push({q,sessionId:s.id}); });
    });
    if(!qs.length) return;
    const combined={id:"__combined__",name:"All wrong answers",short:"Wrong-answer pool",color:"#A32D2D",bg:"#FCEBEB"};
    setActiveSession(combined);
    setDeckMode("combined");
    setDeck(shuffle(qs).map(item=>({...prepare(item.q),__sessionId:item.sessionId})));
    setIdx(0); setPicks([]); setLocked(false); setResults([]);
    setScreen("quiz");
  }

  // Drill all flagged questions across every session.
  function startFlagDrill(){
    let qs=[];
    sessions.forEach(s=>{
      flagsFor(s.id).forEach(id=>{ const q=findQuestion(s,id); if(q) qs.push({q,sessionId:s.id}); });
    });
    if(!qs.length) return;
    const flg={id:"__flagged__",name:"Flagged questions",short:"Flagged",color:"#B07B00",bg:"#FAEEDA"};
    setActiveSession(flg);
    setDeckMode("flagged");
    setDeck(shuffle(qs).map(item=>({...prepare(item.q),__sessionId:item.sessionId})));
    setIdx(0); setPicks([]); setLocked(false); setResults([]);
    setScreen("quiz");
  }

  // Build a weighted 70-question mock exam across all sessions.
  function startExam(){
    let qs=[];
    sessions.forEach(s=>{
      const want=EXAM_WEIGHTS[s.id]||0;
      const picked=shuffle(s.questions).slice(0,Math.min(want,s.questions.length));
      picked.forEach(q=>qs.push({q,sessionId:s.id}));
    });
    if(!qs.length) return;
    const exam={id:"__exam__",name:`Mock Exam — ${qs.length} questions`,short:"Mock Exam",color:"#1F6FB2",bg:"#E6F1FB"};
    setActiveSession(exam);
    setDeckMode("exam");
    setDeck(shuffle(qs).map(item=>({...prepare(item.q),__sessionId:item.sessionId})));
    setIdx(0); setPicks([]); setLocked(false); setResults([]);
    setScreen("quiz");
  }

  const cur=deck[idx];
  const isMulti=cur&&cur.correctShuffled.length>1;

  function togglePick(pos){
    if(locked) return;
    if(isMulti){ setPicks(p=>p.includes(pos)?p.filter(x=>x!==pos):[...p,pos]); }
    else { setPicks([pos]); submitAnswer([pos]); }
  }
  function submitAnswer(fp){
    const correct=setsEqual(fp,cur.correctShuffled);
    setLocked(true);
    setResults(r=>[...r,{question:cur,picks:fp,status:correct?"correct":"wrong"}]);
    // The session a question belongs to: its own session, or (in a combined
    // drill) the session tagged onto the question.
    const sid=cur.__sessionId||activeSession.id;
    recordResult(sid,correct);
    updatePool(sid,qid(cur),correct);
  }
  function next(){
    if(idx+1>=deck.length){ setScreen("results"); }
    else { setIdx(idx+1); setPicks([]); setLocked(false); }
  }

  const correctCount=results.filter(r=>r.status==="correct").length;
  const wrongCount=results.filter(r=>r.status==="wrong").length;

  const wrap={maxWidth:760,margin:"0 auto",color:"#2C2C2A"};
  const btn={display:"flex",alignItems:"center",gap:6,borderRadius:10,padding:"12px 14px",fontSize:14,fontWeight:500,justifyContent:"center"};
  const backBtn={background:"none",border:"none",cursor:"pointer",color:"#5F5E5A",fontSize:13,padding:0};
  const pill=(c,b)=>({fontSize:12,fontWeight:500,borderRadius:6,padding:"3px 9px",color:c,background:b,display:"inline-block"});

  // ---- DIFFICULTY PICKER ----
  if(screen==="difficulty"){
    const s=activeSession;
    const counts={
      all:s.questions.length,
      easy:diffCount(s,"easy"),
      medium:diffCount(s,"medium"),
      hard:diffCount(s,"hard"),
    };
    return (
      <div style={wrap}>
        <button onClick={()=>setScreen("home")} style={backBtn}>← Home</button>
        <h1 style={{fontSize:20,fontWeight:600,margin:"12px 0 4px"}}>{s.name}</h1>
        <p style={{fontSize:14,color:"#5F5E5A",margin:"0 0 16px",lineHeight:1.6}}>
          Choose a difficulty level. Easy questions are straightforward recall; Medium are concepts and calculations; Hard are trap questions and select-all-that-apply.
        </p>
        <div style={{display:"grid",gap:10}}>
          {[
            {key:"all",label:"All difficulties",desc:"The full session, mixed"},
            {key:"easy",label:"Easy",desc:"Straightforward recall"},
            {key:"medium",label:"Medium",desc:"Concepts and calculations"},
            {key:"hard",label:"Hard",desc:"Traps and select-all-that-apply"},
          ].map(d=>{
            const n=counts[d.key];
            const c=d.key==="all"?s.color:DIFF_COLORS[d.key];
            return (
              <button key={d.key} onClick={()=>startSession(s,d.key)} disabled={n===0}
                style={{textAlign:"left",cursor:n?"pointer":"default",background:"#fff",
                  border:`0.5px solid #D3D1C7`,borderLeft:`4px solid ${n?c:"#D3D1C7"}`,
                  borderRadius:10,padding:"13px 15px",opacity:n?1:0.5,
                  display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:15,fontWeight:600}}>{d.label}</div>
                  <div style={{fontSize:13,color:"#5F5E5A"}}>{d.desc}</div>
                </div>
                <div style={{fontSize:14,fontWeight:600,color:n?c:"#A8A69E"}}>{n} Q</div>
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  // ---- HOME ----
  if(screen==="home"){
    const combinedCount=totalPoolCount();
    const flagCount=totalFlagCount();
    return (
      <div style={wrap}>
        <div style={{marginBottom:18}}>
          <h1 style={{fontSize:22,fontWeight:600,margin:"0 0 6px"}}>RE Capital Markets — Exam Prep</h1>
          <p style={{fontSize:15,color:"#5F5E5A",margin:0,lineHeight:1.6}}>
            ESCP MSc Real Estate. Drill a session, sit a mock exam, or revisit flagged and missed questions. Progress is saved in this browser. {totalQuestions} questions in the pool.
          </p>
        </div>

        <div style={{background:"#E6F1FB",border:"0.5px solid #9CC4E4",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
          <div style={{fontSize:15,fontWeight:600,color:"#1F6FB2",marginBottom:2}}>Mock Exam</div>
          <div style={{fontSize:13,color:"#2C5F86",marginBottom:10,lineHeight:1.5}}>
            A {EXAM_TOTAL}-question exam drawn across all sessions, weighted to match the real exam breakdown — the closest practice to the real thing.
          </div>
          <button onClick={startExam} style={{...btn,width:"100%",background:"#1F6FB2",color:"#fff",border:"none",cursor:"pointer"}}>
            Start mock exam ({EXAM_TOTAL} questions)
          </button>
        </div>

        {flagCount>0&&(
          <div style={{background:"#FAEEDA",border:"0.5px solid #DCBE7E",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
            <div style={{fontSize:15,fontWeight:600,color:"#8A6200",marginBottom:2}}>Flagged questions</div>
            <div style={{fontSize:13,color:"#7A5600",marginBottom:10}}>
              {flagCount} question{flagCount===1?"":"s"} you've flagged to revisit. Flags stay until you remove them.
            </div>
            <button onClick={startFlagDrill} style={{...btn,width:"100%",background:"#B07B00",color:"#fff",border:"none",cursor:"pointer"}}>
              Drill flagged questions
            </button>
          </div>
        )}

        {combinedCount>0&&(
          <div style={{background:"#FCEBEB",border:"0.5px solid #F0997B",borderRadius:12,padding:"14px 16px",marginBottom:16}}>
            <div style={{fontSize:15,fontWeight:600,color:"#A32D2D",marginBottom:2}}>Wrong-answer pool</div>
            <div style={{fontSize:13,color:"#993C1D",marginBottom:10}}>
              {combinedCount} question{combinedCount===1?"":"s"} you've missed, across all sessions. Answer one correctly and it leaves the pool.
            </div>
            <button onClick={startCombinedPoolDrill} style={{...btn,width:"100%",background:"#A32D2D",color:"#fff",border:"none",cursor:"pointer"}}>
              Drill all wrong answers
            </button>
          </div>
        )}

        <div style={{fontSize:13,fontWeight:600,color:"#888780",margin:"6px 0 10px",textTransform:"uppercase",letterSpacing:0.4}}>Sessions</div>
        <div style={{display:"grid",gap:12}}>
          {sessions.map(s=>{
            const ready=s.questions.length>0;
            const st=store[s.id];
            const pc=poolCount(s.id);
            const fc=flagsFor(s.id).length;
            return (
              <div key={s.id} style={{background:"#fff",border:`0.5px solid ${ready?"#D3D1C7":"#E8E6DF"}`,borderLeft:`4px solid ${ready?s.color:"#D3D1C7"}`,borderRadius:12,padding:"14px 16px"}}>
                <div style={{fontSize:16,fontWeight:600,marginBottom:3}}>{s.name}</div>
                <div style={{fontSize:13,color:"#5F5E5A"}}>
                  {ready?`${s.questions.length} questions`:"Library being added"}
                  {st?`  ·  lifetime: ${st.correct||0} right, ${st.wrong||0} wrong`:""}
                </div>
                {(pc>0||fc>0)&&(
                  <div style={{fontSize:13,marginTop:4,fontWeight:500,display:"flex",gap:14,flexWrap:"wrap"}}>
                    {pc>0&&<span style={{color:"#A32D2D"}}>Wrong-answer pool: {pc}</span>}
                    {fc>0&&<span style={{color:"#8A6200"}}>Flagged: {fc}</span>}
                  </div>
                )}
                <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
                  <button onClick={()=>{setActiveSession(s);setScreen("difficulty");}} disabled={!ready} style={{...btn,flex:"1 1 120px",cursor:ready?"pointer":"default",background:ready?s.color:"#EDEBE4",color:ready?"#fff":"#A8A69E",border:"none"}}>
                    {ready?"Start quiz":"No questions yet"}
                  </button>
                  <button onClick={()=>startPoolDrill(s)} disabled={pc===0} style={{...btn,flex:"1 1 120px",cursor:pc?"pointer":"default",background:"#fff",color:pc?"#A32D2D":"#A8A69E",border:`0.5px solid ${pc?"#F0997B":"#E8E6DF"}`}}>
                    Drill wrong ({pc})
                  </button>
                  <button onClick={()=>{setActiveSession(s);setUploadText("");setUploadMsg(null);setScreen("upload");}} style={{...btn,cursor:"pointer",background:"#fff",color:"#2C2C2A",border:"0.5px solid #D3D1C7"}}>
                    Add questions
                  </button>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{marginTop:18,fontSize:13,color:"#888780"}}>
          Tap the flag icon on any question to save it for review. Missed questions enter a wrong-answer pool automatically.
        </div>
      </div>
    );
  }

  // ---- UPLOAD ----
  if(screen==="upload"){
    function doUpload(){
      try{
        const parsed=JSON.parse(uploadText);
        if(!Array.isArray(parsed)) throw new Error("Top level must be an array [ ... ].");
        parsed.forEach((q,i)=>{
          if(!q.q||!Array.isArray(q.options)||!Array.isArray(q.correct)||!q.explain)
            throw new Error(`Question ${i+1} is missing q, options, correct, or explain.`);
        });
        setSessions(prev=>prev.map(s=>s.id===activeSession.id?{...s,questions:[...s.questions,...parsed]}:s));
        setActiveSession(s=>({...s,questions:[...s.questions,...parsed]}));
        setUploadMsg({ok:true,text:`Added ${parsed.length} question(s).`});
        setUploadText("");
      }catch(e){ setUploadMsg({ok:false,text:`Couldn't parse: ${e.message}`}); }
    }
    return (
      <div style={wrap}>
        <button onClick={()=>setScreen("home")} style={backBtn}>← Sessions</button>
        <h1 style={{fontSize:20,fontWeight:600,margin:"12px 0 4px"}}>Add questions</h1>
        <p style={{fontSize:14,color:"#5F5E5A",margin:"0 0 14px",lineHeight:1.6}}>
          Paste a JSON array to add to <b>{activeSession.name}</b>. Uploaded questions last until the page reloads.
        </p>
        <button onClick={()=>{navigator.clipboard&&navigator.clipboard.writeText(UPLOAD_TEMPLATE);setUploadMsg({ok:true,text:"Template copied."});}} style={{...btn,cursor:"pointer",background:"#fff",color:"#2C2C2A",border:"0.5px solid #D3D1C7",marginBottom:10}}>
          Copy format template
        </button>
        <textarea value={uploadText} onChange={e=>setUploadText(e.target.value)} placeholder="Paste JSON array here..." style={{width:"100%",minHeight:200,fontSize:13,padding:12,borderRadius:10,border:"0.5px solid #D3D1C7",resize:"vertical"}} />
        {uploadMsg&&<div style={{marginTop:10,fontSize:13,padding:"10px 12px",borderRadius:8,background:uploadMsg.ok?"#E1F5EE":"#FCEBEB",color:uploadMsg.ok?"#0F6E56":"#A32D2D"}}>{uploadMsg.text}</div>}
        <button onClick={doUpload} disabled={!uploadText.trim()} style={{...btn,width:"100%",marginTop:12,cursor:uploadText.trim()?"pointer":"default",background:uploadText.trim()?activeSession.color:"#EDEBE4",color:uploadText.trim()?"#fff":"#A8A69E",border:"none"}}>
          Add to {activeSession.short}
        </button>
      </div>
    );
  }

  // ---- QUIZ ----
  if(screen==="quiz"){
    const curSid=cur.__sessionId||activeSession.id;
    const flagged=isFlagged(curSid,qid(cur));
    return (
      <div style={wrap}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <button onClick={()=>setScreen("home")} style={backBtn}>← Home</button>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{fontSize:13,color:"#5F5E5A"}}>Q {idx+1}/{deck.length} · <span style={{color:"#0F6E56"}}>{correctCount}</span> · <span style={{color:"#A32D2D"}}>{wrongCount}</span></div>
            <button onClick={()=>toggleFlag(curSid,qid(cur))} style={{cursor:"pointer",border:`0.5px solid ${flagged?"#DCBE7E":"#D3D1C7"}`,background:flagged?"#FAEEDA":"#fff",color:flagged?"#8A6200":"#888780",borderRadius:8,padding:"5px 10px",fontSize:13,fontWeight:500}}>
              {flagged?"★ Flagged":"☆ Flag"}
            </button>
          </div>
        </div>
        <div style={{height:6,background:"#F1EFE8",borderRadius:3,marginBottom:16,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${((idx+(locked?1:0))/deck.length)*100}%`,background:activeSession.color}}/>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
          <span style={pill(activeSession.color,activeSession.bg)}>{deckMode==="exam"?"Mock Exam":deckMode==="flagged"?"Flagged drill":deckMode==="full"?activeSession.short:"Wrong-answer drill"}</span>
          {deckMode==="full"&&diffFilter!=="all"&&(
            <span style={pill(DIFF_COLORS[diffFilter],"#F1EFE8")}>{DIFF_LABELS[diffFilter]}</span>
          )}
          {(deckMode==="exam"||deckMode==="combined"||deckMode==="flagged")&&cur.__sessionId&&(
            <span style={pill("#5F5E5A","#F1EFE8")}>{(sessions.find(x=>x.id===cur.__sessionId)||{}).short||""}</span>
          )}
          {cur.tag&&<span style={pill("#5F5E5A","#F1EFE8")}>{TAG_LABELS[cur.tag]||cur.tag}</span>}
          {isMulti&&<span style={pill("#854F0B","#FAEEDA")}>Select all that apply</span>}
        </div>
        <h2 style={{fontSize:18,fontWeight:600,margin:"0 0 16px",lineHeight:1.5}}>{cur.q}</h2>
        <div style={{display:"grid",gap:10}}>
          {cur.shuffledOptions.map((opt,i)=>{
            const isCorrect=cur.correctShuffled.includes(i);
            const isPicked=picks.includes(i);
            let border="0.5px solid #D3D1C7",bg="#fff",mark=null;
            if(locked){
              if(isCorrect){border="1.5px solid #0F6E56";bg="#E1F5EE";mark=<span style={{color:"#0F6E56",fontWeight:700}}>✓</span>;}
              else if(isPicked){border="1.5px solid #A32D2D";bg="#FCEBEB";mark=<span style={{color:"#A32D2D",fontWeight:700}}>✕</span>;}
            } else if(isPicked){ border=`1.5px solid ${activeSession.color}`;bg=activeSession.bg; }
            return (
              <button key={i} onClick={()=>togglePick(i)} disabled={locked} style={{textAlign:"left",cursor:locked?"default":"pointer",background:bg,border,borderRadius:10,padding:"13px 15px",display:"flex",justifyContent:"space-between",gap:10,fontSize:15,lineHeight:1.45,color:"#2C2C2A"}}>
                <span style={{display:"flex",alignItems:"center",gap:10}}>
                  {isMulti&&!locked&&<span style={{width:18,height:18,borderRadius:4,flexShrink:0,border:`1.5px solid ${isPicked?activeSession.color:"#B4B2A9"}`,background:isPicked?activeSession.color:"#fff",color:"#fff",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>{isPicked?"✓":""}</span>}
                  {opt.text}
                </span>
                {mark}
              </button>
            );
          })}
        </div>
        {isMulti&&!locked&&(
          <button onClick={()=>submitAnswer(picks)} disabled={picks.length===0} style={{...btn,width:"100%",marginTop:14,cursor:picks.length?"pointer":"default",background:picks.length?activeSession.color:"#EDEBE4",color:picks.length?"#fff":"#A8A69E",border:"none"}}>Submit answer</button>
        )}
        {locked&&(
          <div>
            <div style={{marginTop:16,background:"#F1EFE8",borderRadius:10,padding:"14px 16px"}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:5,color:setsEqual(picks,cur.correctShuffled)?"#0F6E56":"#A32D2D"}}>{setsEqual(picks,cur.correctShuffled)?"Correct":"Not quite"}</div>
              <div style={{fontSize:14,lineHeight:1.6,color:"#444441"}}>{cur.explain}</div>
            </div>
            <button onClick={next} style={{...btn,width:"100%",marginTop:14,background:activeSession.color,color:"#fff",border:"none",cursor:"pointer"}}>{idx+1>=deck.length?"See results":"Next question"}</button>
          </div>
        )}
      </div>
    );
  }

  // ---- REVIEW ----
  if(screen==="review"){
    const wrong=results.filter(r=>r.status==="wrong");
    return (
      <div style={wrap}>
        <button onClick={()=>setScreen("results")} style={backBtn}>← Results</button>
        <h1 style={{fontSize:20,fontWeight:600,margin:"12px 0 4px"}}>Review — missed questions</h1>
        <p style={{fontSize:14,color:"#5F5E5A",margin:"0 0 16px"}}>{wrong.length} to revisit.</p>
        <div style={{display:"grid",gap:14}}>
          {wrong.map((r,n)=>(
            <div key={n} style={{background:"#fff",border:"0.5px solid #D3D1C7",borderRadius:10,padding:"14px 16px"}}>
              <div style={{fontSize:15,fontWeight:600,marginBottom:10,lineHeight:1.5}}>{r.question.q}</div>
              <div style={{display:"grid",gap:6,marginBottom:10}}>
                {r.question.shuffledOptions.map((opt,i)=>{
                  const isCorrect=r.question.correctShuffled.includes(i);
                  const isPicked=r.picks.includes(i);
                  return (
                    <div key={i} style={{fontSize:14,padding:"8px 10px",borderRadius:7,lineHeight:1.45,background:isCorrect?"#E1F5EE":isPicked?"#FCEBEB":"#F8F7F3",color:isCorrect?"#0F6E56":isPicked?"#A32D2D":"#5F5E5A"}}>
                      {opt.text}{isCorrect?"  ✓":isPicked?"  ✕":""}
                    </div>
                  );
                })}
              </div>
              <div style={{fontSize:13,lineHeight:1.6,color:"#444441",background:"#F1EFE8",borderRadius:7,padding:"10px 12px"}}>{r.question.explain}</div>
            </div>
          ))}
        </div>
        <button onClick={()=>{ if(deckMode==="combined") startCombinedPoolDrill(); else if(deckMode==="pool") startPoolDrill(activeSession); else if(deckMode==="exam") startExam(); else if(deckMode==="flagged") startFlagDrill(); else startSession(activeSession,diffFilter); }} style={{...btn,width:"100%",marginTop:16,background:activeSession.color,color:"#fff",border:"none",cursor:"pointer"}}>{deckMode==="full"?"Retry full session":deckMode==="exam"?"New mock exam":"Drill these again"}</button>
      </div>
    );
  }

  // ---- RESULTS ----
  const pct=Math.round((correctCount/deck.length)*100);
  let verdict="Keep drilling";
  if(pct>=85) verdict="Exam-ready"; else if(pct>=70) verdict="Solid — polish the gaps"; else if(pct>=50) verdict="Getting there";
  const inDrill=deckMode!=="full";
  function retry(){
    if(deckMode==="combined") startCombinedPoolDrill();
    else if(deckMode==="pool") startPoolDrill(activeSession);
    else if(deckMode==="exam") startExam();
    else if(deckMode==="flagged") startFlagDrill();
    else startSession(activeSession,diffFilter);
  }
  return (
    <div style={wrap}>
      <div style={{textAlign:"center",padding:"22px 0 18px"}}>
        <h1 style={{fontSize:22,fontWeight:600,margin:"10px 0 4px"}}>{verdict}</h1>
        <p style={{fontSize:14,color:"#5F5E5A",margin:0}}>{activeSession.name}{inDrill?" · wrong-answer drill":""}</p>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:16}}>
        {[{l:"Correct",v:correctCount,c:"#0F6E56"},{l:"Wrong",v:wrongCount,c:"#A32D2D"},{l:"Score",v:pct+"%",c:"#2C2C2A"}].map(m=>(
          <div key={m.l} style={{flex:1,background:"#F1EFE8",borderRadius:8,padding:"14px 12px",textAlign:"center"}}>
            <div style={{fontSize:13,color:"#5F5E5A",marginBottom:4}}>{m.l}</div>
            <div style={{fontSize:24,fontWeight:600,color:m.c}}>{m.v}</div>
          </div>
        ))}
      </div>
      {inDrill&&(
        <div style={{fontSize:13,color:"#5F5E5A",background:"#E1F5EE",borderRadius:8,padding:"10px 12px",marginBottom:14,lineHeight:1.5}}>
          {correctCount>0
            ? `${correctCount} question${correctCount===1?"":"s"} answered correctly and removed from the wrong-answer pool. ${wrongCount} still to master.`
            : `No questions cleared yet — they all stay in the pool. Keep drilling.`}
        </div>
      )}
      <div style={{display:"grid",gap:10}}>
        {wrongCount>0&&<button onClick={()=>setScreen("review")} style={{...btn,width:"100%",background:"#fff",color:"#2C2C2A",border:"0.5px solid #D3D1C7",cursor:"pointer"}}>Review {wrongCount} missed question(s)</button>}
        <div style={{display:"flex",gap:10}}>
          <button onClick={retry} style={{...btn,flex:1,background:activeSession.color,color:"#fff",border:"none",cursor:"pointer"}}>{inDrill?"Drill again":"Retry session"}</button>
          <button onClick={()=>setScreen("home")} style={{...btn,flex:1,background:"#fff",color:"#2C2C2A",border:"0.5px solid #D3D1C7",cursor:"pointer"}}>All sessions</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
