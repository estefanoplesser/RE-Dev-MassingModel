      { q: "Which of the following correctly describe Moody's current views on individual European CRE sectors?", options: ["Office demand is shifting to high-quality, eco-friendly prime locations; European vacancy ~9% (lower than US)","Logistics faces slowing demand post-e-commerce normalisation; prime vs. secondary divergence increasing","Multi-family residential benefits from structural demand-supply imbalance from reduced construction activity","Retail is experiencing broad-based recovery across all sub-sectors due to improving consumer confidence","AI represents a structural risk to office demand through potential workforce reduction"], correct: [0,1,2,4], tag: "concept", explain: "D is wrong — retail is described as fragile, with consumer confidence subdued and only prime shopping centres and convenience retail outperforming. The sector is NOT experiencing broad-based recovery." },
      { q: "Moody's REIT rating scorecard is described as \"NOT exhaustive\" and the scorecard-indicated outcome \"often differs from the actual rating assigned.\" What does this mean in practice?", options: ["The scorecard is a starting point; the Rating Committee can and does adjust final ratings based on additional considerations","The scorecard is purely illustrative and has no influence on the actual rating process","The \"often differs\" statement means Moody's ratings are inconsistent and unreliable","Rating Committee overrides only occur when the scorecard output is below investment grade","The scorecard is updated every quarter to ensure it always matches actual ratings"], correct: [0], tag: "concept", explain: "The scorecard provides a systematic framework and indicative output. But rating committees incorporate factors beyond the scorecard — ownership structure, management strategy, JV/fund risks, market cycles — that may push the final rating above or below the pure scorecard output." },
      { q: "Moody's uses Global Standard Adjustments to financial statements when rating REITs. Which of the following are ALWAYS adjusted out (treated as non-recurring) per the methodology?", options: ["Gains/losses on asset disposals","Gains/losses on extinguishment of debt","Transaction fees relating to capital structure changes","Restructuring costs","COVID-19 related costs"], correct: [0,1,2], tag: "concept", explain: "Restructuring costs (D) and COVID-19 costs (E) are explicitly listed as items treated as CORE/RECURRING (NOT adjusted out). Asset disposal gains, debt extinguishment gains, and capital structure fees are treated as unusual and adjusted out." },
      { q: "What EBITDA/Interest ratio threshold defines the boundary between Baa and Ba in the Moody's REIT scorecard?", options: ["3.5x","2.5x","1.7x","4.5x","7.0x"], correct: [1], tag: "concept", explain: "The Baa/Ba boundary for EBITDA/Interest is 2.5x (Baa = 2.5–4.5x; Ba = 1.7–2.5x). This is a critical threshold: falling below 2.5x moves a REIT from lowest investment grade toward speculative territory. 4.5x is the A/Baa boundary." },
      { q: "European listed REITs/CRE companies are trading at significant discounts to NTA/NAV. Which of the following are correct regarding these discounts?", options: ["Residential sector trades at approximately 55.9% discount to NTA — the deepest discount","Retail sector trades at approximately 14.4% discount — the narrowest discount","These discounts reflect market scepticism about the sustainability of current book values","A deep discount to NAV automatically triggers a rating downgrade by Moody's","Logistics/Other sector trades at approximately 18.4% discount"], correct: [0,1,2,4], tag: "concept", explain: "D is wrong — NAV discounts are market sentiment signals but do NOT automatically trigger rating actions. Moody's ratings are based on credit risk (ability to service debt), not share price performance." },
      { q: "A REIT's gross assets are €8 billion. What rating band does this suggest for the Scale factor?", options: ["Aaa (≥$60bn)","Aa ($20–60bn)","A ($10–20bn)","Baa ($2–10bn)","Ba ($1–2bn)"], correct: [3], tag: "concept", explain: "€8bn falls within the Baa range ($2–10bn gross assets). Note: while the thresholds are stated in USD, the concept applies in EUR equivalents. Scale is the smallest factor at 5% — it modestly differentiates very large platforms from smaller ones." },
      { q: "Which of the following are trigger criteria that would cause Prologis European Logistics Fund (PELF, rated A3) to be UPGRADED?", options: ["Debt/Assets below 25% on a sustained basis","Net Debt/EBITDA below 6x","EBITDA/Interest above 5x","Unencumbered assets above 80%","A successful equity offering above €500m"], correct: [0,1,2,3], tag: "concept", explain: "E (a specific equity offering size) is not one of the listed upgrade triggers. All four metric-based criteria (leverage, coverage, and unencumbered assets) must be achieved sustainably for an upgrade, not just one of them." },
      { q: "Which of the following best describes the \"Market Characteristics\" sub-factor (10% weight) in Moody's REIT scorecard?", options: ["Physical location quality and building specifications of individual properties","The macroeconomic environment, regulatory frameworks, supply pipeline, and market liquidity relevant to the REIT's property type","The REIT's market capitalisation and trading liquidity on stock exchanges","Current market rents and vacancy rates in the specific buildings the REIT owns","The REIT's market share by gross leasable area in its core markets"], correct: [1], tag: "concept", explain: "Market Characteristics assesses the broader property market environment: macro demand drivers, regulatory stability vs. disruption, supply pipeline (limited = favourable), and market liquidity and transparency. It is about the market, not specific buildings (that's Asset Quality)." },
      { q: "CTP N.V. (Baa3/Positive) is the largest logistics/industrial group in CEE. Which of the following correctly describe its credit profile per Moody's?", options: ["Strength: structural demand support from e-commerce/nearshoring in CEE markets","Strength: strong asset management track record with good-credit tenants","Weakness: material development exposure with only partial pre-letting — execution risk","Weakness: geopolitical and economic uncertainty in CEE markets","Strength: CEE markets are highly liquid with excellent price transparency"], correct: [0,1,2,3], tag: "concept", explain: "E is wrong — less liquid CEE markets are explicitly identified as a WEAKNESS for CTP, not a strength. Reduced market liquidity makes it harder to refinance or sell assets in stress." },
      { q: "Why does Moody's assess the Access to Capital factor (10% weight) separately from the Leverage metrics?", options: ["Because capital access is a qualitative measure of management capability, not related to financial ratios","Because a company with diverse lender relationships and capital market access has more financial flexibility to manage through stress than leverage ratios alone can capture","Because regulatory requirements mandate a separate capital access assessment for listed REITs","Because Access to Capital replaces the leverage assessment for REITs with very large asset bases","Because capital access determines the REIT's ability to issue equity, which directly reduces credit risk"], correct: [1], tag: "concept", explain: "Leverage ratios show the current debt burden. Capital access assesses whether the company CAN access funding in the future — can it raise new debt, refinance maturing obligations, and do so across diverse sources (banks, bonds, private)? This is a forward-looking flexibility measure." },
      { q: "Which of the following are listed as \"additional considerations\" in Moody's REIT methodology that sit OUTSIDE the formal scorecard?", options: ["Liquidity assessment over 12–18 months assuming no capital markets access","Ownership/corporate structure — parental support or strategic importance","JV and fund business risks — redemption risk in open-ended funds","Gross Assets / scale of the platform","Management strategies and risk appetite — realism and success of long-term strategy"], correct: [0,1,2,4], tag: "concept", explain: "Gross Assets / Scale (D) IS part of the formal scorecard (5% weight). Liquidity, ownership, JV/fund risks, and management strategy are all explicitly listed as additional considerations outside the scorecard that can still affect the final rating." },
      { q: "Which of the following is the ONE covenant that appears across ALL bond types — traditional HY, HY-lite, Fallen Angel, and Investment Grade?", options: ["Debt Incurrence covenant","Restricted Payments covenant","Negative Pledge (Liens)","Change of Control at 101","Asset Sale Offer at Par"], correct: [2], tag: "concept", explain: "The Negative Pledge (Liens covenant) is the universal covenant — it appears in IG, HY, HY-lite, and Fallen Angel structures alike. All other covenants listed are exclusive to HY or specific structures. This is a critical exam differentiator." },
      { q: "The \"Three Ps\" framework summarises restrictive covenants in HY bonds. Which of the following correctly describe the Three Ps?", options: ["Cash Leakage: Restricted Payments covenant limits dividends and use of asset sale proceeds","Leveraging: Debt Incurrence covenant limits how much additional debt can be taken on","Change of Control: restricts sale or change of majority ownership (>50% shareholders)","Pricing: restricts the interest rate the issuer can pay on new debt instruments","The three purposes are: limit value leakage, retain assets, and prevent increased debt"], correct: [0,1,2,4], tag: "concept", explain: "D (pricing restriction) is not one of the Three Ps. The Ps are: Restricted Payments (cash leakage/risky investments), Debt Incurrence (leveraging), and Change of Control (ownership change). And the three purposes are: limit value leakage, retain assets, prevent increased debt." },
      { q: "In the JLR (Jaguar Land Rover) case study, what happened to the covenant package as JLR's rating improved from B1 (2012) to Ba1 (2017)?", options: ["Covenants were strengthened to provide bondholders with more protection as the company grew","The covenant package remained unchanged — covenants cannot be renegotiated post-issuance","Covenants weakened progressively as the rating improved, with the negative pledge narrowed to principal manufacturing property by 2017","JLR added new covenants specifically protecting intellectual property at each refinancing","Investment grade covenants were substituted for HY covenants when JLR crossed Ba1"], correct: [2], tag: "concept", explain: "As JLR improved from B1 to Ba2 (2015) to Ba1 (2017), the covenant package weakened. By 2017, the negative pledge was narrowed to principal manufacturing property only. This illustrates the key takeaway: as ratings improve, issuers negotiate weaker covenants — bondholders get less protection." },
      { q: "A traditional HY bond covenant states: \"The issuer MAY NOT pay a dividend UNLESS: (1) consolidated net income test, (2) $1 debt test (gateway), (3) no default in effect.\" Which of the following correctly describe this covenant structure?", options: ["This is a Restricted Payments covenant — it limits cash leakage from the business to shareholders","The \"gateway ratio\" ($1 debt test) must be satisfied for the payment basket to be accessible","Permitted payments provide specific carve-outs that allow certain dividends even if conditions are not met","This covenant structure only applies to HY bonds rated Caa and below","The covenant protects bondholders by ensuring cash is not extracted from the business when the company is financially stressed"], correct: [0,1,2,4], tag: "concept", explain: "D is wrong — this covenant structure applies broadly to traditional HY bonds (B and above, as well as Caa/Ca). It is the standard HY restrictive payments architecture, not restricted to distressed issuers." },
      { q: "What is the primary difference between HY and IG bond covenant packages?", options: ["HY bonds have no covenants; IG bonds have extensive protective covenants","IG bonds have almost no restrictive covenants — only a negative pledge and events of default; HY bonds have a full protective package","Both HY and IG have identical covenant packages — the difference is in the coupon rate","IG bonds have more covenants than HY bonds because they are held by more conservative investors","HY bonds have covenants only at issuance; IG bonds have continuous covenant monitoring"], correct: [1], tag: "concept", explain: "This is the fundamental distinction: IG bonds rely on market discipline and the issuer's credit quality rather than contractual restrictions. HY bonds — where issuers are riskier — require an extensive covenant package (debt incurrence, restricted payments, change of control, dividend blockers, etc.)." },
      { q: "Which of the following covenants appear in traditional HY bonds but NOT in Investment Grade bonds?", options: ["Debt Incurrence covenant","Restricted Payments (dividend blockers)","Transactions with Affiliates","Negative Pledge (Liens)","Asset Sale Offer at Par"], correct: [0,1,2,4], tag: "concept", explain: "The Negative Pledge (D) appears in ALL bond types including IG — it is the universal covenant. Debt incurrence, restricted payments, transactions with affiliates, and asset sale offers are HY-specific protective mechanisms not typically found in IG." },
      { q: "The Change of Control covenant in a traditional HY bond triggers at what level?", options: ["At 100% of par value — the issuer must redeem bonds at face value","At 101% of par value — bondholders can put the bonds back to the issuer at a small premium","At market value — bondholders receive the current trading price of the bonds","At 105% of par — standard HY change of control premium","There is no standard price — it is negotiated case by case"], correct: [1], tag: "concept", explain: "HY Change of Control triggers at 101% — bondholders have the right to put bonds back to the issuer at 101 cents on the dollar. Fallen Angel Change of Control triggers at 100% (par). IG rarely includes Change of Control provisions at all." },
      { q: "Which factors influence how aggressively covenants are negotiated in a bond transaction?", options: ["The issuer's credit rating — lower rated issuers face more restrictive covenants","Ownership structure — PE-owned issuers typically receive weaker covenants than entrepreneur or public company issuers","Market conditions — during periods of high rates, conflict, or stress, bondholders can demand stronger covenants","The size of the bond issuance — larger issues always receive weaker covenants","The sector — oil & gas, real estate, and PE-backed issuers differ in typical covenant structures"], correct: [0,1,2,4], tag: "concept", explain: "D is wrong — size of issuance does not mechanically determine covenant strength. PE ownership getting weaker covenants (B) is a notable specific detail: PE sponsors have historically negotiated more shareholder-friendly terms." },
      { q: "A \"Restricted Group\" in a HY bond structure refers to:", options: ["A group of investors who are restricted from buying the bond due to regulatory constraints","The defined set of entities within the corporate structure that are subject to the bond covenants","Subsidiaries that are prohibited from incurring any form of debt","The senior secured creditors who have priority over the HY bondholders","A regulatory designation for issuers in sectors subject to government oversight"], correct: [1], tag: "concept", explain: "The Restricted Group defines which legal entities within the issuer's corporate structure are bound by the covenants. Subsidiaries OUTSIDE the restricted group (unrestricted subsidiaries) can take on debt freely — a common source of covenant tension and a key HY structuring concept." },
      { q: "The Debt Incurrence covenant in a HY bond restricts what, and how?", options: ["It limits how much additional debt the issuer can take on","It specifies whether new debt can be secured or pari passu with existing bonds","It may restrict whether non-guarantor subsidiaries can incur debt separately","It sets a maximum coupon rate on any new debt issued by the restricted group","It typically includes a ratio test (e.g. fixed charge coverage) that must be met before new debt can be incurred"], correct: [0,1,2,4], tag: "concept", explain: "D (a maximum coupon) is not a feature of a Debt Incurrence covenant — it restricts the QUANTITY and TYPE of debt (secured vs. unsecured, subsidiary vs. parent), not the price of debt." },
      { q: "In the JLR case study, what specifically was added to the covenant package in the 2020 refinancing (when the rating was back at B1)?", options: ["A new Debt Incurrence covenant with a tighter fixed charge coverage test","Specified IP (brands/patents) protection prior to the 2nd anniversary of issuance","A mandatory amortisation covenant requiring 2% annual debt repayment","The reinstatement of all covenants removed during the Ba2 period","A new change of control provision triggered at 50% shareholder change"], correct: [1], tag: "concept", explain: "In 2020, JLR (back to B1) added Specified IP (intellectual property — brands and patents) protection prior to the 2nd anniversary. The general structure remained HY-lite. This illustrates how even as the rating falls back, covenant structures are not automatically reinstated — they evolve through specific negotiated terms." },
      { q: "What are the THREE fundamental purposes of covenants in a bond transaction?", options: ["Limit value leakage — prevent cash leaving the business inappropriately","Retain assets — ensure assets remain to generate returns that service the debt","Prevent increased debt — protect existing bondholders from dilution of their security","Maximise the coupon rate bondholders receive on the bond","Reduce the issuer's credit rating by limiting financial flexibility"], correct: [0,1,2], tag: "concept", explain: "D and E are wrong. Covenants are protective mechanisms for bondholders, not mechanisms to maximise coupons (that is market-set) or deliberately impair credit ratings (covenants aim to PROTECT credit quality by limiting risky behaviour)." },
      { q: "Which of the following is a key difference between a \"Fallen Angel\" bond and a traditional HY-lite bond in terms of covenants?", options: ["Fallen Angels have no covenants at all — they are treated as IG","Fallen Angels have Change of Control at 100% (par) vs 101% for traditional HY","Fallen Angels have Debt Incurrence covenants identical to traditional HY","Fallen Angels never include a Negative Pledge because they originated as IG bonds","Fallen Angels have Asset Sale Offers identical to traditional HY"], correct: [1], tag: "concept", explain: "The key Fallen Angel difference: Change of Control at 100% (par), compared to 101% for traditional HY. This reflects their IG heritage. Fallen Angels also typically lack Debt Incurrence, Restricted Payments, and Asset Sale offers (they are HY-lite, not full HY)." },
      { q: "From the bondholder's perspective, which of the following WEAKEN bondholder protection in a HY transaction?", options: ["PE ownership of the issuer — historically associated with weaker covenants","An improving issuer credit rating — enables the issuer to renegotiate and loosen covenants","A broader definition of the unrestricted subsidiary basket — more subsidiaries can bypass covenants","Favourable market conditions for issuers (low rates, tight spreads) — issuer pricing power increases","An operating advisor oversight role added to the structure"], correct: [0,1,2,3], tag: "concept", explain: "E (Operating Advisor) is a CMBS-specific oversight role that actually adds protection. In bond covenant terms, A-D all weaken bondholder protection: PE-friendly structures, rating improvement-driven renegotiation, wider restricted/unrestricted baskets, and favorable market conditions all shift negotiating power to issuers." },
      { q: "Why does investment grade corporate debt rely primarily on the Negative Pledge covenant rather than a full restrictive package?", options: ["Because IG issuers are legally prohibited from having restrictive covenants","Because IG investors focus on portfolio-level credit management rather than individual covenant enforcement","Because IG issuers' credit quality is considered sufficient to protect bondholders without additional restrictions — market discipline substitutes for contractual constraints","Because IG covenants are set by regulators rather than negotiated between issuer and investors","Because IG bond indentures are standardised by law and cannot include restrictive covenants"], correct: [2], tag: "concept", explain: "The philosophy: IG issuers are creditworthy enough that investors trust them not to engage in value-destroying behaviour. The Negative Pledge prevents the creation of senior secured debt that would subordinate bondholders. Beyond that, market discipline (ratings, market access) provides the check — not contractual restrictions." },
      { q: "What is the fundamental conflict between bondholders and shareholders that covenants are designed to address?", options: ["Bondholders want steady coupon payments and repayment at maturity","Shareholders want to maximise value, generate returns, and preserve equity upside","These objectives conflict: actions that benefit shareholders (e.g. leveraged acquisitions, dividends) can harm bondholders by weakening the credit","Bondholders want high coupon rates; shareholders want to minimise financing costs","Without covenants, management (acting for shareholders) may take on excessive risk knowing bondholders bear the downside"], correct: [0,1,2,4], tag: "concept", explain: "D captures a CONSEQUENCE (coupon pricing reflects risk), not the fundamental conflict. The core conflict: shareholders have upside from risk-taking while bondholders bear the downside — covenants limit the most harmful risk-taking behaviours." },
      { q: "In a traditional HY bond, \"Transactions with Affiliates\" covenant is present. What does this protect against?", options: ["The issuer lending money to its shareholders","Value being transferred to related parties (affiliates) on non-arm's-length terms at the expense of the Restricted Group","The issuer acquiring affiliates without bondholder consent","Cross-default provisions triggering from affiliate entities","The issuer paying dividends to affiliated pension schemes"], correct: [1], tag: "concept", explain: "The Transactions with Affiliates covenant prevents the issuer from doing deals with related parties on terms that disadvantage the bond-issuing entity — a mechanism for extracting value without going through the Restricted Payments basket. It requires arm's-length terms for affiliate transactions." },
      { q: "Which of the following are correct regarding the \"HY-lite\" (also called EMTN-style) covenant package?", options: ["HY-lite includes a Negative Pledge (like all bond types)","HY-lite includes Change of Control at 101%","HY-lite does NOT include Debt Incurrence or Restricted Payments covenants","HY-lite includes Transactions with Affiliates covenant","HY-lite includes Guarantees of Other Debt in some cases"], correct: [0,1,2,4], tag: "concept", explain: "D is wrong — Transactions with Affiliates is a traditional HY covenant, NOT included in HY-lite structures. HY-lite is a stripped-down package (Negative Pledge, Change of Control, Guarantees, events of default) with the most operationally restrictive covenants removed." },
      { q: "What is the primary reason that PE-owned issuers have historically achieved weaker covenant packages than entrepreneur or public company issuers?", options: ["PE firms have stronger credit ratings than other ownership structures","PE firms are exempt from HY covenant requirements under securities law","PE sponsors typically have existing investor relationships, leverage expertise, and a track record of refinancing — giving them greater negotiating power over covenant terms","PE-owned bonds are rated higher because of the PE firm's financial resources","PE firms structure bonds through offshore SPVs that are exempt from covenant disclosure"], correct: [2], tag: "concept", explain: "PE firms are sophisticated, repeat participants in debt markets with strong banking relationships. This negotiating power, combined with PE's incentive to maximise equity returns (which requires financial flexibility), leads to weaker covenant packages relative to other ownership structures." },
      { q: "Which of the following covenants are included in US HY structures but are generally NOT in European/EMTN HY-lite structures?", options: ["Merger & Consolidation covenant (US only in HY-lite)","Sale and Leaseback covenant (US only in HY-lite)","Asset Sale Offer at par (present in HY, absent in HY-lite)","Negative Pledge (present in all bond types)","Restricted/Unrestricted Subsidiary definitions (HY only, not HY-lite)"], correct: [0,1,2,4], tag: "concept", explain: "Merger & Consolidation and Sale and Leaseback appear in US structures (both traditional HY and US HY-lite) but not in European EMTN-style HY-lite. Asset Sale Offers and the Restricted/Unrestricted subsidiary framework are HY-specific and absent from HY-lite." },
    ],
  },
  {
    id: "peprivatedebt",
    name: "Private Equity & Private Debt",
    short: "PE & Private Debt",
    color: "#BA7517",
    bg: "#FAEEDA",
    questions: [
      { q: "Select ALL of the three drivers of real estate return.", options: ["Current income (income today)","Income growth (income tomorrow)","Market repricing (cap rate re-rating)","Tenant satisfaction surveys"], correct: [0,1,2], tag: "recall", explain: "The three drivers are current income, income growth, and market repricing. Every real estate return comes from one or more of these three sources. Tenant surveys are not a return driver." },
      { q: "For a debt investor (lender), which return driver is the primary — often only — source of return?", options: ["Market repricing","Income growth","Current income (the coupon)","Cap rate compression"], correct: [2], tag: "concept", explain: "For lenders, current income — the coupon — is the primary and often only return driver. Lenders do not capture income growth (except indirectly via credit migration) or market repricing." },
      { q: "Which return drivers does an equity holder capture, versus a lender?", options: ["Equity captures all three; lenders primarily capture only current income","Lenders capture all three; equity captures only income","Both capture all three equally","Neither captures repricing"], correct: [0], tag: "concept", explain: "Equity holders capture all three drivers — income, growth and repricing. Lenders primarily capture current income only; they do not directly benefit from growth or repricing." },
      { q: "What does cap rate compression do to asset value, with cash flow unchanged?", options: ["Destroys value","Lifts asset value without any change in cash flow","Has no effect on value","Reduces the coupon"], correct: [1], tag: "concept", explain: "Cap rate compression lifts asset value without touching cash flow (Value = NOI / Cap Rate; a lower cap rate raises value). Cap rate decompression destroys value just as fast — it works both ways." },
      { q: "A property has €2m NOI. At a 5% cap rate it is worth €40m. At a 4% cap rate, what is it worth?", options: ["€30m","€40m","€50m","€80m"], correct: [2], tag: "calc", explain: "Value = NOI / Cap Rate = €2m / 0.04 = €50m. A 1% cap rate move (5%→4%) lifts value 25% — from €40m to €50m — purely from repricing, with no change in cash flow." },
      { q: "Which investment strategy relies primarily on contractual coupon and fees as its return?", options: ["Core / Core+ real estate","Value-add / opportunistic real estate","Private real estate debt","Development equity"], correct: [2], tag: "recall", explain: "Private real estate debt earns a contractual coupon plus fees, with a typical IRR of around 6–12%. It does not rely on income growth or repricing the way equity strategies do." },
      { q: "'Core real estate is a debt strategy because it has low returns.' This statement is:", options: ["True — low returns mean debt","False — Core is an EQUITY strategy with relatively low returns","True — Core is always senior debt","False — Core is opportunistic equity"], correct: [1], tag: "trap", explain: "Core is an EQUITY strategy with relatively low returns (around 5–8% IRR) — not a debt strategy. Low return does not mean debt. This is a classic trap." },
      { q: "Private real estate debt IRR (around 6–12%) overlaps with which equity strategy at the lower end?", options: ["Value-add / opportunistic","Core / Core+ (around 5–8%)","Development equity","There is no overlap"], correct: [1], tag: "trap", explain: "Private debt's 6–12% IRR overlaps at the lower end with Core equity's 5–8%. They are different instruments with different risk despite overlapping return ranges — a deliberate exam trap." },
      { q: "Select ALL of the following that are examples of a base rate used in floating-rate loan coupons.", options: ["SONIA (Sterling Overnight Index Average)","Euribor (Euro Interbank Offered Rate)","The cap rate","The DSCR"], correct: [0,1], tag: "recall", explain: "SONIA (UK) and Euribor (Eurozone) are base rates — a floating coupon is the base rate plus a spread. The cap rate and DSCR are not base rates." },
      { q: "A 'bullet' loan structure means:", options: ["The loan amortises fully over the term","0% amortisation — the entire principal is repaid at maturity","The loan has a floating rate","The loan has no maturity date"], correct: [1], tag: "trap", explain: "A bullet loan has 0% amortisation — the entire principal is repaid in one lump at maturity. Do not confuse it with partial amortisation, where the balance is paid down over time." },
      { q: "Why are fees explicitly highlighted as important to a lender's return?", options: ["Fees are irrelevant to realised IRR","Origination, extension and exit fees are meaningful to a lender's realised IRR — not just the coupon","Fees only matter to the borrower","Fees replace the coupon entirely"], correct: [1], tag: "trap", explain: "A lender's return has two components — the interest coupon AND fees (origination, extension, exit, unused-line). Fees are explicitly called out as meaningful to realised IRR; assuming only the coupon matters is a trap." },
      { q: "Select ALL of the following that are reasons private debt exists.", options: ["Post-GFC Basel III/IV regulation made transitional RE lending expensive for banks","Banks retreated from certain lending segments, leaving a gap","Complex deals (development, repositioning, transitional assets) need bespoke underwriting","Private credit funds can charge higher coupons for taking additional risk"], correct: [0,1,2,3], tag: "recall", explain: "All four explain why private debt exists: Basel regulation made bank lending expensive, banks retreated, complex deals need bespoke underwriting, and private funds fill the gap charging higher coupons for the risk." },
      { q: "In the capital stack, where does senior debt sit?", options: ["Bottom of the stack — first loss, highest upside","Top of the stack — safest, lowest yield, paid first","Middle — between equity and mezzanine","Outside the stack entirely"], correct: [1], tag: "concept", explain: "Senior debt sits at the top of the stack — safest, lowest yield, paid first. Equity sits at the bottom — first loss, highest upside, paid last." },
      { q: "How do gains and losses move through the capital stack?", options: ["Gains rise up, losses fall down","Gains fall DOWN the stack (to equity first); losses rise UP the stack (hitting equity first)","Both gains and losses hit senior first","Gains and losses are shared equally"], correct: [1], tag: "concept", explain: "Gains fall down the stack and accrue to equity first; losses rise up the stack, hitting equity first, then mezzanine, then senior last. Equity has the most upside and the first loss." },
      { q: "In a downside scenario, which tranche absorbs losses first?", options: ["Senior debt","Mezzanine","Equity","They share losses equally"], correct: [2], tag: "concept", explain: "Equity absorbs losses first. Mezzanine absorbs losses second. Senior debt is protected last — it only takes a loss once equity and mezzanine are wiped out." },
      { q: "'Mezzanine is the safest tranche in the capital stack.' This statement is:", options: ["True — mezzanine is senior to everything","False — mezzanine absorbs losses second; senior is safest, equity absorbs losses first","True — mezzanine has no risk","False — equity is the safest tranche"], correct: [1], tag: "trap", explain: "Mezzanine is NOT the safest — it absorbs losses second, after equity. Senior debt is the safest. Mezzanine sits between senior and equity in both risk and return. A common trap." },
      { q: "What does the 'attachment point' of a tranche define?", options: ["Where the tranche ends (top of exposure)","Where the tranche starts (bottom of its exposure)","The tranche's coupon","The maturity date"], correct: [1], tag: "recall", explain: "The attachment point is where the tranche starts — the bottom of its exposure. The detachment point is where it ends — the top. Together they define the tranche's risk and return profile." },
      { q: "In a Senior + Mezz + Equity structure, which tranche is most often retained by the private lender?", options: ["The senior loan — typically syndicated out to banks","The mezzanine — the 'private lender position'","The equity — kept by the sponsor","None — all are sold"], correct: [1], tag: "concept", explain: "The senior loan is typically syndicated out to banks; equity stays with the sponsor; the mezzanine is often retained by the private lender — the 'private lender position'." },
      { q: "What is the unlevered return on an all-equity purchase of a €100m asset generating €5m NOI?", options: ["2.5%","5.0%","7.5%","10.0%"], correct: [1], tag: "calc", explain: "Unlevered return = NOI / Total Investment = €5m / €100m = 5.0%. With no leverage there is no spread or amplification — the equity earns exactly the cap rate." },
      { q: "An asset yields 5%. A loan at 75% LTV costs 4%. Using the levered return shortcut, what is the levered equity return?", options: ["5.0%","6.0%","8.0%","12.0%"], correct: [2], tag: "calc", explain: "Levered Return = Unlevered Return + Turns of Leverage × Net Interest Margin. Turns = 75/25 = 3x; NIM = 5% − 4% = 1%. So 5% + 3 × 1% = 8.0%." },
      { q: "What is 'negative carry'?", options: ["When the asset yield exceeds the cost of debt","When the asset yield is BELOW the cost of debt","When a loan has no coupon","When equity earns more than the cap rate"], correct: [1], tag: "concept", explain: "Negative carry is when the asset yield is below the cost of debt. In that case leverage destroys value rather than amplifying return — one of the most exam-tested concepts." },
      { q: "When does leverage AMPLIFY equity returns?", options: ["When asset yield is below the cost of debt","When asset yield equals the cost of debt","When asset yield exceeds the cost of debt","Leverage always amplifies returns"], correct: [2], tag: "concept", explain: "Leverage amplifies returns when the asset yield exceeds the cost of debt (positive spread). When yield equals debt cost, leverage does nothing; when yield is below debt cost, leverage destroys value." },
      { q: "When asset yield exactly EQUALS the cost of debt, leverage:", options: ["Amplifies the return","Does nothing — it is neutral","Destroys value","Doubles the return"], correct: [1], tag: "concept", explain: "When asset yield equals the cost of debt, the net interest margin is zero, so leverage does nothing — the levered return equals the unlevered return regardless of how much debt is used." },
      { q: "'Turns of leverage' is defined as:", options: ["Debt ÷ Equity","Equity ÷ Debt","NOI ÷ Debt Service","Loan ÷ Property Value"], correct: [0], tag: "calc", explain: "Turns of Leverage = Debt ÷ Equity. At 75% LTV, debt is 75 and equity is 25, so turns = 75/25 = 3x. It measures how many times equity is multiplied by debt." },
      { q: "At 3x leverage, a 25% fall in asset value does what to the equity?", options: ["Reduces equity by 25%","Reduces equity by 50%","Wipes out the equity completely (−100%)","Has no effect on equity"], correct: [2], tag: "calc", explain: "Equity Loss % = Asset Value Decrease % × (Turns of Leverage + 1) = 25% × (3 + 1) = 100%. A 25% value fall at 3x leverage wipes out the equity entirely, while the debt remains fully covered." },
      { q: "Using Equity Loss % = Asset Decline % × (Turns + 1), a 5% asset value fall at 3x leverage cuts equity by:", options: ["5%","15%","20%","25%"], correct: [2], tag: "calc", explain: "Equity Loss % = 5% × (3 + 1) = 20%. Leverage magnifies the loss — a modest 5% asset decline becomes a 20% hit to equity at 3x leverage." },
      { q: "Net Interest Margin (NIM) in the levered return formula is:", options: ["Debt Cost − Unlevered Return","Unlevered Return − Debt Cost","Coupon + Fees","NOI ÷ Loan Amount"], correct: [1], tag: "calc", explain: "NIM = Unlevered Return − Debt Cost. A positive NIM means leverage amplifies returns; a negative NIM (negative carry) means leverage destroys value." },
      { q: "The key exam statement 'debt is equity thinking priced differently' means:", options: ["Debt and equity are identical instruments","Debt and equity view the same deal from a different seat in the capital structure — different risk, different price","Debt always earns more than equity","Equity has no risk"], correct: [1], tag: "concept", explain: "The same deal is viewed from a different seat in the capital structure: debt and equity price the same underlying asset differently because they take different risk. Position is a risk choice, not a fixed role." },
      { q: "Which investment strategy relies on BOTH income growth AND multiple expansion (repricing)?", options: ["Core / Core+","Value-add / opportunistic","Private real estate debt","Senior lending"], correct: [1], tag: "concept", explain: "Value-add / opportunistic relies on both income growth (driver 2) and market repricing / multiple expansion (driver 3) — not just current income. Its typical IRR is around 12–20%+." },
      { q: "Select ALL of the following that are INVESTMENT-LEVEL benefits of leverage.", options: ["Return amplification when asset return exceeds cost of debt","Enhanced competitivity — buyers can pay more and still hit targets","Operational discipline — management focused on deleveraging","Dividend recapitalisation at the fund level"], correct: [0,1,2], tag: "recall", explain: "The first three are investment-level benefits. Dividend recapitalisation is a FUND-level benefit, not investment-level. The course distinguishes investment-level (I) from fund-level (F) effects." },
      { q: "Which is a FUND-LEVEL risk of leverage?", options: ["Loss amplification on a single deal","Refinancing risk — a maturity wall in an unfavourable market delaying payouts","Overpaying for a single asset","Covenant breach on one loan"], correct: [1], tag: "concept", explain: "Refinancing risk — a maturity wall in an unfavourable market delaying investor payouts — is a fund-level risk. Loss amplification, overpaying and covenant breaches are investment-level risks." },
      { q: "Why can cheap debt encourage 'overpaying' for an asset?", options: ["Cheap debt has no cost","Cheap debt lets buyers bid more aggressively, away from the asset's true economic value","Cheap debt forces lower prices","Cheap debt eliminates risk"], correct: [1], tag: "concept", explain: "Cheap debt lets buyers pay more and still hit return targets, encouraging aggressive pricing that drifts away from the asset's true economic value — a recognised investment-level risk of leverage." },
      { q: "Which three tranches can all exist on the same deal, at different risk and price?", options: ["Senior mortgage, mezzanine loan, equity","Aaa, Aa, A bonds only","SONIA, Euribor, cap rate","Core, value-add, opportunistic"], correct: [0], tag: "concept", explain: "Senior mortgage, mezzanine loan and equity can all sit on the same deal — three seats at the same table. Senior is paid first at the lowest yield; equity is paid last with the highest upside." },
      { q: "A typical indicative yield for a senior mortgage versus equity is:", options: ["Senior 12–20%+; equity 3–5%","Senior 3–5%; equity 12–20%+","Both around 8–13%","Senior and equity have identical yields"], correct: [1], tag: "recall", explain: "Senior mortgage yields around 3–5% (first claim, lowest risk); equity targets 12–20%+ (residual cash flow and capital gain, highest risk). Mezzanine sits between, around 8–13%." },
      { q: "How does levered return vary with the cap rate and the coupon?", options: ["Non-linearly with both","Linearly with both — equal-sized moves have equal-sized impact","It does not vary with either","Only with the coupon"], correct: [1], tag: "concept", explain: "Levered return varies linearly with both cap rate and coupon — a 5%→6% cap rate move has the same impact as 4%→5%, and a coupon move of equal size has an equal (opposite-signed) impact." },
      { q: "How does levered return vary with LTV / turns of leverage?", options: ["Linearly","Non-linearly — moving from 60%→75% LTV has more impact than 45%→60%","It does not vary with leverage","Inversely and linearly"], correct: [1], tag: "concept", explain: "Levered return varies NON-linearly with LTV: going from 60%→75% LTV has more impact than 45%→60%. The more leverage, the riskier — and lenders charge more for it." },
      { q: "What is the key teaching point of the closing quote 'leverage is not a return engine'?", options: ["Leverage always creates return","Leverage is a magnifier — of the asset, of judgement, and of mistakes already made — not a source of return","Leverage should never be used","Leverage manufactures return from nothing"], correct: [1], tag: "concept", explain: "Leverage does not manufacture return — it magnifies what is already there: the asset, the judgement and the mistakes. If the asset is broken, leverage cannot fix it." },
      { q: "Comparing Deal A (6% unlevered, 55% LTV, 5% coupon) and Deal B (5% unlevered, 65% LTV, 4.5% coupon), what does the exercise conclude?", options: ["Deal B is always better","Deal A has higher return AND lower leverage; the choice 'depends on your aversion to risk'","The two deals are identical","Deal A uses more leverage"], correct: [1], tag: "concept", explain: "Deal A delivers a higher levered return (7.2%) with lower leverage; Deal B uses more leverage for a lower return (5.9%). The conclusion: it depends on your aversion to risk — A dominates on both counts here." },
      { q: "What is the legal instrument that gives a lender its claim on the asset if the borrower defaults?", options: ["The covenant","The mortgage","The cap rate","The coupon"], correct: [1], tag: "recall", explain: "The mortgage is the legal instrument — it is the lender's claim on the asset if the borrower defaults. A loan is usually secured against the real asset via the mortgage." },
      { q: "An LTV covenant is typically tested at what level relative to the lending LTV?", options: ["Exactly at the lending LTV","Around 5–10% above the lending LTV","50% below the lending LTV","There is no LTV covenant"], correct: [1], tag: "recall", explain: "An LTV covenant is typically set 5–10% above the lending LTV — a breach triggers if the property value falls enough to push the LTV above that covenant level." },
      { q: "Debt Yield is defined as:", options: ["NOI ÷ Loan Amount","Loan Amount ÷ NOI","NOI ÷ Debt Service","Loan ÷ Property Value"], correct: [0], tag: "calc", explain: "Debt Yield = NOI ÷ Loan Amount, typically around 6–10%. It differs from DSCR (NOI ÷ Debt Service) and from LTV (Loan ÷ Property Value)." },
      { q: "Which best describes the relationship between position in the capital stack and risk?", options: ["Position is a fixed role assigned by regulators","Position is a risk choice — you can be senior, mezz or equity on the same deal, at different risk and price","Position has no effect on risk","Only equity carries any risk"], correct: [1], tag: "concept", explain: "Position in the stack is a risk choice, not a fixed role. The same investor could take senior, mezzanine or equity exposure on the same deal — each is a different risk taken at a different price." },
      { q: "Why does a lender capture income growth only 'indirectly, via credit migration'?", options: ["Lenders receive a fixed coupon, so rising NOI improves the borrower's credit rather than the lender's cash return","Lenders receive all the income growth directly","Income growth reduces the coupon","Lenders never benefit from income growth in any way"], correct: [0], tag: "concept", explain: "A lender's coupon is contractual and fixed, so rising NOI does not raise the lender's cash return. It only benefits the lender indirectly — by improving the borrower's credit quality (credit migration)." },
      { q: "In the leverage / equity wipeout exercise, while equity is being eroded by falling values, the debt is:", options: ["Wiped out before the equity","Still fully covered until the asset value falls to the debt level","Reduced proportionally with equity","Increased automatically"], correct: [1], tag: "concept", explain: "As asset value falls, equity absorbs the loss first. The debt stays fully covered until the asset value falls all the way to the debt amount — at which point the equity is fully wiped out." },
      { q: "Capital diversification — equity deploying across more deals and vintages — is classified as which kind of benefit?", options: ["An investment-level benefit","A fund-level benefit","A risk, not a benefit","A regulatory requirement"], correct: [1], tag: "recall", explain: "Capital diversification — spreading equity across more deals, vintages and larger portfolios — is a fund-level benefit of leverage, alongside dividend recapitalisation." },
      { q: "Cash-on-Cash yield for an equity investor is approximately:", options: ["Cap Rate − Recurring CapEx","Cap Rate + Coupon","NOI ÷ Debt Service","LTV × Coupon"], correct: [0], tag: "concept", explain: "Cash-on-Cash yield ≈ Cap Rate − Recurring CapEx. It is the current-income return earned simply by holding the asset — the equity-investor equivalent of the lender's coupon." },
      { q: "Which statement about covenant constraints as a risk of leverage is correct?", options: ["Covenants eliminate all risk for the borrower","DSCR, LTV and debt yield covenants can trigger forced selling — an investment-level risk","Covenants only benefit the borrower","Covenants are a fund-level benefit"], correct: [1], tag: "concept", explain: "Covenant constraints are an investment-level risk: DSCR, LTV and debt yield covenants can be breached and trigger forced selling at a bad time — a real downside of using leverage." },
      { q: "Why does more leverage lead lenders to charge a higher coupon?", options: ["Lenders dislike large loans","Higher leverage is riskier for the lender, so they require more compensation for the risk taken","Regulation fixes the coupon","Higher leverage always means a safer loan"], correct: [1], tag: "concept", explain: "More leverage means a thinner equity cushion beneath the lender — more risk. Lenders charge a higher coupon to compensate for that additional risk, which is why levered return rises non-linearly with LTV." },
      { q: "Which single principle unifies the pricing of equity, mezzanine and senior debt?", options: ["Every return is yield + spread × turns — the same identity, you just change the basis","All tranches earn the same return","Only equity has a return","Returns are random"], correct: [0], tag: "concept", explain: "The same identity — return is yield plus spread times turns of leverage — prices equity, mezzanine and senior debt alike. You just change the basis: it is one deal viewed from different seats." },
      { q: "A loan with '4% amortisation' over its term is best described as:", options: ["A bullet loan with 0% amortisation","A partially amortising loan — the balance is paid down over time, de-risking the lender","A loan with no interest","A loan that never repays principal"], correct: [1], tag: "concept", explain: "Amortisation means repaying the balance over the loan's life. A 4% amortising loan pays down principal gradually — de-risking the lender — as opposed to a bullet loan, which repays everything at maturity." },
      { q: "An asset has stabilised NOI of £4m and a cap rate of 5%. What is the asset value?", options: ["£20m","£40m","£80m","£200m"], correct: [2], tag: "calc", explain: "Asset Value = NOI / Cap Rate = £4m / 0.05 = £80m. A 5% cap rate equals a 20x multiple of NOI." },
      { q: "Select ALL correct statements about an asset bought at a 5% cap rate with a 75% LTV loan at 4% coupon.", options: ["The Net Interest Margin is 1% (5% unlevered − 4% debt cost)","Turns of leverage are 3x (75% LTV / 25% equity)","The levered return is 8% (5% + 3 × 1%)","If the cap rate fell to 4%, equalling the debt cost, leverage would double the return"], correct: [0,1,2], tag: "trap", explain: "If cap rate equals debt cost, NIM = 0% and leverage adds nothing (3 × 0% = 0%). Leverage doubles gains only when NIM equals the unlevered return, which would need a zero debt cost." },
      { q: "An asset worth £100m with a £75m loan (3x leverage) falls in value by 20%. What is the equity loss percentage?", options: ["−20%","−40%","−60%","−80%"], correct: [3], tag: "calc", explain: "Equity Loss % = Asset Decrease % × (Turns + 1) = 20% × 4 = 80%. Asset £100m → £80m; debt £75m stays; equity £25m → £5m, a −80% hit. Not a wipeout — that needs a 25% decline." },
      { q: "Select ALL correct descriptions of the THREE drivers of real estate return.", options: ["Current Income — the cash-on-cash return from simply holding the asset","Income Growth — higher NOI from rent rises, better occupancy or cost reduction","Market Repricing — cap rate compression lifting value without touching cash flow","Tax Efficiency — structuring to minimise withholding and transaction taxes"], correct: [0,1,2], tag: "trap", explain: "The three return drivers are current income, income growth and market repricing. Tax efficiency is not one of them." },
      { q: "Why does Core Real Estate have a typical IRR of only 5–8% despite being an equity investment?", options: ["Core RE uses 100% debt financing, limiting equity returns","Core RE is in low-growth markets with limited rent prospects","Core RE is primarily driven by current income, with minimal income-growth or cap-rate-compression upside","Core RE is a debt instrument, not an equity investment"], correct: [2], tag: "trap", explain: "Core RE is low-risk EQUITY relying mainly on stable current income — little Driver 2 or Driver 3 upside. The low IRR reflects low risk, not that it is debt (a classic trap)." },
      { q: "Select ALL that correctly describe the asymmetry between equity and debt investors in CRE.", options: ["Equity captures all three return drivers — income, growth and repricing","Debt captures primarily current income (the coupon)","Debt captures income growth only indirectly via credit migration","Debt captures cap rate repricing upside when property values rise"], correct: [0,1,2], tag: "trap", explain: "Debt does NOT capture cap rate repricing upside — a rising value does not benefit the lender, who receives only a fixed coupon. Only falling values harm the lender, via LGD." },
      { q: "Deal A (6% unlevered, 55% LTV, 5% coupon) versus Deal B (5% unlevered, 65% LTV, 4.5% coupon). Which has the higher levered return, and what is it?", options: ["Deal B: 8.2%","Deal A: 7.2%","Deal B: 5.9%","Both return 7.0%"], correct: [1], tag: "calc", explain: "Deal A: turns 55/45 = 1.22x, NIM 1%, levered = 6% + 1.22% = 7.2%. Deal B: turns 65/35 = 1.86x, NIM 0.5%, levered = 5% + 0.93% = 5.9%. Deal A wins despite lower leverage." },
      { q: "Select ALL that are INVESTMENT-LEVEL (not fund-level) benefits of leverage.", options: ["Return amplification — when asset yield > debt cost, leverage multiplies equity ROI","Enhanced competitivity — leveraged buyers can pay more and still hit targets","Operational discipline — management focused on deleveraging and value creation","Dividend recapitalisation — borrowing new money to pay out investors"], correct: [0,1,2], tag: "trap", explain: "Dividend recapitalisation (and capital diversification) are fund-level benefits. Investment-level benefits affect the individual deal: amplification, competitivity, discipline." },
      { q: "At what minimum decline in asset value is equity completely wiped out on a 75% LTV (3x leverage) purchase?", options: ["15%","20%","25%","40%"], correct: [2], tag: "calc", explain: "Wipeout occurs when value falls to the loan amount: £75m / £100m = 75%, a 25% decline. At £75m value, debt = £75m and equity = £0." },
      { q: "Select ALL reasons the private debt market emerged and grew significantly post-GFC.", options: ["Basel III/IV risk-weights made certain CRE lending expensive for banks, causing retreat","Development and transitional assets need bespoke underwriting banks tend to avoid","Private credit funds can take additional risk, charging higher coupons for the premium","Private credit funds are subject to the same Basel capital requirements as banks"], correct: [0,1,2], tag: "trap", explain: "Private credit funds are NOT bound by Basel capital requirements — which is why they can fill the gap AND why it creates potential financial stability risk." },
      { q: "In a three-tranche stack (Senior 0–60%, Mezzanine 60–80%, Equity 80–100%), property value falls to 65% of original. Who suffers losses?", options: ["Senior debt only — equity and mezzanine are shielded","Equity only — value exceeds the mezzanine attachment point","Equity (fully wiped out) and Mezzanine (partially impaired)","All three tranches proportionally"], correct: [2], tag: "concept", explain: "At 65% value: equity (80–100%) is fully wiped; mezzanine (60–80%) recovers only from 60% to 65% — partially impaired; senior (0–60%) is fully covered." },
      { q: "Select ALL that are the 'two components of lender return' in private debt.", options: ["Interest coupon — fixed or floating — over the life of the loan","Fees — origination, extension, exit, unused-line — material to realised IRR","Equity upside — participation in property value appreciation","Capital gains from trading the loan in secondary markets"], correct: [0,1], tag: "trap", explain: "Lender return is the coupon plus fees. Equity upside and secondary-market gains are not part of the standard private lender return model. Forgetting that fees matter to IRR is a trap." },
      { q: "An asset's NOI is £5m at a 5% cap rate. If the cap rate rises to 6% with no change in NOI, by what percentage does value change?", options: ["−5%","−10%","−16.7%","+20%"], correct: [2], tag: "calc", explain: "At 5%: value = £5m/0.05 = £100m. At 6%: value = £5m/0.06 = £83.3m. Change = −16.7%. Higher cap rate (denominator) means lower value." },
      { q: "Select ALL that correctly describe FUND-LEVEL risks of leverage.", options: ["Refinancing risk — a maturity wall in an unfavourable market delaying investor payouts","Limited equity deployment — deploying less per deal creating dry-powder sub-optimisation","Loss amplification at the individual deal level when yield < debt cost","Overpaying — cheap debt encouraging aggressive pricing away from true value"], correct: [0,1], tag: "trap", explain: "Loss amplification and overpaying are investment-level risks. Fund-level risks concern portfolio dynamics — timing of returns and capital deployment." },
      { q: "SONIA (Sterling Overnight Index Average) is referenced as an example of a base rate. What is SONIA?", options: ["A fixed government bond benchmark set quarterly by the Bank of England","The overnight rate at which banks lend to each other in sterling — the reference for floating-rate sterling loans","The Eurozone equivalent of Euribor","A fixed rate published daily by the FCA for CRE lending"], correct: [1], tag: "recall", explain: "SONIA is the UK risk-free overnight reference rate — the basis for floating-rate sterling loans (e.g. 'SONIA + 250bps'). Euribor is the Euro equivalent; both replaced LIBOR." },
      { q: "Select ALL that correctly describe the senior + mezzanine + equity capital stack.", options: ["Senior (0–60% LTV) is typically syndicated out to banks or other lenders","Mezzanine (60–80% LTV) is often retained by the private lender — the 'private lender position'","Equity (80–100%) stays with the sponsor","Mezzanine holders receive all capital gains when the property is sold"], correct: [0,1,2], tag: "trap", explain: "Gains accrue to EQUITY, the bottom of the stack. Mezzanine receives its fixed coupon but no capital-gains upside — only equity participates in value creation." },
      { q: "What does a Debt Yield covenant of 'minimum 7.0%' mean in a CRE loan?", options: ["The interest rate on the loan cannot exceed 7.0%","The property's NOI must be at least 7.0% of the outstanding loan balance","The annual DSCR must be at least 7.0x","The cap rate cannot fall below 7.0%"], correct: [1], tag: "concept", explain: "Debt Yield = NOI / Loan Amount. A 7% covenant means NOI must be at least 7% of the loan balance — a direct income-to-debt measure, independent of property value." },
      { q: "Select ALL correct interpretations of CRE DSCR thresholds (illustrative range 1.1x–1.3x).", options: ["A DSCR of 1.0x means NOI exactly equals debt service — no margin for error","A DSCR below 1.0x means the property cannot cover interest without an equity injection","A DSCR of 2.0x indicates a strong coverage buffer","DSCR = NOI / Loan Amount"], correct: [0,1,2], tag: "trap", explain: "DSCR = NOI / Debt Service, not NOI / Loan Amount (that is Debt Yield). Confusing the two is an explicit exam trap." },
      { q: "Why does levered return vary NON-LINEARLY with LTV, even though the levered return formula appears linear?", options: ["Lenders charge higher coupons at higher LTVs, compressing the NIM as leverage rises; and Turns = Debt/Equity itself rises non-linearly","Moody's applies rating caps at certain LTV thresholds","The formula contains an exponential term above 60% LTV","NOI declines as property values fall, creating a feedback loop"], correct: [0], tag: "concept", explain: "The formula is linear for a fixed coupon. But higher LTV means a higher coupon and a lower NIM, and the Turns ratio itself jumps non-linearly — from 60% to 75% LTV, turns go from 1.5x to 3x." },
      // ---- 200-question bank additions ----
      { q: "An asset has stabilised NOI of £4M and a cap rate of 5%. What is the asset value?", options: ["£20M","£40M","£80M","£200M","£400M"], correct: [2], tag: "concept", explain: "Asset Value = NOI / Cap Rate = £4M / 0.05 = £80M. This is the fundamental property valuation formula: a 5% cap rate = a 20x multiple of NOI." },
      { q: "An investor purchases an asset at 5% cap rate with a 75% LTV loan at 4% coupon. Which of the following correctly describe the levered return mechanics?", options: ["The Net Interest Margin (NIM) is 1% (5% unlevered – 4% debt cost)","The Turns of Leverage are 3x (75% LTV / 25% equity)","The levered return is 8% (5% + 3 × 1%)","If the cap rate fell to 4% (equalling the debt cost), leverage would double the return","If the cap rate fell below 4%, leverage would amplify losses rather than gains"], correct: [0,1,2,4], tag: "concept", explain: "D is wrong — if cap rate = debt cost (NIM = 0%), leverage does NOTHING (adds 3 × 0% = 0%). It is only when cap rate < debt cost that leverage destroys value. Leverage doubles gains only when NIM = unlevered return, which would require the debt cost to be zero." },
      { q: "An asset worth £100M with a £75M loan (3x leverage) falls in value by 20%. What is the equity loss percentage?", options: ["−20% (same as asset loss)","−40%","−60%","−80%","−100% (equity wipeout)"], correct: [3], tag: "concept", explain: "Equity Loss % = Asset Decrease % × (Turns of Leverage + 1) = 20% × (3+1) = 80%. Asset value: £100M → £80M; Debt: £75M stays; Equity: £25M → £5M = −80%. Not a wipeout (that requires 25% decline)." },
      { q: "Which of the following correctly describe the THREE drivers of real estate return?", options: ["Current Income (cash-on-cash / coupon): the return from simply holding the asset","Income Growth: higher NOI through rent increases, better occupancy, or cost reduction","Market Repricing: cap rate compression lifting asset value without touching cash flow","Debt Amortisation: principal repayment reducing the loan balance and building equity","Tax Efficiency: structuring to minimise withholding and transaction taxes"], correct: [0,1,2], tag: "concept", explain: "The three canonical return drivers per the session are: current income, income growth, and market repricing (cap rate movement). Debt amortisation builds equity but is classified as part of the leverage structure rather than a standalone return driver in this framework. Tax efficiency is not a return driver in this context." },
      { q: "Why does \"Core Real Estate\" have a typical IRR of only 5–8% despite being an equity investment?", options: ["Because Core RE uses 100% debt financing, limiting equity returns","Because Core RE is typically located in low-growth markets with limited rent prospects","Because Core RE is primarily driven by current income (Driver 1) with minimal income growth or cap rate compression upside","Because Core RE is a debt instrument — not an equity investment","Because Core RE assets are not eligible for institutional investment mandates"], correct: [2], tag: "concept", explain: "Core RE is LOW-RISK equity relying primarily on stable current income. Limited value-add potential means little Driver 2 (income growth) or Driver 3 (cap rate compression) upside. Low IRR reflects low risk, not that it is debt (a common exam trap)." },
      { q: "Which of the following correctly describe the asymmetry between equity and debt investors in CRE?", options: ["Equity captures all three return drivers: current income, growth, and repricing","Debt captures primarily Driver 1 (current income / coupon)","Debt captures Driver 2 (income growth) only indirectly via credit migration","Debt captures Driver 3 (cap rate repricing) when property values rise above a threshold","The different pricing reflects different risk: debt is equity thinking priced differently because the risk is different"], correct: [0,1,2,4], tag: "concept", explain: "D is wrong — debt does NOT capture cap rate repricing upside. A rising property value does not benefit the lender (they receive only their fixed coupon + principal). Only falling values harm the lender (by threatening LGD). This asymmetry is fundamental to the debt/equity distinction." },
      { q: "Two deals are presented: Deal A (6% unlevered, 55% LTV, 5% coupon) and Deal B (5% unlevered, 65% LTV, 4.5% coupon). Which deal has the higher levered return and what is it?", options: ["Deal B: 8.2%","Deal A: 7.2%","Deal B: 5.9%","Deal A: 6.8%","Both generate the same levered return of 7.0%"], correct: [1], tag: "concept", explain: "Deal A: Turns = 55/45 = 1.22x, NIM = 6%–5% = 1%, Levered return = 6% + 1.22×1% = 7.22%. Deal B: Turns = 65/35 = 1.86x, NIM = 5%–4.5% = 0.5%, Levered return = 5% + 1.86×0.5% = 5.93%. Deal A wins despite lower leverage." },
      { q: "Which of the following are listed as INVESTMENT-LEVEL (not fund-level) BENEFITS of leverage?", options: ["Return amplification: when asset yield > debt cost, leverage multiplies equity ROI","Enhanced competitivity: leveraged buyers can pay more and still hit return targets","Operational discipline: management focused on deleveraging and value creation","Dividend recapitalisation: borrow new money to pay out investors in favourable markets","Capital diversification: deploy equity across more deals and more vintages"], correct: [0,1,2], tag: "concept", explain: "D (dividend recapitalisation) and E (capital diversification) are explicitly FUND-LEVEL benefits. Investment-level benefits are those that affect the individual deal's return/risk profile: amplification, competitivity, and discipline." },
      { q: "At what minimum LTV decline does equity become completely wiped out on a 75% LTV (3x leverage) asset purchase?", options: ["15% decline in asset value","20% decline in asset value","25% decline in asset value","30% decline in asset value","40% decline in asset value"], correct: [2], tag: "concept", explain: "Equity wipeout occurs when asset value falls to the loan amount: £75M (loan) / £100M (original value) = 75% — a 25% decline. At £75M asset value: debt = £75M, equity = £0. This is why higher leverage dramatically increases equity risk." },
      { q: "Which of the following are reasons why the private debt market emerged and grew significantly post-GFC?", options: ["Basel III/IV risk-weights made certain CRE lending expensive on bank balance sheets, causing banks to retreat","Development, repositioning, and transitional assets require bespoke underwriting that traditional banks tend to avoid","Private credit funds can take on additional risks, charging higher coupons for the additional risk premium","Private credit funds are subject to the same Basel capital requirements as banks","The bank retreat created a gap that private credit stepped in to fill"], correct: [0,1,2,4], tag: "concept", explain: "D is wrong — and critically important: private credit funds are NOT bound by Basel capital requirements. This is simultaneously why they can fill the gap AND why it creates potential financial stability risks (they take on risk without the capital buffer requirements banks face)." },
      { q: "In the three-tranche capital structure (Senior 0–60% LTV, Mezzanine 60–80% LTV, Equity 80–100%), a property value falls to 65% of original value. Who suffers losses?", options: ["Senior debt only — equity and mezzanine are junior and shielded","Equity only — value exceeds the mezzanine attachment point","Equity (fully wiped out) and Mezzanine (partially impaired)","All three tranches proportionally","Mezzanine only — equity has already been wiped by the time value falls to 65%"], correct: [2], tag: "concept", explain: "At 65% value: Equity (80–100% LTV) = 100% wiped (0% recovery). Mezzanine (60–80% LTV): attachment at 60%, detachment at 80%. Value = 65% → mezzanine recovers only from 60% to 65% (5 of 20%) → partially impaired. Senior (0–60%) is unaffected — fully covered at 65% value." },
      { q: "The \"two components of lender return\" in private debt are:", options: ["Interest coupon — fixed or floating — paid over the life of the loan","Fees — origination, extension, exit, unused-line — material to realised IRR","Equity upside — participation in property value appreciation above the loan amount","Credit enhancement — the benefit of junior tranches absorbing losses first","Capital gains — from buying and selling the loan in secondary markets"], correct: [0,1], tag: "concept", explain: "Lender return in private debt comes from the coupon AND fees. Equity upside, credit enhancement, and secondary market gains are NOT part of the standard private lender return model. A specific exam trap is forgetting that fees are explicitly called out as material to realised IRR." },
      { q: "An asset's NOI is £5M and the cap rate is 5%. If the cap rate rises to 6% with no change in NOI, by what percentage does the property value change?", options: ["−5%","−10%","−16.7%","−20%","+20% (values rise when cap rates rise)"], correct: [2], tag: "concept", explain: "At 5% cap: Value = £5M/0.05 = £100M. At 6% cap: Value = £5M/0.06 = £83.3M. Change = −£16.7M = −16.7%. This illustrates the inverse relationship: the same NOI, but a higher cap rate (denominator), produces a lower value." },
      { q: "Which of the following correctly describe FUND-LEVEL risks of leverage?", options: ["Refinancing risk: a maturity wall in an unfavourable market can delay investor payouts","Limited equity deployment: deploying less equity per deal can create dry powder sub-optimisation","Loss amplification at the individual deal level when asset yield < cost of debt","Overpaying: cheap debt encourages aggressive pricing away from true economic value","The maturity wall creating systemic pressure if multiple deals mature simultaneously in stressed markets"], correct: [0,1,4], tag: "concept", explain: "C (loss amplification) and D (overpaying) are explicitly listed as INVESTMENT-LEVEL risks, not fund-level risks. The distinction matters for the exam: fund-level risks are about portfolio-level dynamics (timing of returns, capital deployment), not individual deal economics." },
      { q: "Why does levered return vary NON-LINEARLY with LTV, even though the levered return formula (Unlevered Return + Turns × NIM) appears linear?", options: ["Because lenders charge higher coupons at higher LTVs (reflecting greater risk), which compresses the NIM as leverage increases","Because Moody's applies rating caps at certain LTV thresholds","Because the formula contains an exponential term for leverage above 60%","Because NOI declines as property values fall, creating a feedback loop","Because the unlevered return changes as LTV changes"], correct: [0], tag: "concept", explain: "The formula IS linear for a given coupon. But in practice, higher LTV → higher coupon charged by the lender → lower NIM → the return increment per additional turn of leverage diminishes. Additionally, the Turns = Debt/Equity ratio itself changes non-linearly (from 60% to 75% LTV, Turns jump from 1.5x to 3x)." },
      { q: "The term \"negative carry\" refers to which scenario, and what are its consequences?", options: ["Asset yield (cap rate) is BELOW the cost of debt (coupon)","In a negative carry environment, every additional turn of leverage DESTROYS equity return","Negative carry is the single most dangerous situation for a leveraged equity investor","Negative carry means NOI is insufficient to cover operating expenses","Negative carry is equivalent to DSCR < 1.0x — income cannot cover debt service"], correct: [0,1,2,4], tag: "concept", explain: "D confuses negative carry with operating NOI being negative. Negative carry specifically describes the relationship between asset yield and debt cost. When the asset earns less than the debt costs, leverage is a return destroyer — DSCR < 1.0x is the operational manifestation of this." },
      { q: "SONIA (Sterling Overnight Index Average) is referenced as an example of a base rate in loan pricing. What is SONIA?", options: ["A fixed government bond benchmark rate set by the Bank of England quarterly","The overnight rate at which banks lend to each other in sterling — the reference for floating rate sterling loans","The Eurozone equivalent of Euribor, used for sterling-denominated CMBS","A fixed rate published daily by the Financial Conduct Authority for CRE lending","The minimum base rate required by Moody's for AAA-rated structured finance transactions"], correct: [1], tag: "concept", explain: "SONIA (Sterling Overnight Index Average) is the UK risk-free overnight reference rate — the basis for floating rate sterling loans (e.g. \"SONIA + 250bps spread\"). Euribor is the Euro equivalent. Both replaced LIBOR as the reference rates following the 2021 LIBOR transition." },
      { q: "In the capital stack comparison, which of the following correctly describe the senior + mezzanine + equity structure?", options: ["Senior (0–60% LTV) is typically syndicated out to banks or other lenders","Mezzanine (60–80% LTV) is often retained by the private lender — this is the characteristic \"private lender position\"","Equity (80–100% LTV equivalent) stays with the sponsor","Mezzanine holders receive all capital gains when the property is sold","Senior holders are the last to suffer losses in a distress scenario"], correct: [0,1,2,4], tag: "concept", explain: "D is wrong — gains accrue to EQUITY (the bottom of the stack upward). Mezzanine receives its fixed coupon but no capital gains upside above that. Only equity participates in cap rate compression value creation." },
      { q: "What does a Debt Yield covenant of \"minimum 7.0%\" mean in a CRE loan?", options: ["The interest rate on the loan cannot exceed 7.0%","The property's NOI must be at least 7.0% of the outstanding loan balance","The annual DSCR must be at least 7.0x","The cap rate on the property cannot fall below 7.0% during the loan term","The lender's minimum required return on the loan is 7.0%"], correct: [1], tag: "concept", explain: "Debt Yield = NOI / Loan Amount. A 7% covenant means the property must generate NOI of at least 7% of the loan balance. If NOI falls below this threshold, the covenant is breached — regardless of LTV or DSCR. It is a direct measure of income-to-debt coverage without reference to property value." },
      { q: "Key illustrative DSCR ranges for CRE loans from the session are 1.1x–1.3x. Which of the following correctly interpret these thresholds?", options: ["A DSCR of 1.0x means NOI exactly equals debt service — no margin for error","A DSCR below 1.0x means the property cannot cover interest without equity injection","A DSCR of 2.0x (as in the Milan base case) indicates a strong coverage buffer","DSCR = NOI / Loan Amount (the debt yield formula)","A higher DSCR implies lower term default risk, all else equal"], correct: [0,1,2,4], tag: "concept", explain: "D is wrong — DSCR = NOI / Debt Service (interest + principal payments), NOT NOI / Loan Amount. Debt Yield = NOI / Loan Amount is a DIFFERENT metric. Confusing these two is an explicit exam trap." },
    ],
  },
];

const UPLOAD_TEMPLATE = `[
  {
    "q": "Your question text here?",
    "options": ["Option A", "Option B", "Option C", "Option D"],
    "correct": [1],
    "explain": "Why the answer is right.",
    "tag": "concept"
  }
]`;

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function prepare(q){
  let pool=q.options.map((text,i)=>({text,i})); let order;
  if(q.lockLast){ const last=q.options.length-1; order=[...shuffle(pool.filter(o=>o.i!==last)),pool[last]]; }
  else { order=shuffle(pool); }
  const cs=new Set(q.correct);
  return {...q, shuffledOptions:order, correctShuffled:order.map((o,p)=>cs.has(o.i)?p:-1).filter(p=>p!==-1)};
}
function setsEqual(a,b){ if(a.length!==b.length) return false; const sb=new Set(b); return a.every(x=>sb.has(x)); }
const TAG_LABELS={trap:"Trap",concept:"Concept",calc:"Calculation",recall:"Recall"};

// ---- difficulty ----
// Difficulty is derived consistently from each question's tag and type:
//  Easy   = single-answer recall questions
//  Medium = single-answer concept or calculation questions
//  Hard   = trap questions, and ALL multi-select questions
//           (select-all-that-apply is the harder real-exam format)
function difficultyOf(q){
  const multi=(q.correct||[]).length>1;
  if(multi) return "hard";
  if(q.tag==="trap") return "hard";
  if(q.tag==="concept"||q.tag==="calc") return "medium";
  return "easy";
}
const DIFF_LABELS={easy:"Easy",medium:"Medium",hard:"Hard"};
const DIFF_COLORS={easy:"#0F6E56",medium:"#B07B00",hard:"#A32D2D"};
// Count how many questions in a session fall into a given difficulty level.
function diffCount(session,level){
  return (session.questions||[]).filter(q=>difficultyOf(q)===level).length;
}
// Return a session's questions filtered to a difficulty ("all" = no filter).
function questionsByDifficulty(session,level){
  if(!level||level==="all") return session.questions||[];
  return (session.questions||[]).filter(q=>difficultyOf(q)===level);
}

// ---- localStorage helpers ----
const STORE_KEY="re-quiz-progress-v1";
function loadStore(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY))||{}; }catch(e){ return {}; } }
function saveStore(s){ try{ localStorage.setItem(STORE_KEY,JSON.stringify(s)); }catch(e){} }

// A stable id for a question (its text) so the wrong-pool survives shuffling.
function qid(q){ return q.q; }
// Look up a question object by id within a session.
function findQuestion(session,id){ return session.questions.find(q=>qid(q)===id); }

function App(){
  const [sessions,setSessions]=useState(SESSIONS);
  const [screen,setScreen]=useState("home");
  const [activeSession,setActiveSession]=useState(null);
  const [deck,setDeck]=useState([]);
  const [idx,setIdx]=useState(0);
  const [picks,setPicks]=useState([]);
  const [locked,setLocked]=useState(false);
  const [results,setResults]=useState([]);
  const [deckMode,setDeckMode]=useState("full"); // full | pool | combined
  const [uploadText,setUploadText]=useState("");
  const [uploadMsg,setUploadMsg]=useState(null);
  const [store,setStore]=useState(loadStore);
  const [diffFilter,setDiffFilter]=useState("all"); // all | easy | medium | hard

  useEffect(()=>{ saveStore(store); },[store]);

  const totalQuestions=sessions.reduce((s,x)=>s+x.questions.length,0);

  // Exam weighting — based on the confirmed exam breakdown, scaled to 70 questions.
  const EXAM_WEIGHTS={ratings101:14,socialhousing:12,coveredbonds:12,reits:11,cmbs:10,peprivatedebt:11};
  const EXAM_TOTAL=70;

  // ---- wrong-answer pool helpers ----
  function poolFor(sessionId){ return (store[sessionId]&&store[sessionId].pool)||[]; }
  function poolCount(sessionId){ return poolFor(sessionId).length; }
  function totalPoolCount(){ return sessions.reduce((n,s)=>n+poolCount(s.id),0); }

  function updatePool(sessionId,questionId,wasCorrect){
    setStore(prev=>{
      const s={...prev};
      const sess={...(s[sessionId]||{correct:0,wrong:0,pool:[]})};
      const pool=new Set(sess.pool||[]);
      if(wasCorrect) pool.delete(questionId);
      else pool.add(questionId);
      sess.pool=[...pool];
      s[sessionId]=sess;
      return s;
    });
  }

  // ---- flag helpers ----
  // store[sessionId].flags is an array of question ids the user has flagged.
  function flagsFor(sessionId){ return (store[sessionId]&&store[sessionId].flags)||[]; }
  function totalFlagCount(){ return sessions.reduce((n,s)=>n+flagsFor(s.id).length,0); }
  function isFlagged(sessionId,questionId){ return flagsFor(sessionId).includes(questionId); }

  function toggleFlag(sessionId,questionId){
    setStore(prev=>{
      const s={...prev};
      const sess={...(s[sessionId]||{correct:0,wrong:0,pool:[],flags:[]})};
      const flags=new Set(sess.flags||[]);
      if(flags.has(questionId)) flags.delete(questionId);
      else flags.add(questionId);
      sess.flags=[...flags];
      s[sessionId]=sess;
      return s;
    });
  }

  function recordResult(sessionId,correct){
    setStore(prev=>{
      const s={...prev};
      const sess={...(s[sessionId]||{correct:0,wrong:0,pool:[],flags:[]})};
      sess.correct=(sess.correct||0)+(correct?1:0);
      sess.wrong=(sess.wrong||0)+(correct?0:1);
      s[sessionId]=sess;
      return s;
    });
  }

  function startSession(session,diff){
    const level=diff||"all";
    const pool=questionsByDifficulty(session,level);
    if(!pool.length) return;
    setActiveSession(session);
    setDeckMode("full");
    setDiffFilter(level);
    setDeck(shuffle(pool).map(q=>({...prepare(q),__sessionId:session.id})));
