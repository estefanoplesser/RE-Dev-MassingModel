      { q: "The UK sector outlook for HAs is currently Stable. Which of the following describe the current Stable scenario conditions per Moody's?", options: ["Limited margin and interest cover gains despite CPI+1% rent settlement","Debt growth is slowing but remains elevated","Liquidity is lower and more variable rate debt is being used","Development activity is increasing rapidly as HAs rebuild construction pipelines","Operating margins are recovering modestly but unlikely to reach pre-stress peaks"], correct: [0,1,2,4], tag: "concept", explain: "D is wrong — the sector has generally CUT development. Most HAs have reduced their development programmes due to high construction costs and cost pressures. Outright sale development has been especially reduced." },
      { q: "Moody's rates the UK government's \"Guarantees\" factor in the extraordinary support assessment as \"Strong.\" What is the primary reason for this?", options: ["The UK government has provided explicit financial guarantees on all HA bond issuances","The Special Housing Administration regime (2018) prevents HAs from entering normal bankruptcy and enshrines rescuing them as going concerns as a core principle","All HA bonds are backed by UK government securities in a dedicated reserve fund","The Bank of England provides emergency liquidity to HAs in financial distress","UK HAs are classified as public bodies and therefore receive automatic sovereign rating parity"], correct: [1], tag: "concept", explain: "There are no explicit financial guarantees on HA bonds. The \"Strong\" Guarantees score reflects the Special Housing Administration framework — a legal regime that prevents normal insolvency and requires HAs to be rescued as going concerns. This implicit guarantee is structurally embedded in the regulatory architecture." },
      { q: "The ESP Methodology's \"Debt to Assets\" sub-factor (10%) has which characteristics?", options: ["Aaa = ≤10% Debt to Assets","Baa = 30–40% Debt to Assets","B = 50–70% Debt to Assets","It captures what proportion of assets are funded by debt rather than grants or retained surpluses","It is assessed over a 2-year forward-looking horizon"], correct: [0,1,2,3], tag: "concept", explain: "E is wrong — the Debt to Assets ratio is a point-in-time balance sheet measure, not forward-looking over 2 years. The 2-year forward-looking element applies to the Liquidity Coverage metric." },
    ],

  {
    id: "coveredbonds",
    name: "Covered Bonds",
    short: "Covered Bonds",
    color: "#D85A30",
    bg: "#FAECE7",
    questions: [
      { q: "What is the defining feature of a covered bond?", options: ["It transfers credit risk to investors","Dual recourse — to the issuing bank AND priority recourse to a cover pool","It has no recourse to the issuer","It is always a single bullet repayment with no extension"], correct: [1], tag: "concept", explain: "A covered bond gives the investor DUAL RECOURSE: a claim on the issuing bank, plus a priority claim on the cover pool of assets if the bank defaults. It is bank debt with an extra layer of protection." },
      { q: "A covered bond investor has two layers of protection. What is Layer 2?", options: ["The issuer continues to meet all obligations normally","If the issuer defaults, bondholders have a priority right to the cover pool assets","Government bailout of the bank","Central bank liquidity support"], correct: [1], tag: "concept", explain: "Layer 1: while the issuer is solvent, it meets all obligations normally. Layer 2: if the issuer defaults, bondholders have a priority claim on the cover pool — the second line of defence." },
      { q: "'Covered bonds transfer credit risk to investors, like securitisation.' This statement is:", options: ["True — both transfer credit risk","False — covered bonds do NOT transfer credit risk; only securitisation does","True — but only for CRE cover pools","False — neither covered bonds nor securitisation transfer credit risk"], correct: [1], tag: "trap", explain: "Covered bonds do NOT transfer credit risk — the assets stay on the bank's balance sheet and the bank remains liable. Securitisation transfers credit risk to investors. This is a classic exam trap." },
      { q: "How does the cover pool of a covered bond differ from the asset pool of a securitisation?", options: ["The cover pool is static; the securitisation pool is dynamic","The cover pool is dynamic; the securitisation pool is static","Both are static","Both are dynamic"], correct: [1], tag: "trap", explain: "The covered bond cover pool is DYNAMIC — assets can be added or replaced under covered bond law. A securitisation pool is STATIC, fixed by eligibility criteria at closing. A frequent trap reverses this." },
      { q: "Regarding bail-in, covered bonds are:", options: ["Subject to bail-in, like senior unsecured debt","Exempt from bail-in in countries with an operational resolution regime","Subject to bail-in only if the cover pool fails","Always the first instrument bailed in"], correct: [1], tag: "concept", explain: "Covered bonds are EXEMPT from bail-in (under BRRD Article 44(2) in the EU). Deposits and senior unsecured debt are subject to bail-in — another common trap." },
      { q: "How many classes of bonds does a covered bond programme typically have, versus a securitisation?", options: ["Covered bonds: multiple classes; securitisation: single class","Covered bonds: single class; securitisation: multiple classes (tranches)","Both have a single class","Both have multiple tranches"], correct: [1], tag: "trap", explain: "Covered bonds have a SINGLE class of bonds. Securitisation slices the pool into MULTIPLE tranches with different risk/return. Covered bonds are not tranched." },
      { q: "Select ALL asset types typically found in a covered bond cover pool.", options: ["Good-quality residential mortgage loans","Good-quality commercial real estate mortgage loans","Public sector loans","Equity shares in the issuing bank"], correct: [0,1,2], tag: "recall", explain: "Cover pools typically contain good-quality residential mortgages, good-quality CRE mortgages, and public sector loans. Equity in the issuing bank is not a cover pool asset." },
      { q: "From the issuer's perspective, covered bonds reduce funding costs versus which instrument?", options: ["Versus deposits","Versus senior unsecured bank debt — but NOT versus deposits","Versus all forms of funding equally","Versus central bank funding"], correct: [1], tag: "trap", explain: "Covered bonds reduce funding costs versus senior unsecured bank debt, thanks to dual recourse. They do NOT undercut deposits, which remain a cheaper funding source. A common trap claims 'cheaper than all instruments'." },
      { q: "Why do covered bonds improve a bank's asset-liability mismatch?", options: ["They are very short-dated","Their long maturity matches the long-dated mortgage assets in the cover pool","They eliminate all interest rate risk","They convert mortgages into deposits"], correct: [1], tag: "concept", explain: "Covered bonds are long-dated, which matches the long maturity of the mortgage assets funding them — improving the asset-liability match versus short-term deposit funding." },
      { q: "Select ALL of the following that are investor-side benefits of covered bonds.", options: ["High credit quality with a history of no losses even when the issuing bank failed","Exemption from bail-in","Eligibility for central bank liquidity operations","Greater liquidity than comparable debt"], correct: [0,1,2,3], tag: "recall", explain: "All four are investor benefits: strong credit quality and no-loss history, bail-in exemption, central bank eligibility, and superior liquidity — supported by robust legal and regulatory frameworks." },
      { q: "Roughly what share of residential mortgages across Europe are financed via covered bonds?", options: ["About 5%","About 35%","About 60%","About 90%"], correct: [1], tag: "recall", explain: "Covered bonds finance approximately 35% of residential mortgages across Europe — the European market exceeds €2.5 trillion in outstanding volume." },
      { q: "Which country has the highest covered-bond-to-mortgage penetration?", options: ["United Kingdom","Germany","Denmark","France"], correct: [2], tag: "recall", explain: "Denmark has the highest penetration, at over 80% of mortgages financed via covered bonds. The UK, by contrast, finances only around 5% of mortgages this way." },
      { q: "Which is the largest investor group in covered bonds?", options: ["Insurance companies","Banks","Hedge funds","Retail investors"], correct: [1], tag: "recall", explain: "Banks are the largest investor group in covered bonds (especially German banks). Other groups include asset managers, central banks and insurance/pension funds." },
      { q: "During the GFC (2008–2012), covered bond ratings were:", options: ["More volatile than senior unsecured bank ratings","More stable than senior unsecured bank ratings, when the sovereign was stable","Identical to senior unsecured ratings","All downgraded to speculative grade"], correct: [1], tag: "concept", explain: "Covered bond ratings were MORE STABLE than senior unsecured bank ratings during the GFC — provided the sovereign was stable. The dual recourse structure insulates them from bank stress." },
      { q: "The Moody's covered bond rating methodology is a two-step process. What is Step 1?", options: ["The Timely Payment Indicator (TPI)","The Expected Loss (EL) rating","The Country Ceiling assessment","The cover pool audit"], correct: [1], tag: "recall", explain: "Step 1 is the Expected Loss (EL) rating: EL = PD (the CB Anchor) × Loss. Step 2 then applies the Timely Payment Indicator (TPI), which can lift the rating further." },
      { q: "In the covered bond methodology, the 'CB Anchor' is derived from:", options: ["The sovereign rating","The bank's Counterparty Risk Assessment","The cover pool value","The overcollateralisation level"], correct: [1], tag: "recall", explain: "The CB Anchor — the PD input to the EL calculation — is derived from the issuing bank's Counterparty Risk Assessment. It anchors the covered bond rating to the bank's credit strength." },
      { q: "Select ALL of the following that affect the 'Loss' component (cover pool value) in the EL step.", options: ["Collateral risk — quality of the underlying assets","Refinancing risk","Interest rate and FX risk","Overcollateralisation"], correct: [0,1,2,3], tag: "recall", explain: "All four affect cover pool value: collateral quality, refinancing risk, interest rate / FX mismatches, and the level of overcollateralisation (assets above the covered bond outstanding amount)." },
      { q: "What does the Timely Payment Indicator (TPI) assess?", options: ["The market value of the cover pool","The probability of timely payments following a CB Anchor event","The issuer's profitability","The number of loans in the pool"], correct: [1], tag: "concept", explain: "The TPI assesses the probability of timely payment after a CB Anchor event (issuer stress). A higher TPI lets the rating sit more notches above the CB Anchor — subject to a country ceiling cap." },
      { q: "A higher TPI means:", options: ["The rating is capped lower","The rating can sit more notches above the CB Anchor","The cover pool is smaller","The covered bond is riskier"], correct: [1], tag: "concept", explain: "A higher TPI (e.g. 'Very High' vs 'Probable') allows the covered bond rating to be lifted more notches above the CB Anchor — still subject to the country ceiling cap." },
      { q: "Refinancing risk in covered bonds materialises:", options: ["Before the bond is issued","POST issuer default","Only if interest rates fall","Only for residential cover pools"], correct: [1], tag: "concept", explain: "Refinancing risk materialises POST issuer default. The cover pool generates cash granularly over time (many small loans), but covered bonds repay in large lumps — an asset-liability mismatch." },
      { q: "Why does refinancing risk arise in covered bonds?", options: ["The cover pool assets are too liquid","The cover pool generates cash granularly over time, while covered bonds repay in large bullet lumps","Covered bonds have no maturity date","The issuer cannot be replaced"], correct: [1], tag: "concept", explain: "The mismatch is structural: many small loans repay gradually, but the covered bond needs a large lump at maturity. Post-default, the administrator may need to refinance or sell pool assets to meet that lump." },
      { q: "'Collateral risk is always the largest loss driver in covered bonds.' This statement is:", options: ["True — collateral risk dominates","False — refinancing risk is often the LARGEST loss driver","True — but only for CRE pools","False — interest rate risk is always largest"], correct: [1], tag: "trap", explain: "Refinancing risk is often the LARGEST loss driver in covered bonds — not collateral risk. The asset-liability mismatch, not asset quality, frequently drives the biggest losses. A common exam trap." },
      { q: "Rank the three repayment structures from MOST to LEAST refinancing risk.", options: ["Conditional Pass-Through, Soft bullet, Hard bullet","Hard bullet, Soft bullet, Conditional Pass-Through","Soft bullet, Hard bullet, Conditional Pass-Through","All carry equal refinancing risk"], correct: [1], tag: "concept", explain: "Hard bullet carries the most refinancing risk (must repay exactly on the maturity date, no extension). Soft bullet allows a typically 12-month extension. Conditional Pass-Through is most flexible — lowest refinancing risk." },
      { q: "What happens to a Conditional Pass-Through (CPT) covered bond at maturity if the issuer cannot repay?", options: ["It defaults immediately","It converts to a pass-through structure — most flexible, lowest refinancing risk","It must be repaid in full with penalties","It is automatically bailed in"], correct: [1], tag: "recall", explain: "A CPT bond converts to pass-through if it cannot be repaid on the maturity date — cash flows pass through as the pool amortises. This is the most flexible structure and carries the lowest refinancing risk." },
      { q: "The covered bond market has shifted away from which repayment structure?", options: ["Away from soft bullet, toward hard bullet","Away from hard bullet, toward soft bullet and CPT","Away from CPT, toward hard bullet","No shift has occurred"], correct: [1], tag: "recall", explain: "The market trend has shifted away from hard bullet toward soft bullet and Conditional Pass-Through structures — reducing refinancing risk for bondholders." },
      { q: "Around what share of covered bonds are rated Aaa?", options: ["About 18%","About 45%","About 69%","About 95%"], correct: [2], tag: "recall", explain: "About 69% of covered bonds are rated Aaa — the highest rating. Covered bonds are overwhelmingly investment grade and high quality." },
      { q: "The largest CRE-focused covered bond programmes are predominantly from which country?", options: ["France","Germany","Spain","Sweden"], correct: [1], tag: "recall", explain: "The largest CRE covered bond programmes are predominantly German — names such as DZ HYP, Deutsche Pfandbriefbank and Berlin Hyp dominate the CRE covered bond space." },
      { q: "In CRE covered bond pools, what is identified as a key risk differentiator between programmes?", options: ["The colour of the buildings","Borrower concentration — some pools have very few large borrowers","The age of the issuing bank","The bond coupon rate"], correct: [1], tag: "concept", explain: "Borrower concentration is the key differentiator: some CRE cover pools have very few large borrowers, raising idiosyncratic risk. Top-10 borrowers can represent anywhere from 6% to 48% of the CRE pool." },
      { q: "Moody's applies valuation haircuts to CRE market values based on which two factors?", options: ["The bond coupon and the issuer rating","Deviation from long-term yield levels, and the CRE risk premium versus other investments","The number of tenants and lease length","The country ceiling and the TPI"], correct: [1], tag: "concept", explain: "Haircuts depend on how far current yields deviate from long-term norms, and whether the CRE risk premium over government bonds is adequate. The conceptual question: what if yields and risk premiums normalised?" },
      { q: "Moody's CRE valuation haircuts are HIGHEST when:", options: ["Yields are at or above long-term averages","CRE yields are strongly compressed and risk premiums are low","Risk premiums are very wide","The cover pool is fully residential"], correct: [1], tag: "concept", explain: "Haircuts are highest when CRE yields are strongly compressed relative to history AND risk premiums are low (insufficient compensation). They are lowest when yields are at/above average and premiums are adequate." },
      { q: "Moody's CRE valuation haircut range is approximately:", options: ["0% to 10%","5% to 40%","10% to 25%","20% to 60%"], correct: [1], tag: "recall", explain: "The haircut range runs from about 5% to 40%. The historical average peaked around 29% in 2022 (maximum yield compression) and has since normalised to around 10%." },
      { q: "In the property type risk matrix, which property types carry the WORST combined cash flow and valuation risk?", options: ["Multifamily and urban logistics","Prime offices and prime retail","Secondary retail and secondary offices","Warehouses and student housing"], correct: [2], tag: "concept", explain: "Secondary retail and secondary offices carry HIGH cash flow risk and HIGH valuation risk — the worst combined risk. Multifamily and prime assets sit at moderate or lower risk." },
      { q: "Default risk through the property cycle is HIGHEST for loans originated:", options: ["At the trough of the cycle","At the peak of the property cycle","Midway through a downturn","Cycle timing does not affect default risk"], correct: [1], tag: "concept", explain: "Loans originated at the PEAK carry the highest default risk. At peak prices, observed LTV looks low on inflated values; once values fall post-peak, true LTV is revealed and refinancing default risk spikes." },
      { q: "A bank applies a constant '60% LTV lending policy', yet Moody's LTV on a peak-vintage loan is much higher. Why?", options: ["The bank miscalculated the loan amount","Moody's applies haircuts to the inflated peak valuation, so its LTV rises above the bank's stated LTV","Moody's uses a different loan balance","The borrower repaid part of the loan"], correct: [1], tag: "concept", explain: "At the cycle peak, valuations are inflated, so a 60% bank LTV understates true risk. Moody's haircuts the valuation, pushing its LTV well above the bank's stated figure — exposing the real refinancing risk." },
      { q: "What is the stated purpose of Basel 3.1 in relation to property cycles?", options: ["To increase bank lending at the cycle peak","To reduce the boom and bust of property cycles by making banks hold more capital for peak-originated loans","To eliminate covered bonds","To remove all capital requirements"], correct: [1], tag: "concept", explain: "Basel 3.1 aims to reduce the boom-and-bust of property cycles by requiring banks to hold more capital against loans originated at the peak — dampening pro-cyclical lending." },
      { q: "Basel 3.1 introduces a new valuation concept. What is it?", options: ["Market value","Sustainable value","Vacant possession value","Replacement cost"], correct: [1], tag: "recall", explain: "Basel 3.1 introduces 'sustainable value' — a prudently conservative valuation that adjusts for the potential that current market price is significantly above the value sustainable over the loan's life." },
      { q: "Compared with market values, sustainable values are:", options: ["More volatile","Less volatile — discounted at origination, with limits on upward revaluation","Identical","Always higher"], correct: [1], tag: "concept", explain: "Sustainable values are LESS volatile than market values: discounted to market value at origination, with limits on upward revaluations during the loan term — smoothing out cycle-driven swings." },
      { q: "Under Basel 3.1, the impact on banks is best described as:", options: ["Credit negative — it weakens asset quality","Credit positive — it strengthens asset quality and reduces regulatory capital volatility","Neutral — no impact","Credit negative — it removes all capital buffers"], correct: [1], tag: "concept", explain: "For banks, Basel 3.1 is credit positive: it strengthens asset quality, modestly increases capital requirements, and reduces volatility in regulatory capital. The short-term impact on CRE borrowers/CMBS is negative (tighter lending)." },
      { q: "Why is Basel 3.1's impact on private credit described as 'mixed'?", options: ["Private credit benefits from reduced cycle volatility, but Basel rules are not binding on it — which could create financial stability risks","Private credit is fully exempt from all regulation","Private credit is harmed by lower volatility","Basel 3.1 does not affect private credit at all"], correct: [0], tag: "concept", explain: "Private credit benefits from reduced property-cycle volatility, but because Basel rules are NOT binding on private credit funds, lending could migrate there — potentially creating financial stability risks." },
      { q: "Which EU regulation exempts covered bonds from bail-in?", options: ["The Capital Requirements Regulation (CRR)","The Bank Recovery and Resolution Directive (BRRD)","The Covered Bond Directive","Solvency II"], correct: [1], tag: "recall", explain: "The Bank Recovery and Resolution Directive (BRRD), Article 44(2), exempts covered bonds from bail-in. The CRR assigns low risk weights; the CB Directive harmonises national CB laws." },
      { q: "Which EU regulation assigns LOW RISK WEIGHTS to covered bonds for bank investors?", options: ["BRRD","Capital Requirements Regulation (CRR), Article 129","EMIR","The Covered Bond Directive"], correct: [1], tag: "recall", explain: "The CRR (Article 129) assigns low risk weights to covered bonds held by bank investors. Solvency II does the equivalent for insurers; the LCR Delegated Act treats CBs as highly liquid assets." },
      { q: "What is the role of the EU Covered Bond Directive?", options: ["It exempts covered bonds from bail-in","It harmonises national covered bond legislations and defines key features of covered bonds","It sets insurance capital requirements","It governs cover pool derivatives"], correct: [1], tag: "recall", explain: "The Covered Bond Directive harmonises national covered bond laws across the EU and defines the key features that an instrument must have to qualify as a covered bond." },
      { q: "In a covered bond, what is overcollateralisation?", options: ["A penalty charged to the issuer","Cover pool assets held in excess of the covered bond outstanding amount","A second class of subordinated bonds","The bank's equity capital"], correct: [1], tag: "concept", explain: "Overcollateralisation is the cushion of cover pool assets above the amount of covered bonds outstanding — extra protection that helps absorb losses and support the rating." },
      { q: "Why are covered bonds described as having a 'safe-haven' status relative to CMBS in stressed markets?", options: ["They have higher coupons","Dual recourse and bail-in exemption differentiate them from CMBS and corporate RE bonds under stress","They are guaranteed by the government","They never have CRE exposure"], correct: [1], tag: "concept", explain: "Covered bonds' dual recourse and bail-in exemption give them a safe-haven quality in stress, differentiating them from CMBS and corporate RE bonds — even when both have CRE exposure." },
      { q: "Vintage analysis of cover pools focuses on loans originated in which years as the riskiest?", options: ["2014–2015","2021–2022 (the peak of the property cycle)","2008–2009","2023–2024"], correct: [1], tag: "concept", explain: "Loans originated at the 2021–2022 cycle peak carry the highest risk. 'Riskier outlier' programmes are those with a high concentration of 2021–2022 originations in their cover pool." },
      { q: "What is the 'CRE debt funding gap'?", options: ["The gap between bond coupons and base rates","The shortfall when higher required yields lower valuations, so less debt is available at the same LTV","The difference between two rating agencies' scores","The gap between residential and commercial mortgages"], correct: [1], tag: "concept", explain: "The funding gap arises because higher required yields lower property valuations, so at the same LTV less debt is available. Sponsors must inject equity or sell assets to plug the gap." },
      { q: "Which EU regulation defines covered bonds as highly liquid assets?", options: ["BRRD","The Liquidity Coverage Ratio Delegated Act","EMIR","Solvency II"], correct: [1], tag: "recall", explain: "The Liquidity Coverage Ratio Delegated Act (Articles 11–13) defines covered bonds as highly liquid assets — supporting their use in bank liquidity buffers." },
      { q: "Select ALL of the following that correctly distinguish covered bonds from deposits.", options: ["Covered bonds are exempt from bail-in; deposits are subject to bail-in","Covered bonds are tradable bond-format instruments; deposits are not","Covered bonds have dual recourse; deposits have recourse to the bank only","Covered bonds are repayable on demand; deposits are soft-bullet"], correct: [0,1,2], tag: "trap", explain: "The first three are correct. The fourth is reversed: covered bonds are soft-bullet (or hard bullet / CPT), while DEPOSITS are repayable on demand. Watch the direction of that distinction." },
      { q: "Why does a covered bond convert illiquid mortgages into something useful for the bank beyond funding?", options: ["It makes them eligible for central bank liquidity operations","It removes them from the balance sheet entirely","It transfers their credit risk away","It guarantees them against default"], correct: [0], tag: "concept", explain: "Securitising mortgages into covered bonds transforms illiquid assets into securities eligible for central bank liquidity operations — a funding and liquidity advantage, without transferring credit risk." },
      { q: "Which EU regulation provides specific treatment of cover pool derivatives?", options: ["EMIR (European Market Infrastructure Regulation)","BRRD","Solvency II","The Covered Bond Directive"], correct: [0], tag: "recall", explain: "EMIR — the European Market Infrastructure Regulation — provides specific treatment of cover pool derivatives, part of the six-regulation EU framework governing covered bonds." },
      // ---- 200-question bank additions ----
      { q: "What is the fundamental difference between covered bonds and securitisation in terms of credit risk transfer?", options: ["Covered bonds transfer credit risk to investors; securitisation retains it on the bank's balance sheet","Covered bonds do NOT transfer credit risk; securitisation DOES transfer credit risk to investors","Both covered bonds and securitisation transfer credit risk; they differ only in structure","Neither covered bonds nor securitisation transfer credit risk — both retain it on the bank's balance sheet","Covered bonds transfer credit risk only for the cover pool assets, not the full bank balance sheet"], correct: [1], tag: "concept", explain: "This is one of the most critical distinctions in the covered bond session. Covered bonds are a FUNDING TOOL — the bank retains all credit risk. Securitisation (CMBS) is both a funding tool AND a risk transfer tool. This distinction has regulatory consequences (bail-in exemption for covered bonds; capital relief for securitisation)." },
      { q: "A covered bond investor has DUAL RECOURSE. Which of the following correctly describe what this means?", options: ["Layer 1: While the issuing bank is solvent, it meets all obligations normally — no losses","Layer 2: If the bank defaults, covered bondholders have PRIORITY access to the cover pool assets","The cover pool assets provide an additional layer of protection over and above the bank's general creditor claim","Dual recourse means covered bonds are guaranteed by the national government","Dual recourse has historically meant covered bonds suffered no losses even when the issuing bank failed"], correct: [0,1,2,4], tag: "concept", explain: "D is wrong — dual recourse is to the BANK AND the cover pool, not to the government. Government support is a separate consideration. E is the historical evidence that makes covered bonds attractive: even when banks have failed, covered bond investors have not suffered losses." },
      { q: "Why are covered bonds exempt from bail-in under the EU Bank Recovery and Resolution Directive (BRRD)?", options: ["Because covered bonds are classified as government-guaranteed debt instruments","Because the cover pool provides sufficient collateral to cover all covered bond claims, making write-down unnecessary","Because Article 44(2) of the BRRD explicitly exempts covered bonds from bail-in by law","Because covered bond investors are retail investors who are protected from bail-in by EU consumer law","Because covered bonds are structured finance instruments that are excluded from resolution regimes"], correct: [2], tag: "concept", explain: "The bail-in exemption is a specific legal carve-out in Article 44(2) of the BRRD. The policy rationale is to preserve investor confidence in covered bonds as a funding tool for banks — knowing they cannot be bailed in makes them attractive for conservative investors like pension funds and central banks." },
      { q: "Which of the following correctly distinguish covered bonds from DEPOSITS?", options: ["Covered bonds have dual recourse (bank + pool); deposits have recourse to the bank only","Covered bonds are exempt from bail-in; deposits are subject to bail-in (senior ranking)","Covered bonds reduce funding costs vs senior unsecured; they do NOT reduce costs vs deposits","Covered bonds are tradeable bonds; deposits are not bonds and are repayable on demand","Cover pools in covered bonds are dynamic; deposit backing is undefined and static"], correct: [0,1,2,3], tag: "concept", explain: "E is misleading — the cover pool IS dynamic (correct for CBs), but saying deposit backing is \"static\" is not a meaningful characterisation (deposits are not backed by a defined pool). A, B, C, D are all precisely correct and testable distinctions." },
      { q: "What percentage of Moody's rated covered bonds are rated Aaa — the highest possible rating?", options: ["Approximately 30%","Approximately 45%","Approximately 55%","Approximately 69%","Approximately 85%"], correct: [3], tag: "concept", explain: "69% of Moody's rated covered bonds are rated Aaa. This reflects the dual-recourse structure and strong regulatory/legal framework supporting covered bonds globally. The vast majority are investment grade, with Aa-range making up most of the remainder." },
      { q: "Which of the following are CORRECT regarding the European covered bond market?", options: ["Outstanding volume exceeds €2.5 trillion","Covered bonds finance approximately 35% of residential mortgages across Europe","Denmark has the highest covered bond penetration — >80% of mortgages","The UK has approximately 5% of mortgages financed via covered bonds","Germany is the largest market by outstanding volume"], correct: [0,1,2,3], tag: "concept", explain: "E — France, not Germany, is listed as the largest market by volume (along with Germany, Spain, Sweden, and Netherlands as the largest markets). The question is which country is the SINGLE largest — France is listed first and is typically the largest." },
      { q: "In Moody's covered bond two-step rating methodology, what does the TPI (Timely Payment Indicator) assess?", options: ["The total credit risk of the cover pool assets, including collateral and refinancing risk","The probability that covered bond payments will be made on time following a CB Anchor event (e.g. bank default)","The credit quality of the interest rate swap counterparty in the covered bond structure","The timeliness of the bank's regulatory reporting obligations to the national covered bond supervisor","The average time between issuance and expected maturity of the covered bond programme"], correct: [1], tag: "concept", explain: "TPI = Timely Payment Indicator. It is the second step in Moody's CB methodology: Step 1 determines the EL-implied rating from the cover pool value; Step 2 (TPI) caps the final rating by assessing whether, POST bank default, timely payments can be maintained. Higher TPI = more notches above the CB Anchor." },
      { q: "Covered bond repayment structures range from hard bullet to conditional pass-through (CPT). Which of the following correctly describe these structures?", options: ["Hard bullet: must be repaid exactly on maturity date — no extension possible — highest refinancing risk","Soft bullet: can be extended (typically 12 months) before acceleration — most common current structure","CPT (Conditional Pass-Through): converts to pass-through if unable to repay — most flexible, lowest refinancing risk","The market has shifted away from CPT back toward hard bullet structures for investor protection","Refinancing risk is often the LARGEST loss driver in covered bonds — larger than collateral risk"], correct: [0,1,2,4], tag: "concept", explain: "D is wrong — the market trend has been the OPPOSITE: away from hard bullet TOWARD soft bullet and CPT structures, precisely because these structures reduce refinancing risk for investors. This shift reflects lessons from the GFC." },
      { q: "What is the CB Anchor in Moody's covered bond rating methodology?", options: ["The credit rating of the cover pool assets, used as the starting point for the EL assessment","The rating floor below which a covered bond cannot be rated regardless of cover pool quality","The derived rating linked to the bank's Counterparty Risk Assessment, used as the starting point for the covered bond EL assessment","The minimum required overcollateralisation to achieve an Aaa rating","The central bank's benchmark rate used to stress-test the cover pool's interest rate risk"], correct: [2], tag: "concept", explain: "The CB Anchor is derived from the bank's Counterparty Risk Assessment (CRA) — it reflects the bank's creditworthiness as the primary obligor. From the CB Anchor, Moody's assesses the cover pool value (Step 1) to determine EL, then the TPI (Step 2) to determine the maximum rating uplift above the Anchor." },
      { q: "Why does the cover pool's DYNAMIC nature in covered bonds contrast with the STATIC pool in CMBS securitisation?", options: ["In covered bonds, the bank continuously manages the pool — adding and removing assets to maintain eligibility criteria","In CMBS, the asset pool is fixed at closing and cannot be actively managed by the originator after issuance","The dynamic nature of covered bond pools means there is no fixed collateral backing at any point in time","Dynamic management in covered bonds allows the bank to maintain overcollateralisation and quality","Static CMBS pools cannot add new loans but can remove defaulted ones"], correct: [0,1,3,4], tag: "concept", explain: "C is wrong — the cover pool IS defined and ring-fenced; it is \"dynamic\" in the sense that the bank can substitute assets and add new loans to maintain quality. It is not undefined or invisible — it is actively managed within regulatory eligibility rules." },
      { q: "The CRE Debt Funding Gap analysis in the covered bond session identifies a ~€176bn gap for major European markets for 2024–2027. What is the primary driver of this gap?", options: ["Banks have been legally prohibited from extending CRE loans above 50% LTV under Basel 3.1","Higher required property yields → lower valuations → less debt available at the same LTV → equity shortfall when loans mature","A mass withdrawal of covered bond funding from the CRE market following regulation","A dramatic increase in CRE construction activity creating excess supply that banks cannot finance","The collapse of the private credit market following rate rises"], correct: [1], tag: "concept", explain: "The mechanism: higher required yields (from rising rates and risk premiums) compress valuations. Lower valuations at the same LTV lending policy mean less absolute debt available. When existing loans mature and need refinancing, borrowers face a gap between the new, smaller loan amount and the original loan balance — requiring equity injection or asset sales." },
      { q: "Moody's applies valuation haircuts to CRE market values when assessing covered bond cover pools. Which of the following correctly describe the haircut framework?", options: ["Haircuts range from approximately 5% to 40% depending on how far market yields deviate from long-term averages","Haircuts are highest when CRE yields are strongly compressed relative to historic levels","The average haircut peaked at approximately 29% in 2022 at the height of yield compression","Haircuts have since declined to approximately 10% as of 2025 due to value corrections","Secondary retail and secondary offices face the highest combined cash flow and valuation risk"], correct: [0,1,2,3,4], tag: "concept", explain: "All five are correct. The haircut framework: 5–40% range; highest at peak compression (2022: ~29%); declining as values corrected (2025: ~10%). Secondary retail and offices explicitly identified as highest combined risk." },
      { q: "A covered bond issuer has a CB Anchor of Baa3 and a TPI of Probable-High. What is the maximum achievable covered bond rating?", options: ["A1","Aa3","Aa2","Aaa","Baa1"], correct: [1], tag: "concept", explain: "From the TPI table: CB Anchor Baa3 + Probable-High TPI → maximum rating = Aa3. \"High\" TPI would give Aa3; \"Very High\" TPI would give Aa2. The TPI caps the uplift above the CB Anchor — a Baa3 Anchor cannot reach Aaa regardless of cover pool quality." },
      { q: "Which EU regulations are most relevant to covered bonds and what do they primarily establish?", options: ["CB Directive: harmonises national CB legislations and defines key covered bond features","Liquidity Coverage Ratio Delegated Act (Art. 11–13): defines CBs as highly liquid assets","BRRD Art. 44(2): exempts covered bonds from bail-in","CRR Art. 129: assigns low risk weights to covered bonds for bank investors","MiFID II: requires covered bond issuers to publish daily price transparency data"], correct: [0,1,2,3], tag: "concept", explain: "MiFID II (E) relates to markets transparency broadly and is not the specific CB-relevant regulation. The four correct regulations create the regulatory framework that makes covered bonds attractive: definitional harmonisation, liquidity classification, bail-in exemption, and favourable bank capital treatment." },
      { q: "In the CRE covered bond market, which German institution has the largest CRE covered bond programme by outstanding volume?", options: ["Deutsche Pfandbriefbank (pbb)","Berlin Hyp","Hamburger Sparkasse","DZ HYP","Commerzbank"], correct: [3], tag: "concept", explain: "DZ HYP has the largest CRE covered bond programme at ~€28bn. Deutsche Pfandbriefbank (pbb) is second at ~€19bn, and Berlin Hyp third at ~€17bn. German institutions dominate the CRE covered bond market." },
      { q: "Why does Moody's regard \"vintage analysis\" as particularly important for CRE covered bond pools?", options: ["Loans originated at the peak of the property cycle (2021–2022) carry the highest refinancing default risk","A bank may have appeared to lend at 60% LTV, but Moody's haircuts reveal the true LTV was much higher on peak valuations","Post-peak value falls mean loans originated at the top face much higher LTV at maturity than at origination","Programmes with high concentrations of 2021–2022 originations are considered \"riskier outliers\"","Vintage analysis confirms that older loans (pre-2015) carry more risk than recent originations"], correct: [0,1,2,3], tag: "concept", explain: "E is wrong — older loans are not inherently riskier; it is loans originated at CYCLE PEAKS that carry elevated refinancing risk. The 2021–2022 vintage is specifically flagged as the highest risk because values have subsequently corrected." },
      { q: "The investor base for European covered bonds is dominated by which group?", options: ["Insurance companies and pension funds seeking long-dated liabilities matching","Central banks through quantitative easing programmes","Banks — the largest investor group, with German banks particularly dominant","Retail investors through structured savings products","Asset managers and hedge funds seeking higher-yielding alternatives to government bonds"], correct: [2], tag: "concept", explain: "Banks are the largest covered bond investor group. German banks in particular are the dominant investor, representing ~44% of the investor base geographically. Central bank share peaked during QE (2020–2021) and has since declined." },
      { q: "Basel 3.1's \"sustainable value\" concept for mortgage lending has which of the following characteristics?", options: ["It replaces market values and lending values with a new, less volatile appraisal standard","At loan origination, sustainable values are typically discounted relative to market values","During the loan term, upward revaluations are limited — the concept is explicitly counter-cyclical","Sustainable values are always equal to or above market values to protect lenders from undervaluation","Implementation risk: lack of guidance on the appraisal approach has been explicitly flagged as a concern"], correct: [0,1,2,4], tag: "concept", explain: "D is wrong — sustainable values are designed to be BELOW market values at the peak of cycles (prudently conservative). This is precisely the counter-cyclical purpose: banks should not lend against inflated peak values. The implementation risk (E) is a real practical concern noted in the slides." },
      { q: "Why is refinancing risk described as often the LARGEST loss driver in covered bonds, rather than collateral (credit) risk?", options: ["Because covered bond collateral (residential mortgages) is always of very high credit quality and rarely defaults","Because the asset-liability mismatch between granular loan cash flows and large bullet bond repayments creates a structural refinancing need post-issuer default","Because collateral risk is 100% protected by government guarantee in all EU countries","Because covered bond covenants prevent collateral from defaulting through mandatory reserve requirements","Because Moody's applies minimum yield floors that eliminate collateral valuation risk"], correct: [1], tag: "concept", explain: "The structural issue: the cover pool generates cash flows gradually (thousands of small mortgage payments). But covered bonds must be repaid in large lumps at maturity. Post-issuer default, this mismatch requires the cover pool to be refinanced — and if markets are stressed, this may not be possible on acceptable terms. Collateral risk (defaults in the pool) is typically smaller." },
      { q: "What impact does Basel 3.1 have on different market participants according to the session?", options: ["Banks: credit positive — strengthens asset quality; modestly increases capital; reduces regulatory capital volatility","CRE Corporates & CMBS: short-term credit negative — tightens bank lending availability","CRE Corporates & CMBS: long-term potentially credit positive — less property cycle volatility may benefit borrowers over time","Private Credit: benefits from reduced property cycle volatility, BUT Basel rules are NOT binding on them — creating potential financial stability risks","Private Credit: fully bound by Basel 3.1 sustainable value requirements from January 2025"], correct: [0,1,2,3], tag: "concept", explain: "E is explicitly wrong — private credit is NOT bound by Basel rules. This is both their competitive advantage (can fill the gap banks leave) AND a systemic risk (they take on risks without the capital buffer requirements). This asymmetry is a key cross-cutting theme." },
    ],
  },
  {
    id: "cmbs",
    name: "CMBS & CRE Debt",
    short: "CMBS",
    color: "#1D9E75",
    bg: "#E1F5EE",
    questions: [
      { q: "What is a CMBS (Commercial Mortgage-Backed Security)?", options: ["An equity stake in a commercial property","Bonds issued by a special-purpose trust that holds commercial real estate mortgage loans as collateral","A bank deposit secured on property","A government-guaranteed mortgage"], correct: [1], tag: "concept", explain: "CMBS are bonds issued by a special-purpose trust holding CRE mortgage loans as collateral. The trust collects mortgage payments and passes them to bondholders in order of seniority." },
      { q: "What core problem does CMBS solve?", options: ["It eliminates credit risk entirely","It converts illiquid real estate loans into tradeable, rated securities, letting lenders recycle capital","It guarantees property values will rise","It removes the need for property valuations"], correct: [1], tag: "concept", explain: "CMBS solves a problem of scale and liquidity: it turns large, illiquid CRE loans into tradeable rated securities, letting originating banks sell risk to capital markets and free up balance sheet capacity." },
      { q: "In a CMBS, what does 'bankruptcy-remote' mean for the borrower SPE?", options: ["The SPE can never go bankrupt","The SPE's insolvency is legally ring-fenced from the originating bank or property group","The SPE is owned by the government","The SPE has no debt"], correct: [1], tag: "concept", explain: "A bankruptcy-remote SPE is legally ring-fenced — its insolvency is isolated from the parent bank or property group, protecting the trust and bondholders from contagion." },
      { q: "Which CMBS party takes over the management of loans that have defaulted or are in financial distress?", options: ["Master Servicer","Special Servicer","Trustee","Arranger"], correct: [1], tag: "recall", explain: "The Special Servicer manages defaulted or distressed loans, aiming to maximise recoveries for the trust through workouts, extensions or enforcement on collateral." },
      { q: "What is the role of the Master (Primary) Servicer in a CMBS?", options: ["Assigns the credit ratings","Collects mortgage payments from borrowers and monitors the underlying properties","Takes legal title to the loan pool","Structures and markets the transaction"], correct: [1], tag: "recall", explain: "The Master/Primary Servicer collects mortgage payments and monitors the properties on an ongoing basis. In US CMBS it also advances missed payments to the extent recoverable." },
      { q: "A key structural difference: US CMBS servicers advance missed payments, but EMEA CMBS servicers do not. What replaces servicer advancing in EMEA?", options: ["Government guarantees","A liquidity facility or a cash reserve","The special servicer's own funds","Nothing — shortfalls are simply ignored"], correct: [1], tag: "concept", explain: "EMEA CMBS has no servicer advancing. Liquidity instead comes from a dedicated Liquidity Facility from a bank, or a cash reserve funded from over-issuance at closing — to cover short-term shortfalls." },
      { q: "What is 'tranching' in a CMBS?", options: ["Splitting a property into multiple buildings","Dividing the loan exposure into multiple bond classes with different risk, rating and subordination","Selling the property in pieces","Combining several CMBS into one"], correct: [1], tag: "concept", explain: "Tranching divides the total loan exposure into bond classes (Aaa down to unrated), each with a different risk level, coupon and subordination — making one asset appeal to many investor types." },
      { q: "In a CMBS waterfall, how are principal and interest paid in normal conditions?", options: ["Pro-rata across all tranches equally","Sequentially from the top (Aaa) downward — senior noteholders paid first","From the bottom up","Randomly"], correct: [1], tag: "concept", explain: "In normal conditions, principal and interest are paid sequentially from the top (Aaa) downward — senior noteholders are paid first." },
      { q: "How are losses allocated in a CMBS capital structure?", options: ["From the top (Aaa) down","From the bottom up — the most junior bonds absorb losses first","Equally across all tranches","Only to the trustee"], correct: [1], tag: "concept", explain: "Losses are allocated from the bottom up: the most junior (unrated) bonds absorb losses first, protecting senior tranches. This is subordination." },
      { q: "Credit enhancement for a senior CMBS bond equals:", options: ["The bond's own coupon","The sum of all tranches below it","The property value","The borrower's annual income"], correct: [1], tag: "concept", explain: "Credit enhancement for a senior bond is the sum of all tranches subordinate to it. If unrated + B + Ba total 20% of the pool, the Baa tranche above them has 20% credit enhancement." },
      { q: "Select ALL of the following that are structural differences of EMEA CMBS versus US CMBS.", options: ["Pro-rata distribution of principal before an event of default","No servicer advancing","Liquidity provided via a liquidity facility or cash reserve","Use of a bankruptcy-remote SPE borrower"], correct: [0,1,2], tag: "trap", explain: "The first three are EMEA-specific differences. The fourth — a bankruptcy-remote SPE borrower — is common to BOTH US and EMEA CMBS, so it is not a difference." },
      { q: "Post-GFC risk-retention rules require originators to retain what share of a securitisation's credit risk?", options: ["1%","5%","20%","50%"], correct: [1], tag: "recall", explain: "Risk-retention rules require originators to keep about 5% of the notional — 'skin in the game' — aligning their interests with investors." },
      { q: "A 'horizontal' risk-retention slice means the originator retains:", options: ["5% of each tranche across the whole structure","The most junior / first-loss piece","The Aaa tranche only","Nothing"], correct: [1], tag: "recall", explain: "Horizontal retention means keeping the most junior, first-loss position (e.g. unrated bonds or equity). Vertical retention means keeping 5% of every tranche across the structure." },
      { q: "What does the formula EL = PD × LGD × EAD represent?", options: ["The property's market value","Expected Loss — a single number summarising a loan's credit risk","The loan's interest rate","The debt service coverage ratio"], correct: [1], tag: "concept", explain: "EL = PD × LGD × EAD is Expected Loss — Probability of Default × Loss Given Default × Exposure at Default. It summarises a loan's credit risk in one comparable number." },
      { q: "What does LGD (Loss Given Default) measure?", options: ["The likelihood the borrower defaults","The fraction of the exposure the lender expects to lose if a default actually occurs","The total outstanding loan at default","The property's rental income"], correct: [1], tag: "concept", explain: "LGD is the fraction of exposure expected to be lost if default occurs. It is below 100% because the lender can recover value by enforcing on collateral. Higher collateral value and creditor-friendly jurisdictions lower LGD." },
      { q: "Why is LGD typically below 100%?", options: ["Borrowers always repay in full","Even in default, lenders recover some value by enforcing against collateral","Insurance always covers the loss","The government reimburses lenders"], correct: [1], tag: "concept", explain: "LGD is below 100% because, even after a default, the lender can enforce against the collateral — selling the property to recover part of the exposure." },
      { q: "What is EAD (Exposure at Default)?", options: ["The total outstanding loan amount at the moment of default","The probability of default","The property's vacancy rate","The lender's profit margin"], correct: [0], tag: "recall", explain: "EAD is the total outstanding loan amount at the moment of default — the 'amount at risk' on which PD and LGD operate. For a simple bullet loan, EAD equals the original principal." },
      { q: "DSCR is defined as:", options: ["Loan Amount / Property Value","Net Operating Income / Annual Debt Service","NOI / Loan Amount","Property Value / NOI"], correct: [1], tag: "calc", explain: "DSCR = Net Operating Income / Annual Debt Service. A DSCR of 2.0x means income is twice the debt service. Below 1.0x, cash flows cannot cover debt service without extra equity." },
      { q: "A property has NOI of €6m and annual debt service of €3m. What is the DSCR?", options: ["0.5x","1.5x","2.0x","3.0x"], correct: [2], tag: "calc", explain: "DSCR = NOI / Debt Service = €6m / €3m = 2.0x — a strong coverage buffer, meaning income is twice the debt service." },
      { q: "LTV is defined as:", options: ["Loan Amount / Property Value","NOI / Annual Debt Service","Property Value / Loan Amount","NOI / Loan Amount"], correct: [0], tag: "calc", explain: "LTV = Loan Amount / Property Value. A 60% LTV means the property value would need to fall 40% before the loan is 'under water'." },
      { q: "A €60m loan is secured on a property worth €100m. What is the LTV, and how far can value fall before the loan is under water?", options: ["60% LTV; value can fall 40%","40% LTV; value can fall 60%","60% LTV; value can fall 60%","166% LTV; value cannot fall"], correct: [0], tag: "calc", explain: "LTV = €60m / €100m = 60%. The property value can fall 40% (to €60m) before the loan equals the value — the equity cushion is 40%." },
      { q: "Using Property Value = NOI / Cap Rate, what happens to value when the cap rate rises, NOI unchanged?", options: ["Value rises","Value falls","Value is unchanged","Value doubles"], correct: [1], tag: "calc", explain: "Value = NOI / Cap Rate is an inverse relationship. A higher cap rate (the denominator) compresses value even if NOI is stable — which is why rising interest rates hurt property values." },
      { q: "Moody's EMEA CMBS rating methodology has how many sequential steps?", options: ["Three","Five","Seven","Ten"], correct: [2], tag: "recall", explain: "The methodology has 7 steps: Property Grade, Net Cash Flow, Property Value, Loan Default Risk, simulation of defaults/severity, issuer-level note expected loss, and the rating committee." },
      { q: "In Step 1, Moody's grades each property on a scale of 1 to 5. What does Grade 1 represent?", options: ["The worst quality","The best quality","The middle of the range","An unrated property"], correct: [1], tag: "recall", explain: "Grade 1 is the best quality, Grade 5 the worst — a holistic assessment relative to comparable properties of the same type in the same market." },
      { q: "In Step 2, how does Moody's treat the landlord's current rental income?", options: ["It accepts the in-place income at face value","It constructs a 10-year NCF projection stress-testing income as leases expire","It ignores rental income entirely","It uses only the first year's rent"], correct: [1], tag: "concept", explain: "Moody's does not accept in-place income at face value. It builds a 10-year Net Cash Flow projection, modelling lease expiries, void periods and re-letting — stress-testing the income stream." },
      { q: "Why is Moody's Property Value almost always LOWER than the market appraiser's value?", options: ["Moody's uses a stressed forward-looking NCF and applies minimum yield floors","Moody's does not visit the property","Moody's adds a premium for risk","Appraisers always undervalue property"], correct: [0], tag: "concept", explain: "Moody's Value is deliberately conservative: it capitalises a stressed, forward-looking 10-year average NCF, and applies minimum yield floors that stop the cap rate falling below a conservative level." },
      { q: "What is the purpose of Moody's minimum yield floors?", options: ["To inflate property values","To prevent the cap rate falling below a conservative level even when market yields are compressed","To match the appraiser's value exactly","To remove the need for an NCF projection"], correct: [1], tag: "concept", explain: "Minimum yield floors stop the cap rate going below a conservative floor even when market yields have compressed to historic lows — ensuring Moody's Value stays conservative through cycles." },
      { q: "Moody's assesses loan default risk at two stages. What are they?", options: ["Origination risk and audit risk","Term default risk (during the loan) and refinancing default risk (at maturity)","Interest risk and currency risk","Tenant risk and sponsor risk"], correct: [1], tag: "recall", explain: "Step 4 assesses term default risk — the risk the borrower cannot service debt during the loan's life — and refinancing default risk — the risk it cannot repay the bullet principal at maturity." },
      { q: "Why do CMBS loans carry significant refinancing risk?", options: ["They fully amortise over the term","They are almost always interest-only bullet structures, with the full principal due at maturity","They have no maturity date","They are repaid by the servicer"], correct: [1], tag: "concept", explain: "CMBS loans are almost always interest-only bullet loans — the full principal falls due at maturity. The borrower must find new debt to repay it, which is hard if values have fallen or markets have tightened." },
      { q: "What simulation technique does Moody's use in Step 5 to model property value uncertainty?", options: ["A single deterministic forecast","Monte Carlo simulation — thousands of possible outcomes","Linear regression only","The appraiser's point estimate"], correct: [1], tag: "recall", explain: "Step 5 uses Monte Carlo simulation: thousands of scenarios, each with a different property value. Higher rating levels must withstand more severe stress scenarios." },
      { q: "In Moody's jurisdiction tiers, which is the MOST creditor-friendly tier (lowest enforcement cost)?", options: ["Tier 4 — Greece, Portugal, Italy","Tier 1 — UK, Netherlands","Tier 3 — France, Spain, Belgium","Tier 2 — Germany, Switzerland, Austria"], correct: [1], tag: "recall", explain: "Tier 1 (UK, Netherlands) is the most creditor-friendly — lowest enforcement costs, shortest enforcement periods. Tier 4 (Greece, Portugal, Italy, Eastern Europe) is the most debtor-friendly." },
      { q: "Two identical loans on identical properties — one in the UK, one in Italy. How do their LGDs compare?", options: ["Identical — jurisdiction does not matter","The Italian loan has higher assumed LGD due to slower, costlier enforcement","The UK loan has higher LGD","Both have zero LGD"], correct: [1], tag: "concept", explain: "The Italian loan has a higher assumed LGD purely due to jurisdiction: Italy is Tier 4 (debtor-friendly, slow, costly enforcement) while the UK is Tier 1 (fast, cheap enforcement)." },
      { q: "How does pool diversification affect the credit enhancement needed for a given rating?", options: ["Diversification increases the credit enhancement needed","Diversification reduces the credit enhancement needed — the loss distribution is more concentrated around the mean","Diversification has no effect","Diversification only affects the coupon"], correct: [1], tag: "concept", explain: "A diversified pool of loans produces a loss distribution more concentrated around the mean, with less probable extreme tails — so multi-loan CMBS typically need less subordination than single-loan deals." },
      { q: "In Step 6, how is a tranche's Expected Loss derived?", options: ["By taking the appraiser's value","By probability-weighting the tranche loss across all simulated scenarios via the cash flow model","By averaging the coupon rates","By using the sovereign rating"], correct: [1], tag: "concept", explain: "Step 6 runs each simulated loss scenario through the waterfall to get a tranche loss, then probability-weights those across all scenarios. The probability-weighted sum is the Tranche Expected Loss." },
      { q: "What is the 'tail period' in a CMBS transaction?", options: ["The first year after issuance","The gap between the loan maturity and the bond legal final maturity","The marketing period before closing","The time the special servicer takes to act"], correct: [1], tag: "recall", explain: "The tail period is the gap between loan maturity and the bond's legal final maturity — a buffer for enforcement. New deals require a minimum tail of 5–7 years (up to 12 for France and Italy)." },
      { q: "What does Step 7 — the rating committee — add to the quantitative model output?", options: ["Nothing — the model output is final","Qualitative judgement: benchmarking, legal structure review, scenario sensitivity, counterparty risk","A higher rating automatically","The appraiser's valuation"], correct: [1], tag: "concept", explain: "The committee reviews model output but adds qualitative judgement — benchmarking against similar deals, legal structure review, sensitivity testing — so final ratings may differ modestly from the model." },
      { q: "The CMM (Commercial Mortgage Metrics) model is best described as:", options: ["A property appraisal service","Moody's Analytics' statistical CRE credit risk model producing PD, LGD, EL and an implied rating","A legal enforcement tool","A government regulation"], correct: [1], tag: "recall", explain: "CMM is Moody's Analytics' CRE credit risk model. It combines macro inputs, CRE market data and user loan inputs to generate PD (EDF), LGD, EL and an implied rating." },
      { q: "In CMM terminology, 'EDF' refers to:", options: ["Expected Disposal Fee","Expected Default Frequency — CMM's term for PD","Enforcement Default Factor","Equity Discount Function"], correct: [1], tag: "trap", explain: "EDF — Expected Default Frequency — is CMM's terminology for Probability of Default (PD). Same concept, different label." },
      { q: "Select ALL of the following that are explanatory variables in the CMM PD regression model.", options: ["LTV and DSCR","Market vacancy rate","Loan age","Property type"], correct: [0,1,2,3], tag: "recall", explain: "All are CMM PD variables: LTV, DSCR, market vacancy rate, market price change, loan age and property type — six observable variables translated into an annualised PD." },
      { q: "Why does CMM add a qualitative scorecard overlay to its quantitative PD model?", options: ["To slow down the analysis","Because not all risks — like sponsor quality — are captured by quantitative variables","To replace the regression model","Because regulators require it"], correct: [1], tag: "concept", explain: "The qualitative scorecard captures factors the regression misses — sponsor track record, asset and tenant characteristics. A poor sponsor can worsen the PD even if LTV and DSCR look acceptable." },
      { q: "In the Milan office case study, moving from a baseline to a downside macro scenario causes EL to:", options: ["Fall, because the property is safer","Rise, driven by higher vacancy, lower rents and lower values increasing refinancing risk","Stay exactly the same","Become negative"], correct: [1], tag: "concept", explain: "In the downside scenario, vacancy rises and rents fall, so property value and NOI decline, LTV at maturity rises, and refinancing risk grows — pushing PD, LGD and EL all higher." },
      { q: "In the Milan case study, increasing the loan from €60m to €65m (baseline macro) does what to the credit?", options: ["Improves it — more leverage is safer","Worsens it — higher leverage means higher LTV, higher PD and a worse implied rating","Has no effect","Eliminates refinancing risk"], correct: [1], tag: "concept", explain: "A larger loan raises LTV and lowers DSCR, worsening PD, LGD and EL — the implied rating notches down. All else equal, higher leverage means worse credit." },
      { q: "In the case study, EL worsened materially under 'higher loan + downside macro', yet the implied rating band did not move further. Why?", options: ["The model was broken","Rating bands are ranges, not single points — the increment was not large enough to cross a band boundary","EL does not affect ratings","The committee overrode the result"], correct: [1], tag: "concept", explain: "Rating bands are ranges, not single points. EL can worsen within a band without the implied rating changing — it only moves when EL crosses a band boundary." },
      { q: "The Taurus 2021-3 deal was a single-borrower CMBS. Why does that concentrate risk?", options: ["The loan is secured on a single property rather than a diversified pool","Single-borrower deals have no collateral","There is only one bondholder","It removes the need for tranching"], correct: [0], tag: "concept", explain: "Taurus was secured on a single property (The Squaire at Frankfurt Airport). A single-borrower CMBS concentrates risk versus a diversified pool — though The Squaire was internally diversified across office, hotel and retail." },
      { q: "At origination, Moody's Value for The Squaire was about 18.9% below the appraiser's value. The largest single reason was:", options: ["The office space was overvalued","The hotel component was stressed for Covid-19 uncertainty","The retail space was empty","The building was structurally unsound"], correct: [1], tag: "concept", explain: "The hotel component was heavily stressed for Covid-19 uncertainty (hotels were closed/impaired when the deal was rated in April 2021). Office cash flow was also slightly stressed, and a conservative cap rate floor applied." },
      { q: "Select ALL of the following that plausibly drove the post-2021 downgrade of the Taurus notes.", options: ["Hybrid/WFH trends reducing demand for the non-CBD airport office location","ECB interest rate rises raising cap rates and compressing values","Refinancing difficulty at the December 2024 expected maturity","Rising LTV as property values fell"], correct: [0,1,2,3], tag: "concept", explain: "All four contributed: WFH pressure on a non-CBD office, rate-driven cap rate rises compressing value, refinancing difficulty at maturity, and rising LTV — a textbook illustration of the framework under stress." },
      { q: "What is a 'cash trap' mechanism, as used in the Taurus deal?", options: ["A penalty paid to bondholders","If LTV or debt yield breaches a trigger, excess cash is trapped rather than returned to the borrower","A reserve funded by the rating agency","A way to hide cash from investors"], correct: [1], tag: "concept", explain: "A cash trap retains excess cash in the structure rather than paying it to the borrower when a trigger is breached (e.g. LTV > 70% or debt yield < a floor) — a protective feature for noteholders." },
      { q: "What does the Exit Debt Yield (NOI at maturity / outstanding loan balance) tell a lender?", options: ["The property's vacancy rate","How much debt the property can support — a lender's view of refinancing capacity at maturity","The borrower's personal wealth","The bond's coupon"], correct: [1], tag: "concept", explain: "Exit Debt Yield = NOI at maturity / loan balance. It gives a lender's-eye view of how much debt the property income can support — a key gauge of refinancing capacity at loan maturity." },
      { q: "Why is CRE described as 'specialised lending'?", options: ["Only specialists are allowed to lend","The primary source of repayment is the property itself — its rental income and value — not a trading company's revenues","It requires a special government licence","It uses no collateral"], correct: [1], tag: "concept", explain: "CRE is specialised lending because repayment comes primarily from the property — its rental income and capital value — rather than from a diversified operating company. Analysis must go deep into property-level detail." },
      { q: "Which of these is NCF (Net Cash Flow) in Moody's Step 2 framework?", options: ["Gross Rental Income only","Gross Rental Income minus non-recoverable expenses minus CapEx","Property Value times the cap rate","The loan amount minus debt service"], correct: [1], tag: "recall", explain: "NCF = Gross Rental Income − non-recoverable expenses − CapEx. Subtracting non-recoverable expenses from GRI gives NOI; subtracting CapEx from NOI gives NCF — the key input to Moody's Property Value." },
      // ---- 200-question bank additions ----
      { q: "Which party in a CMBS transaction is responsible for advancing missed borrower payments to the trust in US structures, but NOT in EMEA structures?", options: ["The Trustee","The Special Servicer","The Primary / Master Servicer","The Operating Advisor","The Investment Bank / Arranger"], correct: [2], tag: "concept", explain: "In US CMBS, the Primary/Master Servicer is contractually obligated to advance missed payments (to the extent recoverable). EMEA servicers have no such obligation — a key structural difference." },
      { q: "Which of the following correctly describe the role of the Special Servicer in a CMBS transaction?", options: ["Collects regular mortgage payments from performing borrowers","Takes over management of loans that have defaulted or are in financial distress","Maximises recoveries for the trust through workouts, extensions, or enforcement","Consults with the first-loss holder on major loan modifications","Issues rated bonds to investors"], correct: [1,2,3], tag: "concept", explain: "The Special Servicer handles distressed loans, targeting maximum recovery, and consults with the first-loss holder. Regular payment collection is the Master Servicer's role; bond issuance belongs to the Issuer/Trust." },
      { q: "In a CMBS capital structure, how are losses allocated across tranches?", options: ["Proportionally across all tranches simultaneously","Sequentially from the most senior (Aaa) tranche downward","Sequentially from the most junior (unrated) tranche upward","Only to tranches rated below investment grade","Equally across all tranches regardless of seniority"], correct: [2], tag: "concept", explain: "Losses are allocated bottom-up — the most junior (unrated/first-loss) bonds absorb losses first, protecting senior tranches. This is the subordination mechanism." },
      { q: "Which of the following are key structural differences between EMEA CMBS and US CMBS?", options: ["EMEA CMBS often distributes principal pro-rata prior to an event of default","EMEA CMBS servicers do not advance missed borrower payments","EMEA CMBS uses liquidity facilities or cash reserves instead of servicer advancing","EMEA CMBS uses a strictly sequential waterfall under all circumstances","EMEA CMBS tranching starts at a higher minimum subordination level than US CMBS"], correct: [0,1,2], tag: "concept", explain: "EMEA is pro-rata pre-EOD (then sequential), has no servicer advancing, and substitutes a liquidity facility or cash reserve. The sequential/pro-rata distinction is conditional on EOD, not unconditional." },
      { q: "A CMBS transaction has the following subordination levels: Unrated = 5%, B = 8%, Ba = 7%, Baa = 10%, A = 12%, Aa = 15%, Aaa = 43%. What is the credit enhancement available to the Baa tranche?", options: ["10%","20%","30%","43%","5%"], correct: [1], tag: "concept", explain: "Credit enhancement for a given tranche = the sum of all tranches below it. Unrated (5%) + B (8%) + Ba (7%) = 20%. The Baa tranche's own size is NOT included." },
      { q: "Which of the following correctly describe the PURPOSE of securitisation through CMBS?", options: ["Enables banks to recycle capital by moving loans off their balance sheet","Converts illiquid CRE loans into tradeable, rated securities","Allows very large loans to appeal to multiple investor types simultaneously through tranching","Eliminates all credit risk from the underlying loans for investors","Guarantees senior bondholders will suffer no losses under any scenario"], correct: [0,1,2], tag: "concept", explain: "CMBS solves scale and liquidity problems. D and E are false — tranching redistributes risk but does not eliminate it, and no rating is a guarantee of zero loss." },
      { q: "Under post-GFC risk-retention rules, what does \"horizontal retention\" mean?", options: ["The originator retains 5% of every tranche across the full capital structure","The originator retains the most junior / first-loss position","The originator retains 5% of senior bonds only","A third-party investor retains the first-loss piece on behalf of the originator","All tranches are distributed pro-rata across multiple originators"], correct: [1], tag: "concept", explain: "Horizontal retention = retaining the first-loss (most junior) piece. Vertical retention = retaining a slice of every tranche. Both satisfy the ≥5% risk retention requirement." },
      { q: "What is the primary legal purpose of structuring the CMBS borrower as a bankruptcy-remote Special Purpose Entity (SPE)?", options: ["To ensure the borrower can never be forced to sell the underlying property","To allow the originating bank to guarantee the bonds issued by the trust","To legally ring-fence the insolvency of the property-owning entity from the originating bank or group","To give the Special Servicer legal authority to appoint a new property manager","To exempt the transaction from risk-retention regulation"], correct: [2], tag: "concept", explain: "The bankruptcy-remote SPE ensures that if the parent company fails, the CMBS collateral and cash flows are protected from that insolvency — critical for investor confidence and rating." },
      { q: "Which of the following are listed as ADVANTAGES of CMBS as a financing tool?", options: ["Ability to finance very large transactions that no single lender could absorb","Risk transfer from originating bank to capital markets investors","Greater transparency through detailed loan-level reporting","Lower execution cost compared to a bilateral bank loan","Tranching appeals to a wider range of investors with different risk appetites"], correct: [0,1,2,4], tag: "concept", explain: "High execution cost is listed as a DISADVANTAGE of CMBS — many parties are involved (legal, rating agencies, servicers, due diligence), making it expensive relative to bilateral lending." },
      { q: "In EMEA CMBS, what mechanism replaces servicer advancing when a borrower misses an interest payment?", options: ["The Operating Advisor injects liquidity directly into the trust","A dedicated Liquidity Facility from a bank counterparty or a cash reserve funded at closing","The Trustee draws on its own balance sheet to cover shortfalls","Senior noteholders defer their coupon to provide liquidity to junior tranches","The Rating Agency provides emergency liquidity during loan workouts"], correct: [1], tag: "concept", explain: "EMEA uses either a bank-provided Liquidity Facility or a cash reserve (from over-issuance at closing) to cover short-term shortfalls. These explicitly replace the US servicer advancing mechanism." },
      { q: "Which of the following parties are involved in the ongoing surveillance of a CMBS transaction after issuance?", options: ["The Rating Agency (e.g. Moody's)","The Master/Primary Servicer","The Trustee / Certificate Administrator","The Investment Bank / Arranger (ongoing surveillance role)","The Special Servicer (for distressed loans)"], correct: [0,1,2,4], tag: "concept", explain: "The Investment Bank/Arranger structures and markets the deal but has no contractual ongoing surveillance role post-issuance. The others all have defined monitoring functions." },
      { q: "Which of the following best describes the \"tail period\" in a CMBS transaction?", options: ["The period during which the Special Servicer can negotiate a loan workout","The gap between the loan's expected maturity and the bonds' legal final maturity","The time between closing and the first interest payment date","The period after an Event of Default during which the waterfall switches to sequential","The time Moody's requires to complete a new rating process from mandate to publication"], correct: [1], tag: "concept", explain: "The tail period is the buffer between loan maturity and bond legal final maturity. It provides time for enforcement if the borrower cannot repay. Moody's requires a minimum of 5–7 years (up to 12 for France/Italy)." },
      { q: "A CMBS trust's principal waterfall operates pro-rata prior to an Event of Default (EOD). Which statements about this are correct?", options: ["Prior to EOD, all note classes receive a proportionate share of principal repayments","After EOD, the waterfall typically switches to sequential, paying senior tranches first","Pro-rata distribution before EOD is standard in US CMBS","Pro-rata distribution before EOD is a characteristic of EMEA CMBS","Pro-rata distribution provides greater protection to senior noteholders than sequential distribution"], correct: [0,1,3], tag: "concept", explain: "Pro-rata pre-EOD is an EMEA feature — US CMBS is strictly sequential. Pro-rata is actually less protective for seniors than sequential (C and E are wrong for opposite reasons)." },
      { q: "Why does CMBS allow very large CRE loans (e.g. a €500m+ trophy office deal) to be financed more easily than through bilateral bank lending?", options: ["Because the Rating Agency guarantees no losses to senior bondholders","Because the originating bank retains all the risk but receives government guarantees","Because tranching distributes the risk across many investors with different risk appetites, making the deal viable for the capital markets","Because CMBS eliminates refinancing risk at loan maturity","Because CMBS transactions are exempt from regulatory capital requirements"], correct: [2], tag: "concept", explain: "The core purpose: a single bank cannot hold a €500m+ loan, but tranching into Aaa-to-unrated bonds means pension funds, hedge funds, and insurers each take the slice they want. This solves the scale problem." },
      { q: "Which of the following are roles of the Trustee / Certificate Administrator in a CMBS transaction?", options: ["Holds legal title to the loan pool on behalf of investors","Oversees cash disbursement to noteholders in accordance with the waterfall","Produces regular trust reports for investors","Negotiates loan workouts with distressed borrowers","Assigns credit ratings to each bond tranche"], correct: [0,1,2], tag: "concept", explain: "Loan workout negotiations are the Special Servicer's role. Rating assignment is the Rating Agency's role. The Trustee is a custodian and administrative function, not an active credit manager." },
      { q: "What does it mean for a CMBS bond tranche to have \"55% subordination\"?", options: ["The tranche itself represents 55% of the total deal size","55% of the deal must be lost before the tranche suffers any principal impairment","The tranche pays a coupon 55 basis points above the risk-free rate","55% of borrowers in the pool must default before the tranche is impaired","The tranche has 55% probability of default over its life"], correct: [1], tag: "concept", explain: "Subordination = credit enhancement = the buffer of junior tranches beneath. 55% subordination means the property pool's total value must fall by more than 55% before that tranche incurs principal losses." },
