<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ============================================================
//  RE CAPITAL MARKETS QUIZ — standalone build
//  Progress is saved in this browser (localStorage).
//  To add questions: append objects to a session's questions array.
//  Question shape:
//   { q, options:[...], correct:[indices], explain, tag?, lockLast? }
// ============================================================

const SESSIONS = [
  {
    id: "ratings101",
    name: "Moody's Career & Credit Ratings 101",
    short: "Rating Agency 101",
    color: "#534AB7",
    bg: "#EEEDFE",
    questions: [
      { q: "Which of the following best describes what a credit rating IS?", options: ["A guarantee that the issuer will repay its debt in full","A probabilistic, forward-looking opinion on the relative likelihood of meeting financial obligations","A recommendation to buy a security at the current market price","A precise numerical measure of an issuer's default probability"], correct: [1], tag: "concept", explain: "A rating is a probabilistic, forward-looking OPINION about relative credit risk. It is not a guarantee, not buy/sell advice, and not a precise quantification — it rank-orders risk rather than measuring it exactly." },
      { q: "Which statement about credit ratings is FALSE?", options: ["Ratings reflect both probability of default and expected loss given default","Ratings are forward-looking opinions","A Moody's Aa2 is formally equivalent to an S&P AA","Ratings are monitored continuously, not just at issuance"], correct: [2], tag: "trap", explain: "Ratings are NOT interchangeable across agencies. Each CRA independently maintains its own scale, methodology, and definition of default — so a Moody's Aa2 is not formally equivalent to an S&P AA even though they look similar." },
      { q: "What is the lowest investment-grade rating on Moody's scale?", options: ["Baa1","Baa3","Ba1","A3"], correct: [1], tag: "recall", explain: "Baa3 is the lowest investment-grade rating. The very next notch down — Ba1 — is the first speculative-grade ('high yield' / 'junk') rating. This Baa3/Ba1 boundary is the 'cliff edge'." },
      { q: "Why does the fall from Baa3 to Ba1 have major real-world consequences?", options: ["The coupon automatically doubles","Many institutional investors cannot hold sub-investment-grade debt by mandate","The issuer must immediately repay all its debt","Moody's stops monitoring the issuer"], correct: [1], tag: "concept", explain: "Crossing from Baa3 to Ba1 moves an issuer from investment grade to speculative grade. Many institutional investors are restricted by mandate from holding sub-investment-grade debt, so a downgrade across this line can force selling and raise funding costs sharply." },
      { q: "Who decides a Moody's credit rating?", options: ["The lead analyst alone","A rating committee — a group of certified analysts","The issuer's management team","An automated quantitative model"], correct: [1], tag: "recall", explain: "Ratings are decided by a rating committee — a GROUP of experienced, certified analysts — not by any single individual. Group decision-making, conflict checks and a transparent methodology safeguard the integrity and consistency of ratings." },
      { q: "Which is NOT one of Moody's four business lines?", options: ["Ratings","Research & Insights","Decision Solutions","Investment Banking"], correct: [3], tag: "trap", explain: "Moody's four business lines are Ratings, Research & Insights, Data & Information, and Decision Solutions. Investment banking is not one of them — Moody's is an information and analytics business, not an underwriter." },
      { q: "In Moody's numeric modifiers (1, 2, 3) applied to a rating category, what does the modifier '1' indicate?", options: ["The bottom of the category","The middle of the category","The top of the category","That the rating is under review"], correct: [2], tag: "recall", explain: "Modifier 1 = top of the category, 2 = mid-range, 3 = bottom. So Aa1 is stronger than Aa2, which is stronger than Aa3. Modifiers are applied to categories Aa through Caa, creating the 21-point scale." },
      { q: "Moody's short-term rating 'Prime-1' corresponds most closely to which long-term ratings?", options: ["Baa ratings","Ba and below","Aa and above (some A1)","B ratings only"], correct: [2], tag: "recall", explain: "Prime-1 maps to Aa and above (and some A1). Prime-2 maps to A, Prime-3 to Baa, and 'Not Prime' to Ba and below. Short-term ratings assess the ability to repay short-dated obligations." },
      { q: "Select ALL of the following that credit ratings are explicitly NOT.", options: ["A price indicator","A liquidity indicator","A recommendation to buy, sell or hold","A guarantee of securities performance"], correct: [0,1,2,3], tag: "trap", explain: "All four are things ratings are NOT. Ratings are not price indicators, not liquidity indicators, not buy/sell/hold recommendations, and not guarantees. They speak only to credit risk." },
      { q: "Ratings reflect TWO things simultaneously. What are they?", options: ["Default probability and the issuer's market capitalisation","Default probability and expected loss given default","Liquidity and price volatility","Coupon level and maturity"], correct: [1], tag: "concept", explain: "A Moody's rating reflects BOTH the probability that the issuer defaults AND the expected financial loss if default occurs — not just one or the other. A common MCQ trap is to claim ratings reflect only default probability." },
      { q: "Why are credit ratings described as infrastructure for capital markets rather than investment advice?", options: ["Because Moody's also lends money to issuers","Because their value lies in standardisation and wide distribution of a common credit language","Because regulators set the ratings directly","Because they are updated every trading day"], correct: [1], tag: "concept", explain: "CRAs provide a common reference point understood globally and distribute credit information widely. Their value is standardisation and transparency — a shared language for credit risk — not stock-picking advice." },
      { q: "Which statement about the rating process is correct?", options: ["Monitoring is a one-time event at issuance","Issuer meetings are held at least annually","The issuer writes the final rating rationale","Rating committees exclude analysts to stay objective"], correct: [1], tag: "recall", explain: "Issuer meetings are held at least annually (more often if developments warrant) to gather qualitative and quantitative information. Monitoring is continuous, and the committee — made up of analysts — decides the rating." },
      { q: "In the first-time rating process, which stage comes immediately BEFORE Publication?", options: ["Preparation","Management Meeting","Rating Committee","Monitoring"], correct: [2], tag: "recall", explain: "The order is Preparation → Management Meeting → Analysis → Rating Committee → Publication → Monitoring. The committee concludes on the rating, then the issuer reviews the draft press release for factual errors before publication." },
      { q: "Which market segment would a Housing Association bond most naturally fall under?", options: ["Corporate Finance","Sub-Sovereign / US Public Finance","Sovereign","Project & Infrastructure Finance"], correct: [1], tag: "recall", explain: "Housing agencies sit within Sub-Sovereign / US Public Finance, alongside municipal entities, hospitals and universities. CMBS and covered bonds, by contrast, fall under Structured Finance." },
      { q: "'Baa-rated debt is speculative grade.' This statement is:", options: ["True — Baa is the first speculative tier","False — Baa is the lowest investment-grade tier; Ba is the first speculative tier","True — only Baa1 is investment grade","False — Baa is the highest investment-grade tier"], correct: [1], tag: "trap", explain: "Baa is the LOWEST investment-grade category (medium grade, moderate credit risk). Speculative grade begins at Ba1. This is one of the most common MCQ traps." },
      { q: "Which of the following is part of what CRAs provide to markets?", options: ["Guaranteed returns to investors","A common reference point understood quickly by market professionals globally","Short-term trading signals for day traders","Direct control over issuer borrowing costs"], correct: [1], tag: "concept", explain: "CRAs provide a globally understood common reference point, wide distribution of credit information, and improved understanding of credit risk. Ratings are explicitly not designed for day traders or speculators." },
      { q: "What does Moody's describe as its core mission?", options: ["To maximise the number of issuers it rates","To be the leading source of insights on exponential risk","To guarantee the stability of capital markets","To set interest rates for global debt"], correct: [1], tag: "recall", explain: "Moody's frames its mission around being the leading source of insights on 'exponential risk' — risk that is complex, interconnected, and growing in scale and speed." },
      { q: "Select ALL of the following that are among Moody's four stated purposes for existing.", options: ["Providing transparency","Enhancing trust","Facilitating capital markets","Supporting economic growth"], correct: [0,1,2,3], tag: "recall", explain: "All four are correct. Moody's four purposes — providing transparency, enhancing trust, facilitating capital markets, supporting economic growth — form a chain: transparency builds trust, which enables markets, which drives growth." },
      { q: "Why is the rating committee structure considered a safeguard?", options: ["It speeds up the rating process","Group decisions, conflict checks and transparent methodology protect rating integrity and independence","It allows the issuer to influence the outcome","It removes the need for ongoing monitoring"], correct: [1], tag: "concept", explain: "The committee structure protects integrity and independence: ratings are decided by a group rather than one person, members are checked for conflicts of interest, and a consistent, transparent methodology is followed." },
      { q: "Which of these is a FALSE statement that could appear as an MCQ trap?", options: ["Credit ratings are forward-looking","Credit ratings are a guarantee of repayment","Rating committees decide ratings","Each CRA maintains its own methodology"], correct: [1], tag: "trap", explain: "'Credit ratings are a guarantee of repayment' is false. Ratings are opinions about relative likelihood — never guarantees of performance or repayment." },
      { q: "Ratings are described as 'relative'. What does this mean?", options: ["They change relative to interest rates daily","A Baa2 issuer is more creditworthy than a Ba1 issuer relative to others — ratings rank-order risk","They are relative to the issuer's own past ratings only","They are set relative to the S&P scale"], correct: [1], tag: "concept", explain: "The scale is relative, not absolute: it rank-orders issuers by creditworthiness (a Baa2 ranks above a Ba1) rather than assigning a precise, absolute default probability to each." },
      { q: "Why is continuous monitoring a necessary feature of credit ratings?", options: ["Because ratings are historical assessments that must be archived","Because ratings are forward-looking opinions about future ability to meet obligations","Because regulators require daily rating updates","Because issuers pay per monitoring visit"], correct: [1], tag: "concept", explain: "Ratings are forward-looking opinions about future ability to pay. Because the future keeps changing, monitoring must be continuous — financial reporting, investor calls and annual reviews — rather than a one-time event." },
      { q: "Which user group uses ratings primarily for capital adequacy and investment eligibility requirements?", options: ["Issuers","Regulators","Day traders","Rating analysts"], correct: [1], tag: "recall", explain: "Regulators use ratings to frame capital adequacy requirements and investment eligibility rules. Issuers use them to access markets and benchmark pricing; investors use them for portfolio guidance." },
      { q: "Each credit rating agency independently maintains all of the following EXCEPT:", options: ["Its own definition of default","Its own rating methodologies","Its own alphanumeric scale","A universal scale shared by all agencies"], correct: [3], tag: "trap", explain: "There is no universal shared scale. Each CRA independently maintains its own definition of default, its own scale and symbols, and its own methodologies — which is why ratings are not interchangeable." },
      { q: "What distinguishes Moody's published research (Sector Comments, Outlooks, In-Depth reports)?", options: ["It is kept confidential to issuers","It is publicly attributed — analysts publish in their own name","It is written by the issuers themselves","It replaces the formal rating"], correct: [1], tag: "recall", explain: "Moody's research is publicly attributed: analysts publish in their own name. This supports the market function of wide information distribution and transparency, alongside the ratings themselves." },
      { q: "A rating committee's analysis is best described as:", options: ["Backward-looking, based purely on audited history","Forward-looking, focused on key rating drivers","A mechanical output of a single ratio","Determined by the issuer's share price"], correct: [1], tag: "concept", explain: "Committee analysis is forward-looking and focused on key rating drivers. It combines quantitative analysis with qualitative views on governance, operating environment and regulatory framework." },
      { q: "'Credit ratings are suitable guidance for retail day traders.' This statement is:", options: ["True — that is their main audience","False — ratings are medium-term probabilistic opinions, not short-term trading signals","True — but only for investment-grade names","False — retail investors are banned from using them"], correct: [1], tag: "trap", explain: "Ratings are explicitly NOT designed for day traders or speculators. They are medium-term, probabilistic opinions about credit risk — not short-term price signals." },
      { q: "The Moody's rating scale runs from Aaa down to C. How many distinct notches does the full scale have?", options: ["9","21","10","16"], correct: [1], tag: "recall", explain: "Applying numeric modifiers 1/2/3 to categories Aa through Caa expands the 9 broad categories into a 21-point scale from Aaa down to C." },
      { q: "Which best captures the difference between what ratings ARE and ARE NOT?", options: ["They ARE statements of absolute fact; they are NOT opinions","They ARE probabilistic opinions; they are NOT guarantees or buy/sell recommendations","They ARE price forecasts; they are NOT credit assessments","They ARE liquidity scores; they are NOT default measures"], correct: [1], tag: "concept", explain: "Ratings ARE probabilistic, relative, forward-looking opinions about credit risk. They are NOT absolute facts, guarantees, recommendations to buy/sell/hold, price indicators, or liquidity indicators." },
      { q: "Within the Caa category, which rating represents the weakest credit?", options: ["Caa1","Caa2","Caa3","They are equal"], correct: [2], tag: "recall", explain: "Within any modified category, 3 is the bottom. Caa3 is therefore weaker than Caa2, which is weaker than Caa1. The same logic applies across Aa through Caa." },
      { q: "Structured finance deals such as CMBS and covered bonds are rated within which Moody's market segment?", options: ["Corporate Finance","Structured Finance","Sovereign","Financial Institutions"], correct: [1], tag: "recall", explain: "CMBS and covered bonds are Structured Finance products. Corporate RE bonds sit in Corporate Finance, and Housing Association bonds in Sub-Sovereign / US Public Finance." },
      { q: "What does the rating category 'Ca' indicate?", options: ["Highest quality, minimal credit risk","Upper-medium grade, low credit risk","Highly speculative — likely in or near default, with some recovery prospect","Lowest rated, typically already in default with little recovery"], correct: [2], tag: "recall", explain: "Ca means highly speculative — the issuer is likely in or very near default, though some recovery is still expected. 'C' is the lowest, typically in default with little prospect of recovery." },
      { q: "An analyst informs the issuer in advance of a rating committee EXCEPT in which situation?", options: ["Routine annual review","Sovereign-driven or event-driven rating changes","A scheduled methodology update","A first-time rating"], correct: [1], tag: "recall", explain: "The lead analyst normally informs the issuer ahead of the committee, but NOT for sovereign-driven or event-driven changes, where timing and market sensitivity require a different approach." },
      { q: "Which statement about CRAs providing 'infrastructure' is most accurate?", options: ["CRAs build physical exchanges for trading bonds","CRAs give all market participants a common language for credit risk","CRAs guarantee liquidity in secondary markets","CRAs set the regulatory capital rules themselves"], correct: [1], tag: "concept", explain: "As 'infrastructure', CRAs provide standardisation and wide distribution of credit information — a common language all participants can use — rather than advice, guarantees, or trading venues." },
      { q: "Why are ratings described as opinions 'informed by experience'?", options: ["They are based only on the analyst's personal intuition","They draw on the agency's experience rating comparable securities and issuers, plus information gathered","They copy the issuer's own internal assessment","They are derived solely from share-price movements"], correct: [1], tag: "concept", explain: "Ratings rest on information gathered AND the agency's accumulated experience rating comparable issuers and securities — benchmarking against peers is central to the analytical judgement." },
      { q: "Which is a correct pairing of rating category and meaning?", options: ["Aaa — moderate credit risk","A — upper-medium grade, low credit risk","Ba — minimal credit risk","B — investment grade"], correct: [1], tag: "recall", explain: "A = upper-medium grade, low credit risk. Aaa is highest quality/minimal risk, Ba is speculative with substantial risk, and B is speculative (high yield) — not investment grade." },
      { q: "What is the main reason ratings 'rank-order' rather than precisely quantify risk?", options: ["Moody's lacks the data to quantify risk","Ratings are relative opinions comparing issuers, not absolute probability measurements","Regulators forbid quantification","Issuers would object to precise numbers"], correct: [1], tag: "concept", explain: "Ratings are relative, comparative opinions: they place issuers in order of creditworthiness rather than attaching an exact, absolute default probability to each one." },
      { q: "Which group of users relies on ratings to 'facilitate issuance and investment' and 'frame risk management'?", options: ["Financial intermediaries","Sovereign governments","Retail speculators","Property appraisers"], correct: [0], tag: "recall", explain: "Financial intermediaries use ratings to facilitate issuance and investment, support capital allocation decisions and frame risk management — connecting issuers and investors." },
      { q: "Conflict-of-interest checks on rating committee members exist primarily to:", options: ["Speed up the committee vote","Protect the independence and integrity of the rating","Allow issuers to join the committee","Reduce the number of analysts required"], correct: [1], tag: "concept", explain: "Members are checked for conflicts of interest before participating so that the rating reflects independent analytical judgement — a key safeguard of rating integrity." },
      { q: "An issuer wants to 'diversify its investor base' and gain 'wider access to global capital markets'. These are benefits of ratings to whom?", options: ["Regulators","Issuers","Rating analysts","Central banks"], correct: [1], tag: "recall", explain: "These are issuer benefits: a rating helps diversify the investor base, communicate creditworthiness, benchmark pricing, and access global markets with better secondary-market liquidity." },
      { q: "Which of the following is the BEST one-line definition of a Credit Rating Agency?", options: ["A bank that lends to rated issuers","A body that independently maintains its own scale, methodology and default definition to opine on credit risk","A government regulator of bond markets","An index provider tracking bond prices"], correct: [1], tag: "concept", explain: "A CRA independently maintains its own rating scale, methodologies and definition of default, and uses them to produce opinions on credit risk — it is neither a lender nor a regulator nor an index provider." },
      { q: "'A rating is a recommendation to buy.' Why is this false?", options: ["Ratings only apply to equities, not bonds","Ratings opine on credit risk, not on whether a security is a good investment at its price","Ratings are recommendations to sell, not buy","Only S&P issues buy recommendations"], correct: [1], tag: "trap", explain: "A rating speaks only to credit risk — the likelihood of default and loss. It says nothing about whether a security is attractively priced, so it is never a buy/sell/hold recommendation." },
      { q: "Which factor combination does a rating committee explicitly weigh?", options: ["Only audited financial ratios","Quantitative analysis plus qualitative views on governance, operating environment and regulation","Only the issuer's stock price history","Only macroeconomic forecasts"], correct: [1], tag: "concept", explain: "Committees combine quantitative analysis with qualitative judgement on governance, operating environment and regulatory framework — ratings are not purely mechanical outputs." },
      { q: "Why does the Baa3/Ba1 line matter more than other one-notch moves on the scale?", options: ["It is the only notch where the coupon changes","It is the boundary between investment grade and speculative grade, with mandate-driven consequences","It is where Moody's stops applying modifiers","It separates short-term from long-term ratings"], correct: [1], tag: "concept", explain: "The Baa3→Ba1 move crosses the investment-grade / speculative-grade boundary. Because many investors face mandate restrictions on sub-investment-grade debt, this particular notch carries outsized real-world impact." },
      { q: "Which is a correct statement about issuer meetings?", options: ["They occur only once, at the first rating","Moody's meets only with the issuer and no one else","They are held at least annually and can be more frequent if developments occur","They are optional and rarely take place"], correct: [2], tag: "recall", explain: "Issuer meetings happen at least annually and more often if relevant developments arise. Moody's also meets arrangers, regulators and other market participants — not only issuers." },
      { q: "The statement 'ratings reflect only default probability' is a trap. Why?", options: ["Ratings reflect only loss given default, not probability","Ratings reflect both default probability and expected loss given default","Ratings reflect neither — only liquidity","Ratings reflect only the issuer's size"], correct: [1], tag: "trap", explain: "Ratings capture two dimensions at once: the probability of default AND the expected financial loss if default occurs. Claiming they reflect only probability is incomplete and a classic trap answer." },
      { q: "What is the role of the 'Data & Information' business line?", options: ["Issuing the formal credit ratings","Providing proprietary datasets covering entities, economies, properties and people","Running rating committees","Lending to corporate issuers"], correct: [1], tag: "recall", explain: "Data & Information provides proprietary datasets on entities, economies, properties and people. Ratings, Research & Insights, and Decision Solutions are the other three business lines." },
      { q: "Which describes the correct relationship between ratings and monitoring?", options: ["Monitoring ends once the rating is published","Monitoring is ongoing because ratings are forward-looking and conditions change","Monitoring happens only if the issuer requests it","Monitoring is performed by the issuer, not Moody's"], correct: [1], tag: "concept", explain: "Because ratings are forward-looking opinions, monitoring continues after publication — through financial reporting, investor calls and annual reviews — to keep the opinion current as conditions evolve." },
      { q: "Regarding what a credit rating represents, which statement is correct?", options: ["All of the above are correct","It is a forward-looking opinion","It assesses relative likelihood of meeting obligations","It reflects both default probability and loss given default"], correct: [0], lockLast: true, tag: "trap", explain: "'All of the above are correct' is the right answer — each of the other three statements is a true description of a credit rating. Watch for this style: when every listed statement is individually true, the aggregate option is correct." },
      // ---- 200-question bank additions ----
      { q: "Which of the following BEST describes what a Moody's credit rating IS?", options: ["A guarantee that the rated issuer will not default on its obligations","A recommendation to buy, hold, or sell the rated security","A forward-looking, probabilistic opinion on the relative likelihood that an issuer will meet its financial obligations in full and on time","A price indicator reflecting the current market value of the security","An absolute fact based on the issuer's most recent audited financial statements"], correct: [2], tag: "concept", explain: "Ratings are opinions — probabilistic, forward-looking, and relative. They are not facts, guarantees, recommendations, or price indicators. This distinction underpins every other concept in Rating Agency 101." },
      { q: "Which of the following are things credit ratings explicitly ARE NOT, per the Moody's framework?", options: ["Not a guarantee of securities performance","Not a recommendation to buy, sell, or hold a security","Not price indicators","Not liquidity indicators","Not forward-looking — they are historical assessments only"], correct: [0,1,2,3], tag: "concept", explain: "E is the OPPOSITE of the truth — ratings ARE forward-looking. This is one of the explicit MCQ traps: \"ratings are not forward-looking\" is FALSE. Ratings are prospective opinions about future ability to meet obligations, not historical assessments." },
      { q: "What rating constitutes the boundary between Investment Grade and Speculative (High Yield) Grade?", options: ["Baa1 and above = IG; Baa2 and below = HY","Baa3 and above = IG; Ba1 and below = HY/Speculative","Ba1 and above = IG; Ba2 and below = HY","A3 and above = IG; Baa1 and below = HY","Baa2 and above = IG; Baa3 and below = HY"], correct: [1], tag: "concept", explain: "Baa3 is the LOWEST investment grade rating. Ba1 is the HIGHEST speculative/HY rating. Falling from Baa3 to Ba1 has major real-world consequences — many institutional investors cannot hold sub-investment-grade debt by mandate, causing forced selling." },
      { q: "Moody's rating outlooks provide signals about future rating direction. Which of the following correctly describe Moody's outlook statistics?", options: ["Rating action typically follows a positive/negative outlook within 12–18 months","Approximately one-third of issuers with a negative outlook are downgraded within 18 months","Approximately 90% of issuers with a stable outlook experience no rating change in the following year","A \"Under Review\" outlook guarantees a rating change within 30 days","A positive outlook means a rating upgrade has already been decided and will be implemented imminently"], correct: [0,1,2], tag: "concept", explain: "D is wrong — \"Under Review\" means active consideration, not a guaranteed timeline of 30 days. E is wrong — a positive outlook means a HIGHER LIKELIHOOD of upgrade over the medium term, not a guarantee or decision already taken." },
      { q: "Moody's was founded in 1909 and currently rates approximately how much debt outstanding?", options: ["~$7.6 trillion","~$76 trillion","~$760 billion","~$76 billion","~$7.6 quadrillion"], correct: [1], tag: "concept", explain: "Moody's rates approximately $76 trillion in outstanding debt — a figure that illustrates its role as critical infrastructure for global capital markets. The scale (with 14,000+ employees, 450M+ entities in data) is context that may appear in MCQs." },
      { q: "Which of the following correctly describe what EACH Credit Rating Agency independently maintains?", options: ["Its own definition of default","Its own alphanumeric rating scale and symbol meanings","Its own rating methodologies","A harmonised definition of \"investment grade\" shared across all CRAs","Its own analytical frameworks that may produce different ratings for the same issuer"], correct: [0,1,2,4], tag: "concept", explain: "D is wrong — while \"investment grade\" as a CONCEPT is widely understood, the precise definitions, default definitions, and methodologies are NOT harmonised across agencies. A Moody's Baa2 is not formally equivalent to an S&P BBB — different methodologies can produce different assessments." },
      { q: "Why is the Rating Committee structure considered a safeguard for rating quality and independence?", options: ["Because committee members are all appointed by government regulators, ensuring public interest alignment","Because group decision-making with conflict-of-interest checks reduces individual analyst bias and ensures consistency","Because the committee includes representatives from the rated issuer to ensure balanced analysis","Because committee ratings are automatically verified by an independent audit firm within 30 days","Because any committee member can veto a rating that they disagree with"], correct: [1], tag: "concept", explain: "The committee structure — group review, certified analysts, conflict checks, transparent methodology — prevents any single analyst from unilaterally setting a rating based on their individual view or relationships. This is the structural safeguard for independence and consistency." },
      { q: "Moody's serves multiple user groups with different needs. Which of the following correctly describe HOW different users benefit from ratings?", options: ["Issuers: diversify investor base, communicate creditworthiness, and access global capital markets at a pricing benchmark","Regulators: use ratings for capital adequacy requirements and investment eligibility criteria","Fixed income investors: guidance for portfolio management and research for investment decisions","Day traders and retail speculators: use ratings to make short-term market bets","Financial intermediaries: facilitate issuance, support capital allocation, and frame risk management decisions"], correct: [0,1,2,4], tag: "concept", explain: "D is explicitly excluded from the intended user base. Ratings are medium-term, probabilistic opinions — not short-term signals suitable for day trading or speculation. Moody's explicitly notes ratings are not designed for retail investors or speculators." },
      { q: "Moody's numeric modifiers (1, 2, 3) apply to which rating levels, and what do they mean?", options: ["They apply to all ratings from Aaa to C; 1 = top, 2 = mid, 3 = bottom of category","They apply from Aa to Caa only (NOT Aaa or Ca/C); 1 = top of the category, 3 = bottom","They apply from Aaa to Baa only; 1 = top, 2 = mid, 3 = bottom","They apply only to speculative grade ratings; investment grade uses +/- modifiers","They apply from Aa to B; 1 = bottom, 2 = mid, 3 = top of category"], correct: [1], tag: "concept", explain: "Numeric modifiers 1, 2, 3 apply from Aa through Caa (inclusive). Aaa has no modifier (it is unique). Ca and C have no modifiers. Within each modified category, 1 = top (better), 3 = bottom. This creates the 21-point scale (Aaa, Aa1, Aa2, Aa3, A1...Caa1, Caa2, Caa3, Ca, C)." },
      { q: "Moody's has four business lines. Which of the following correctly describe each line?", options: ["Ratings: the core, traditional product — original and primary offering","Research & Insights: published analysis shared with the market","Data & Information: proprietary datasets covering entities, economies, properties, people","Decision Solutions: tools helping clients make risk-based decisions","Advisory Services: consulting for issuers on how to improve their credit ratings"], correct: [0,1,2,3], tag: "concept", explain: "The four Moody's business lines are Ratings, Research & Insights, Data & Information, and Decision Solutions. Advisory Services is NOT one of them — providing advice to issuers on improving their ratings would create a fundamental conflict of interest with the independence of the rating opinion." },
      { q: "A Moody's rating of \"Ca\" has which of the following characteristics?", options: ["Highly speculative; the issuer is likely in or very near default, but there is some prospect of recovery","Lowest rated; typically in default with little prospect of recovery","Poor standing; very high credit risk but not yet near default","Speculative; substantial credit risk — lowest speculative grade before default categories","Moderate credit risk; the lowest investment grade with some speculative characteristics"], correct: [0], tag: "concept", explain: "Ca = \"Highly speculative; likely in or very near default, some recovery prospect.\" C (not Ca) = \"In default, little recovery prospect.\" Caa = \"Poor standing, very high credit risk.\" Ba = \"Substantial credit risk.\" Baa = \"Moderate credit risk.\" Knowing each rating's precise definition is critical." },
      { q: "What are Moody's four stated purposes for its existence and operations?", options: ["Providing transparency","Enhancing trust in capital markets","Facilitating capital markets","Supporting economic growth","Regulating financial institutions on behalf of national supervisors"], correct: [0,1,2,3], tag: "concept", explain: "E is wrong — Moody's is NOT a regulator. It is a private, for-profit information provider. The four purposes form a chain: transparency → trust → capital market facilitation → economic growth. Moody's acts as infrastructure, not a supervisor." },
      { q: "Which Moody's market segment covers bonds issued by housing associations, universities, hospitals, and municipal entities?", options: ["Corporate Finance","Financial Institutions","Sovereign","Sub-Sovereign / US Public Finance","Structured Finance"], correct: [3], tag: "concept", explain: "Sub-Sovereign / US Public Finance covers municipal, provincial entities and agencies — hospitals, universities, housing agencies (including Housing Associations), and mass transit systems. These are public-purpose entities below the sovereign level." },
      { q: "A Moody's rating reflects which TWO things simultaneously?", options: ["The probability of default","The expected financial loss in the event of default","The current market price of the security","The liquidity of the security in secondary markets","The probability of an ESG-related controversy affecting the issuer"], correct: [0,1], tag: "concept", explain: "This is an explicit and important statement: Moody's ratings reflect BOTH PD (probability of default) AND LGD-equivalent (expected loss in the event of default). This is why EL = PD × LGD × EAD is the core framework — ratings are an expression of this combined credit risk measure." },
      { q: "Moody's publishes research in several forms alongside its ratings. Which of the following are published research types mentioned in the session?", options: ["Sector Comments, Outlooks, and Sector In-Depth reports","Individual stock recommendations and price targets","Government policy recommendations for improving economic conditions","Quarterly earnings estimates for rated issuers","Proprietary market price data competing with Bloomberg and Reuters"], correct: [0], tag: "concept", explain: "Moody's publishes Sector Comments (short-form analysis), Outlooks (sector direction views), and Sector In-Depth reports (comprehensive analytical pieces). These are publicly attributed to named analysts. The others (B–E) describe activities Moody's does NOT engage in as part of its ratings and research model." },
      { q: "The \"first-time rating process\" for a new issuer follows a defined sequence. Which of the following correctly describe stages in this process?", options: ["Preparation: application received, team assigned, issuer provides information, analyst reviews","Management Meeting: issuer meeting held to gather qualitative and quantitative information","Rating Committee: committee reviews, votes, and concludes on the rating — NOT a single analyst","Publication: issuer reviews draft press release for factual errors, then rating is published","Monitoring: one-time post-publication review; no further engagement unless the issuer defaults"], correct: [0,1,2,3], tag: "concept", explain: "E is wrong — monitoring is ONGOING and continuous, not one-time. It includes at minimum annual issuer meetings, financial report reviews, and response to material developments. Monitoring continues for the life of the rated entity/instrument." },
      { q: "What is the short-term rating equivalent of a Moody's long-term rating in the \"Aa\" category?", options: ["Not Prime","Prime-3","Prime-2","Prime-1","There is no short-term equivalent for Aa ratings"], correct: [3], tag: "concept", explain: "Prime-1 corresponds to Aa and above (some A1). Prime-2 corresponds to A ratings. Prime-3 corresponds to Baa ratings. Not Prime corresponds to Ba and below. The short-term rating scale reflects the same credit quality ordering as the long-term scale." },
      { q: "The \"common reference point\" that CRAs provide creates value for global capital markets in which of the following ways?", options: ["Enables quick understanding of credit risk by market professionals globally","Promotes dialogue and market efficiency through wide distribution of credit information","Supports market integrity by improving understanding of credit risk across different issuers and instruments","Ensures all issuers in a given rating category pay identical coupons in bond markets","Allows investors to compare a Spanish corporate bond with a Japanese sovereign on the same scale"], correct: [0,1,2,4], tag: "concept", explain: "D is wrong — ratings inform pricing but do not ensure identical coupons. Spreads within a rating category vary based on sector, liquidity, structure, and market conditions. Two Baa2-rated issuers from different sectors will likely pay different yields." },
      { q: "How often does Moody's meet with each rated issuer as a minimum?", options: ["Every quarter, aligned with financial reporting cycles","At least annually, with more frequent meetings if relevant developments occur","Only at the time of initial rating and at each refinancing event","Twice per year — at the half-year and full-year results","Only when triggered by a specific credit event such as a downgrade or default"], correct: [1], tag: "concept", explain: "Moody's meets with each issuer at least annually as a baseline. More frequent meetings occur when relevant developments arise (major acquisitions, restructurings, significant performance changes). Moody's also meets with arrangers, regulators, and other market participants — not just issuers." },
      { q: "The Taurus 2021-3 CMBS case study illustrates how multiple factors conspired to drive rating pressure after 2021. Connecting across ALL topics, which of the following contributed to post-issuance rating challenges?", options: ["Hybrid working trends reduced demand for non-CBD office space — particularly relevant for Frankfurt Airport","ECB rate rises (2022–2024) increased cap rates, compressing property values and increasing Moody's LTV","Hotel revenue disruption persisted post-Covid, reducing the NOI contribution from the Hilton properties","Refinancing risk increased as the December 2024 expected maturity approached in a higher-rate environment","Moody's minimum yield floor of 6.15% was applied at origination — by 2024 market yields had risen above this floor, making the floor MORE conservative"], correct: [0,1,2,3,4], tag: "concept", explain: "All five are correct and form a comprehensive narrative of the post-origination credit deterioration. E is the nuanced point: the floor (set at 6.15%) became LESS binding as market yields rose toward and above it — which paradoxically means the origination floor was no longer the conservative constraint it was in 2021 when market yields were ~3%." },
    ],
  },
  {
    id: "socialhousing",
    name: "Social Housing",
    short: "Social Housing",
    color: "#185FA5",
    bg: "#E6F1FB",
    questions: [
      { q: "UK Housing Associations are rated under how many Moody's methodologies simultaneously?", options: ["One — the ESP methodology only","Two — ESP and GRI","Three","Four"], correct: [1], tag: "concept", explain: "UK HAs are rated under TWO methodologies at once: the European Social Housing Providers (ESP) methodology produces a standalone Baseline Credit Assessment (BCA), and the Government-Related Issuers (GRI) methodology lifts that BCA with government support to give the final rating." },
      { q: "What does the ESP methodology produce as its output for a UK Housing Association?", options: ["The final assigned rating","A Baseline Credit Assessment (BCA) — standalone credit strength","A government support uplift","A liquidity score only"], correct: [1], tag: "recall", explain: "The ESP methodology produces the Baseline Credit Assessment (BCA) — the HA's standalone credit strength before any government support. The GRI methodology then lifts the BCA to the final rating." },
      { q: "The BCA is written in lowercase notation (e.g. 'baa2'). Why?", options: ["It is a typo convention","Lowercase distinguishes a standalone BCA from a final assigned rating","It indicates a speculative-grade rating","It means the rating is provisional"], correct: [1], tag: "concept", explain: "Lowercase notation (a2, baa1, ba1) signals a Baseline Credit Assessment — standalone credit strength. Uppercase (A1, Baa2) is reserved for the final assigned rating that includes government support." },
      { q: "Under the GRI methodology, what are the TWO key inputs that determine how much the BCA is lifted?", options: ["Operating margin and debt to assets","Default Dependence and Extraordinary Support","Liquidity coverage and units under management","Regulatory framework and political considerations"], correct: [1], tag: "recall", explain: "GRI uplift depends on Default Dependence (joint susceptibility of the HA and government to adverse circumstances) and Extraordinary Support (likelihood the government steps in to avoid default)." },
      { q: "For UK Housing Associations, Default Dependence is rated:", options: ["Low","Moderate","High","Very High"], correct: [3], tag: "recall", explain: "Default Dependence is rated VERY HIGH for UK HAs — the HA and the UK Government are jointly susceptible to the same adverse circumstances, so their fortunes move together." },
      { q: "For UK Housing Associations, Extraordinary Support is assessed as:", options: ["Weak","Moderate","Strong","None"], correct: [2], tag: "recall", explain: "Extraordinary Support is assessed as STRONG for UK HAs, reflecting the high likelihood the government would intervene to prevent a default — driven by guarantees, regulation, grants and political sensitivity." },
      { q: "Which mechanism prevents UK Housing Associations from entering normal bankruptcy?", options: ["The Affordable Homes Programme","Special Housing Administration (introduced 2018)","The 10-year rent settlement","Universal Credit"], correct: [1], tag: "recall", explain: "Special Housing Administration (2018) prevents HAs from entering normal bankruptcy. Rescuing HAs as going concerns is a core principle — a key reason the Guarantees factor scores 'Strong'." },
      { q: "In the ESP scorecard, which two broad factors are TIED as the largest, each weighted 25%?", options: ["Institutional Framework and Market Position","Financial Performance and Debt and Liquidity","Management and Governance and Market Position","Institutional Framework and Management and Governance"], correct: [1], tag: "recall", explain: "Financial Performance (25%) and Debt and Liquidity (25%) are tied as the largest factors. Institutional Framework and Management and Governance are 20% each; Market Position is 10%." },
      { q: "Select ALL of the broad factors in the ESP scorecard.", options: ["Institutional Framework","Financial Performance","Debt and Liquidity","Management and Governance"], correct: [0,1,2,3], tag: "recall", explain: "All four are ESP broad factors, alongside Market Position (10%). The five factors: Institutional Framework 20%, Market Position 10%, Financial Performance 25%, Debt and Liquidity 25%, Management and Governance 20%." },
      { q: "The Liquidity Coverage sub-factor in the Social Housing methodology measures the ability to cover how long?", options: ["6 months of net cash needs","12–18 months of net cash needs","2 years of net cash needs","5 years of net cash needs"], correct: [2], tag: "trap", explain: "Social Housing Liquidity Coverage measures 2 YEARS of net cash needs with committed undrawn facilities. This is a deliberate contrast with the REIT methodology, which uses a 12–18 month horizon." },
      { q: "What does the SHLIC (Social Letting Interest Coverage) sub-factor measure?", options: ["Whether net interest costs can be covered by social housing rental income","The total debt relative to revenue","The proportion of unencumbered assets","Operating margin across all activities"], correct: [0], tag: "concept", explain: "SHLIC measures whether net interest costs can be covered by social housing rental income — a core test of whether the stable, regulated income stream alone services the debt." },
      { q: "What does the Debt to Assets sub-factor in the ESP scorecard primarily indicate?", options: ["The HA's operating efficiency","The proportion of assets funded by debt rather than grants or retained surpluses","The HA's liquidity position","The number of units under management"], correct: [1], tag: "concept", explain: "Debt to Assets shows what proportion of assets is funded by debt versus grants or retained surpluses — a structural measure of leverage in the social housing context." },
      { q: "In the Extraordinary Support assessment, why does 'Economic Importance' score only 'Moderate' for UK HAs?", options: ["HAs contribute nothing to the economy","Individual HAs are not material economic drivers, though the sector as a whole is critical to housing supply targets","The government has no interest in housing","HAs are fully private entities"], correct: [1], tag: "concept", explain: "With ~1,600 providers in the UK, no individual HA is a material economic driver — hence 'Moderate'. But the sector collectively is critical to reaching housing supply targets." },
      { q: "Which country has the highest proportion of social housing in Europe?", options: ["United Kingdom","France","The Netherlands","Germany"], correct: [2], tag: "recall", explain: "The Netherlands has the highest proportion of social housing in Europe. In England, by contrast, around 16% of households are in social housing." },
      { q: "Moody's holds the most Social Housing public ratings in which country?", options: ["France","United Kingdom","Netherlands","Germany"], correct: [1], tag: "recall", explain: "The UK dominates with 39 ratings, followed by France (11), with the Netherlands and Germany at 1 each — a total of around 52 entities across four countries." },
      { q: "The 10-year rent settlement for UK social housing from 2026 is set at:", options: ["CPI flat","CPI+1%","CPI+3%","RPI+1%"], correct: [1], tag: "recall", explain: "The settlement is CPI+1% for 10 years from 2026 — a positive policy development giving HAs greater revenue certainty for long-term planning." },
      { q: "Why is a long-term rent settlement (CPI+1%) credit positive for Housing Associations?", options: ["It allows HAs to stop borrowing entirely","It provides revenue certainty and predictability for long-term financial planning","It eliminates all development risk","It guarantees government grants"], correct: [1], tag: "concept", explain: "A multi-year rent settlement gives HAs predictable, certain revenue — central to long-term debt-servicing capacity and planning. Earlier rent caps and cuts had created exactly the opposite: uncertainty." },
      { q: "In the L&Q case study, how did the scorecard-suggested BCA compare to the assigned BCA?", options: ["They were identical","Scorecard suggested baa1, but assigned BCA was baa2 — committees adjust","Scorecard suggested baa2, assigned was a3","There was no scorecard involved"], correct: [1], tag: "concept", explain: "L&Q's scorecard suggested baa1, but the committee assigned baa2. This shows the scorecard is an input, not a mechanical output — committees apply judgement and the assigned rating often differs." },
      { q: "L&Q's final assigned rating was A3, while its assigned BCA was baa2. What explains the gap?", options: ["A calculation error","Government support under the GRI methodology lifted the standalone BCA to the final rating","L&Q's strong operating margin","The ESP scorecard was applied twice"], correct: [1], tag: "concept", explain: "The gap from baa2 (BCA) to A3 (final) is the government-support uplift under GRI. The case shows how government support 'insulates' standalone weakness — the final rating held at A3 even as standalone metrics weakened." },
      { q: "Across FY2021–FY2025, L&Q's final rating behaved how?", options: ["It was downgraded each year","It held at A3 throughout, despite weakening standalone metrics","It was upgraded steadily","It moved between investment and speculative grade"], correct: [1], tag: "concept", explain: "L&Q's final rating held at A3 throughout, even though its BCA-level metrics (SHLIC, CVIC, Financial Management score) weakened. This demonstrates the insulating effect of government support under GRI." },
      { q: "Which is identified as a key strength of the UK social housing sector?", options: ["Very low demand for social housing","Effective regulatory framework and strong governance","Falling interest rates guaranteed","No need for investment in existing homes"], correct: [1], tag: "recall", explain: "An effective regulatory framework and strong governance — with the Regulator of Social Housing (RSH) providing good oversight and a strong intervention track record — is a key sector strength." },
      { q: "Select ALL of the following that are identified as challenges for the UK social housing sector.", options: ["Significant investment needed in existing homes (safety, quality, decarbonisation)","Development risk from high construction costs and contractor failures","High interest rates pressuring liquidity","Margins unlikely to fully recover"], correct: [0,1,2,3], tag: "recall", explain: "All four are sector challenges. HAs face heavy retrofit/safety investment, development risk, interest-rate pressure on liquidity, and margins squeezed by past rent caps and cost inflation." },
      { q: "Why does the need to invest heavily in existing homes pressure HA credit quality?", options: ["It reduces the number of units under management","The majority of HAs plan to increase debt to fund safety, quality and decarbonisation works","It improves operating margins immediately","It eliminates development activity"], correct: [1], tag: "concept", explain: "Safety, quality and decarbonisation works are costly, and most HAs plan to increase debt to fund them — raising leverage and pressuring credit metrics." },
      { q: "What has happened to development activity across most UK Housing Associations?", options: ["Most have sharply increased development","Most have cut development, with outright-sale development especially reduced","Development is unchanged","Development has been outlawed"], correct: [1], tag: "recall", explain: "Most HAs have cut development in response to high construction costs and contractor-failure risk. Outright-sale development — the most market-exposed type — has been reduced especially sharply." },
      { q: "The current Moody's outlook for the UK Housing Association sector is best described as:", options: ["Strongly positive","Stable but fragile","Strongly negative","Under review"], correct: [1], tag: "concept", explain: "The outlook is stable but fragile — limited margin and interest-cover gains despite CPI+1%, slowing debt growth, lower liquidity, and more variable-rate debt. Small shifts could move it either way." },
      { q: "Which would push the UK HA sector outlook to NEGATIVE?", options: ["The government sharing more repair costs","Repair and maintenance costs continuing to rise, lowering margins while debt rises","Lower interest rates","Higher grants reducing capex needs"], correct: [1], tag: "concept", explain: "A negative trigger would be repair/maintenance costs continuing to rise — lowering margins and pushing debt up — combined with higher interest rates or development not matched by grants." },
      { q: "Social Housing Lettings (SHL) as a share of HA turnover (FY2025 median) is around:", options: ["50%","65%","83%","95%"], correct: [2], tag: "recall", explain: "SHL was about 83% of turnover at the FY2025 median, up from 80% — a strong focus on core social housing, which reduces reliance on more volatile income sources." },
      { q: "Why is a high share of Social Housing Lettings in turnover viewed positively?", options: ["It increases exposure to property sales","Core social lettings income is stable and regulated, reducing reliance on volatile income sources","It lowers the number of tenants","It removes the need for government support"], correct: [1], tag: "concept", explain: "Social housing lettings income is stable and regulated. A high SHL share means the HA depends less on volatile income (like market sales), strengthening the predictability of its cash flows." },
      { q: "In the ESP scorecard, the Institutional Framework factor (20%) splits into which two sub-factors?", options: ["Operating Environment and Regulatory Framework","Operating Margin and SHLIC","Financial Management and Debt Strategy","Units Under Management and Liquidity"], correct: [0], tag: "recall", explain: "Institutional Framework (20%) splits into Operating Environment (10%) — government policy, rent and subsidy frameworks — and Regulatory Framework (10%) — oversight, intervention powers, disclosure." },
      { q: "What does the Market Position factor (10%) measure, via Units Under Management?", options: ["The HA's profit margin","Size as a proxy for financial resilience and negotiating influence","The HA's debt level","Tenant satisfaction"], correct: [1], tag: "concept", explain: "Market Position uses Units Under Management as a size proxy: larger HAs tend to have more financial resilience and greater negotiating influence with lenders and contractors." },
      { q: "The Management and Governance factor (20%) in the ESP scorecard splits into:", options: ["Operating Environment and Regulatory Framework","Financial Management and Debt and Investment Strategy","Operating Margin and CVIC","Debt to Revenue and Debt to Assets"], correct: [1], tag: "recall", explain: "Management and Governance (20%) splits into Financial Management (10%) — risk management, planning, execution — and Debt and Investment Strategy (10%) — financial strategy, risk tolerance, capital access." },
      { q: "What does the CVIC (Cash Flow Volatility Interest Coverage) sub-factor assess?", options: ["The market value of the HA's properties","The reliability of covering interest from operating cash flows","The proportion of fixed-rate debt","The number of new homes built"], correct: [1], tag: "concept", explain: "CVIC assesses how reliably operating cash flows cover interest. Alongside SHLIC, it sits within Financial Performance and tests the durability of the HA's debt-servicing capacity." },
      { q: "The Affordable Homes Programme grant settlement is £39 billion over 10 years. Relative to the prior 2021–26 AHP, this represents:", options: ["A reduction in annual grant funding","Roughly a 36% annual increase","No change","A doubling of total funding"], correct: [1], tag: "recall", explain: "The £39bn over 10 years via the Affordable Homes Programme represents about a 36% annual increase versus the 2021–26 AHP — a positive policy development supporting the sector." },
      { q: "Which statement about the relationship between the BCA and the final rating is correct?", options: ["The final rating is always below the BCA","The final rating equals the BCA plus any GRI government-support uplift","The BCA and final rating are unrelated","The BCA is derived from the final rating"], correct: [1], tag: "concept", explain: "The final rating is the BCA (standalone strength from ESP) lifted by government support under the GRI methodology. For UK HAs the uplift moves a BCA range of a2–ba1 to a final range of A1–Baa2." },
      { q: "Within the Extraordinary Support assessment, 'Barriers to Support' for UK HAs is scored as:", options: ["High","Moderate","None","Strong"], correct: [2], tag: "recall", explain: "Barriers to Support is scored 'None' — there are no legal barriers preventing timely government support to a UK HA, which strengthens the overall Extraordinary Support assessment." },
      { q: "Why does the Social Housing methodology use a 2-year liquidity horizon while the REIT methodology uses 12–18 months?", options: ["Social housing providers have shorter-dated debt","It reflects the longer-term, less liquid nature of social housing operations and a more conservative stance","REITs are riskier and need less coverage","It is an arbitrary difference"], correct: [1], tag: "concept", explain: "The 2-year horizon reflects a more conservative liquidity stance suited to the long-term, regulated nature of social housing — a deliberate methodological contrast with the 12–18 month REIT framework." },
      { q: "Which factors contribute to the 'Strong' Extraordinary Support score for UK HAs? Select all that apply.", options: ["Special Housing Administration preventing normal bankruptcy","Capital grants and government control over rent setting","Political and social sensitivity of housing","Government-appointed regulators and a clear public policy mandate"], correct: [0,1,2,3], tag: "recall", explain: "All four feed the 'Strong' assessment: special administration (Guarantees), grants and rent control (Government Intervention), political sensitivity (Political Considerations), and regulators plus public mandate (Government Ownership proxy)." },
      { q: "What has happened to the proportion of fixed-rate debt held by UK HAs (FY2024 to FY2025)?", options: ["It rose from 83% to 89%","It fell from 89% to 83%","It stayed flat at 95%","It fell to below 50%"], correct: [1], tag: "recall", explain: "Fixed-rate debt fell from 89% (FY2024) to 83% (FY2025). More variable-rate debt increases exposure to interest-rate movements — one reason the sector outlook is described as fragile." },
      { q: "Why is a fall in the fixed-rate debt proportion a credit concern for HAs?", options: ["It reduces the number of homes","More variable-rate debt increases exposure to rising interest rates and cash flow uncertainty","It improves interest coverage","It has no credit impact"], correct: [1], tag: "concept", explain: "A lower fixed-rate share means more debt reprices with the market. In a high-rate environment that raises interest costs and cash flow uncertainty, weakening coverage metrics." },
      { q: "The ESP scorecard's BCA range for UK Housing Associations spans:", options: ["aaa to a3","a2 to ba1","baa1 to b2","A1 to Baa2"], correct: [1], tag: "recall", explain: "UK HA BCAs span a2 to ba1 (lowercase — standalone strength). After GRI government-support uplift, final assigned ratings span A1 to Baa2 (uppercase)." },
      { q: "Which best explains why housing is described as politically and socially sensitive in the support assessment?", options: ["Housing has no public profile","Protecting tenants and public investment makes government intervention politically likely","Housing is a purely private market concern","The government has no role in housing policy"], correct: [1], tag: "concept", explain: "Housing is politically and socially sensitive — protecting tenants and public investment matters to government. This raises the likelihood of intervention, supporting the 'Strong' Extraordinary Support score." },
      { q: "A scorecard-indicated outcome differing from the assigned rating tells you that:", options: ["The scorecard is broken","The scorecard is an analytical input, and committees apply judgement to reach the assigned rating","The HA submitted false data","The methodology was not followed"], correct: [1], tag: "concept", explain: "The scorecard is a structured input, not a mechanical verdict. Committees weigh factors not fully captured by the scorecard, so the assigned rating often differs — as L&Q's baa1 scorecard vs baa2 assigned shows." },
      { q: "What does the Operating Margin sub-factor underpin in the ESP scorecard?", options: ["The HA's liquidity coverage","The HA's underlying financial health","The number of units under management","The regulatory framework score"], correct: [1], tag: "concept", explain: "Operating Margin sits within Financial Performance and underpins the HA's underlying financial health — a strong margin signals the organisation generates surplus from its core activities." },
      { q: "Which would push the UK HA sector outlook to POSITIVE?", options: ["Rising repair costs and higher interest rates","Government sharing more repair costs, lower capex via higher grants, and lower interest rates","Cutting the rent settlement","Reduced government support"], correct: [1], tag: "concept", explain: "A positive shift would come from the government sharing more repair costs, higher grants reducing the capex burden, and lower interest rates easing the pressure on coverage and liquidity." },
      { q: "Cash balances across UK HAs in FY2025 were described as:", options: ["At a record high","At their lowest level in 12 years","Unchanged from FY2024","Irrelevant to credit analysis"], correct: [1], tag: "recall", explain: "Cash balances reached their lowest level in 12 years, reflecting how high interest rates and heavy investment needs have pressured HA liquidity — part of why the outlook is fragile." },
      { q: "The GRI methodology is most relevant to a Housing Association because:", options: ["HAs are purely commercial entities with no public link","HAs have a strong relationship with government, so support can lift the standalone rating","HAs are owned outright by the government","GRI replaces the need for any credit analysis"], correct: [1], tag: "concept", explain: "GRI applies because HAs, while not government-owned, have a strong relationship with government — a public policy mandate, grants and regulation — so likely support can lift the standalone BCA to a higher final rating." },
      { q: "Which sub-factor pairing correctly belongs to the Debt and Liquidity factor?", options: ["Operating Margin, SHLIC, CVIC","Debt to Revenue, Debt to Assets, Liquidity Coverage","Operating Environment, Regulatory Framework","Financial Management, Debt and Investment Strategy"], correct: [1], tag: "recall", explain: "Debt and Liquidity (25%) contains Debt to Revenue (5%), Debt to Assets (10%) and Liquidity Coverage (10%). The Operating Margin/SHLIC/CVIC trio belongs to Financial Performance." },
      { q: "Even with weakening standalone metrics, why did L&Q remain investment grade?", options: ["Its operating margin was always above 50%","Government support under GRI insulated the final rating from BCA-level deterioration","It stopped reporting financial data","Moody's suspended the methodology"], correct: [1], tag: "concept", explain: "L&Q's BCA-level metrics weakened, but government support under GRI lifted and held the final rating at A3 — the case study's central lesson on how support insulates a government-related issuer." },
      { q: "Roughly what proportion of households in England live in social housing?", options: ["About 4%","About 16%","About 35%","About 55%"], correct: [1], tag: "recall", explain: "Around 16% of households in England are in social housing. Housing is a driver of economic output and fundamental to social well-being — context for why the sector attracts government support." },
      { q: "Which institution provides oversight and intervention powers in the UK social housing sector?", options: ["The Bank of England","The Regulator of Social Housing (RSH)","The Financial Conduct Authority","Homes England only"], correct: [1], tag: "recall", explain: "The Regulator of Social Housing (RSH) provides oversight, can facilitate mergers, provide financial assistance and appoint managers — a strong intervention track record underpinning sector credit quality." },
      // ---- 200-question bank additions ----
      { q: "UK Housing Associations are rated under TWO methodologies simultaneously. What are they?", options: ["REIT Methodology + Corporate Finance Methodology","European Social Housing Providers (ESP) Methodology + Government-Related Issuers (GRI) Methodology","Sub-Sovereign Methodology + Social Infrastructure Methodology","Project Finance Methodology + Structured Finance Methodology","REIT Methodology + Government-Related Issuers (GRI) Methodology"], correct: [1], tag: "concept", explain: "ESP provides the Baseline Credit Assessment (BCA) — the standalone credit strength (a2 to ba1). GRI then lifts the BCA to the Final Assigned Rating (A1 to Baa2) by incorporating the UK government's extraordinary support. Both methodologies apply simultaneously." },
      { q: "In the Government-Related Issuers (GRI) methodology for UK Housing Associations, which of the following are rated as HIGH or above?", options: ["Default Dependence (joint susceptibility of HA and UK Government to adverse events) — rated Very High","Extraordinary Government Support likelihood — rated Strong","Government Ownership of HAs — rated High (no direct ownership but clear public mandate)","Government Intervention capability (capital grants, rent setting, RSH powers) — rated High","Legal Barriers to Government Support — rated None"], correct: [0,1,2,3,4], tag: "concept", explain: "All of A, B, C, D, E are correct. The UK GRI assessment gives Very High default dependence, Strong extraordinary support, High government ownership (indirect), High intervention, and No barriers — collectively justifying the significant rating uplift above the BCA." },
      { q: "The ESP Methodology's \"Social Letting Interest Coverage\" (SHLIC) metric measures:", options: ["Whether total operating cashflows cover all interest costs","Whether net interest costs can be covered specifically by social housing rental income","The ratio of social housing units to total properties in the portfolio","The percentage of tenants receiving Housing Benefit or Universal Credit","Whether social lettings revenue is sufficient to cover maintenance and repair costs"], correct: [1], tag: "concept", explain: "SHLIC = Social Housing Lettings net income / Net Interest costs. It specifically tests whether the core, stable income stream (social rents) can alone cover interest obligations — a more stringent test than total EBITDA/interest." },
      { q: "The ESP Methodology scorecard has five broad factors. Which of the following correctly state their weights?", options: ["Institutional Framework: 20%","Market Position: 10%","Financial Performance: 25%","Debt and Liquidity: 25%","Management and Governance: 20%"], correct: [0,1,2,3,4], tag: "concept", explain: "All correct. Financial Performance and Debt & Liquidity are the two largest factors (tied at 25% each). Institutional Framework and Management & Governance are tied at 20%. Market Position is smallest at 10%." },
      { q: "L&Q, a major London housing association, has a scorecard-suggested BCA of baa1 but Moody's assigns a BCA of baa2. What does this illustrate?", options: ["The scorecard is mechanically applied without any committee adjustment","Rating committees can and do adjust the final BCA below the scorecard output based on qualitative assessment","L&Q's financial metrics have been incorrectly calculated in the scorecard","Moody's applies a mandatory one-notch haircut to all Housing Association BCAs","The baa2 BCA reflects a penalty for L&Q's geographic concentration in London"], correct: [1], tag: "concept", explain: "This is the key illustration of \"scorecard ≠ assigned rating.\" The committee reviewed L&Q's deteriorating financial performance (falling SHLIC, CVIC, and the downgrade of its Financial Management score) and concluded baa2 better reflected standalone credit strength than the mechanically derived baa1." },
      { q: "Despite L&Q's BCA deteriorating to baa2 (with SHLIC falling to 0.9x — below the \"a\" threshold), its FINAL rating remained at A3 throughout. Which factors explain this?", options: ["The GRI methodology lifts the BCA by incorporating UK government extraordinary support","The UK government's support is rated \"Strong,\" providing significant uplift from the BCA","Default Dependence rated \"Very High\" means the government cannot let a HA fail","L&Q's A3 final rating reflects its standalone credit strength independent of government","The Special Housing Administration (2018) prevents HAs from entering normal bankruptcy, reinforcing the going-concern rescue principle"], correct: [0,1,2,4], tag: "concept", explain: "D is wrong — A3 is NOT L&Q's standalone strength. It is BCA baa2 + GRI government support uplift = A3 final. The rating explicitly incorporates the government support assumption. This is the core of the dual-methodology framework." },
      { q: "The Liquidity Coverage metric in the ESP Methodology differs from REIT liquidity in what key way?", options: ["ESP uses a 12-month horizon; REIT uses 18-month","ESP measures 2 YEARS of net cash needs covered by committed undrawn facilities; REIT uses 12–18 months","ESP assumes capital markets access is available; REIT assumes none","REIT liquidity is qualitative; ESP liquidity is purely quantitative","ESP uses a 5-year liquidity horizon to capture major refinancing events"], correct: [1], tag: "concept", explain: "The 2-year horizon is the key difference — ESP's Liquidity Coverage specifically requires committed undrawn facilities to cover 2 full years of net cash needs. REIT liquidity uses 12–18 months and assumes no capital markets access. Both are conservative stress tests but calibrated differently." },
      { q: "Which of the following are correctly identified as current STRENGTHS of the UK social housing sector?", options: ["A 10-year rent settlement at CPI+1% (from 2026)","£39 billion in grants over 10 years via the Affordable Homes Programme — 36% higher annual rate","Social Housing Lettings (SHL) representing 83% of turnover (FY2025 median, up from 80%)","Fixed rate debt proportion has increased to 89% in FY2025","Very strong demand for social housing with limited supply"], correct: [0,1,2,4], tag: "concept", explain: "D is wrong and the facts are inverted — fixed rate debt FELL from 89% (FY2024) to 83% (FY2025), which is a weakness (greater floating rate exposure), not a strength." },
      { q: "In the ESP Methodology, what does the \"Regulatory Framework\" sub-factor (10% weight) within Institutional Framework assess?", options: ["The credit quality of the housing association's loan counterparties","The oversight and intervention powers of the housing regulator, and their impact on credit quality","The legal structure of the housing association's bonds and security package","The housing association's compliance with planning and building regulations","The ability of the housing association to access regulated capital markets"], correct: [1], tag: "concept", explain: "The Regulatory Framework sub-factor assesses the quality and effectiveness of the housing regulator (e.g. Regulator of Social Housing in the UK) — its oversight powers, intervention track record, and disclosure requirements. Strong regulation supports credit quality by providing an institutional backstop." },
      { q: "Which of the following are correctly identified as current CHALLENGES facing the UK social housing sector?", options: ["Significant investment required in existing homes: safety, quality, decarbonisation","High construction costs and contractor failures increasing development risk","Cash balances at their lowest level in 12 years","NI contribution increases in 2025 adding to operating cost pressures","The 10-year rent settlement reduces income certainty below inflation levels"], correct: [0,1,2,3], tag: "concept", explain: "E is wrong — the CPI+1% rent settlement for 10 years is a STRENGTH, not a challenge. It provides income growth ABOVE inflation, supporting debt service capacity. The challenges are on the cost/investment/liquidity side." },
      { q: "What CVIC range corresponds to a \"baa\" BCA in the ESP Methodology?", options: ["≥4.0x","3.0–4.0x","2.0–3.0x","1.0–2.0x","0.9–1.0x"], correct: [3], tag: "concept", explain: "CVIC thresholds: aaa ≥4x, aa 3–4x, a 2–3x, baa 1–2x, ba 0.9–1x, b 0.25–0.9x. L&Q's CVIC declining to 1.1x (FY2025) places it at the upper end of the baa range — just above the ba1 boundary." },
      { q: "The Netherlands has the highest proportion of social housing in Europe. Which of the following are correct facts about the social housing sector coverage in Moody's ratings?", options: ["Moody's holds 55 public ratings under the European Social Housing Providers Methodology","The UK accounts for 39 of those ratings","France accounts for 11 ratings","Germany accounts for 11 ratings and the Netherlands for 1","Netherlands has 1 rating and Germany has 1 rating"], correct: [0,1,2,4], tag: "concept", explain: "D is wrong — the split is UK (39), France (11), Netherlands (1), Germany (1). Not Germany (11) and Netherlands (1)." },
      { q: "Which of the following would trigger a NEGATIVE sector outlook change for UK Housing Associations, per Moody's?", options: ["Government increases its capital grants for new affordable housing construction","Interest rates decline materially, reducing funding costs","Repair and maintenance costs continue rising, reducing margins further and increasing debt","Social housing lettings increase their share of total turnover above 85%","The RSH (Regulator of Social Housing) is given additional statutory powers"], correct: [2], tag: "concept", explain: "Rising repair/maintenance costs compressing margins AND requiring more debt is explicitly the scenario that would trigger a negative outlook. Lower rates and higher grants would be positive triggers. Stronger RSH powers strengthen the regulatory framework." },
      { q: "L&Q's Operating Margin was highly volatile across FY2021–FY2025. Which of the following correctly characterise this trend?", options: ["Operating Margin improved from a trough (~6.5% in FY2023) to 25% in FY2025","The 7% rent cap in FY2024 combined with double-digit inflation was a key driver of margin compression","Despite recent margin recovery, margins are unlikely to fully recover to pre-stress levels","L&Q's margin volatility resulted in a downgrade of its Financial Management score to ba1","L&Q's operating margin has been consistently above 20% throughout the period"], correct: [0,1,2,3], tag: "concept", explain: "E is flatly wrong — the data shows a trough of 6.5% in FY2023, far below 20%. The margin deterioration was severe and only partially recovered by FY2025 (to 25%). The Financial Management downgrade to ba1 reflects the committee's view that this volatility reflects management risk." },
      { q: "What is the \"Economic Importance\" factor in the UK GRI Extraordinary Support assessment, and why is it rated only \"Moderate\"?", options: ["Moderate because social housing tenants pay below-market rents, reducing economic impact","Moderate because with ~1,600 providers, individual HAs are not material economic drivers on their own, even though the sector is critical to housing supply targets","Moderate because the UK economy does not depend on social housing construction for GDP growth","Moderate because Moody's caps Economic Importance at Moderate for all sub-sovereign entities","Moderate because only housing associations above 50,000 units are considered economically important"], correct: [1], tag: "concept", explain: "The nuance: the social housing SECTOR collectively is critical to UK housing supply targets, but any individual HA is not a material economic driver in isolation. This collective importance without individual systemic significance justifies \"Moderate\" at the entity level." },
      { q: "Which of the following are included in the \"Institutional Framework\" broad factor (20%) of the ESP Methodology?", options: ["Operating Environment sub-factor: government policy, rent & subsidy frameworks, and revenue certainty","Regulatory Framework sub-factor: oversight, intervention powers, and disclosure requirements","Units Under Management: size as proxy for financial resilience","Access to diverse capital sources","Stability of the political and regulatory environment relevant to social housing"], correct: [0,1,4], tag: "concept", explain: "Units Under Management (C) is part of Market Position (10%), not Institutional Framework. Capital access (D) is part of Management and Governance. Institutional Framework contains only Operating Environment and Regulatory Framework." },
      { q: "The final assigned rating range for UK Housing Associations is A1 to Baa2. What explains this range rather than a single rating for all HAs?", options: ["Different HAs operate in different countries with different government support assumptions","The BCA varies across HAs (from a2 to ba1) reflecting different standalone financial strength; the GRI uplift is the same for all, producing a range of final ratings","The GRI uplift varies by HA depending on their specific relationship with the government","The final rating depends on the HA's geographic exposure — London-based HAs receive higher ratings","Moody's applies different extraordinary support assessments to each individual HA"], correct: [1], tag: "concept", explain: "All UK HAs share the same government support assessment (Strong extraordinary support, Very High default dependence), but their standalone BCAs differ from a2 to ba1. When the same GRI uplift is applied to different BCAs, the result is a range of final ratings (A1 to Baa2)." },
